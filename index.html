      const [form, setForm] = useState({ clientId: "", serviceId: "", description: "", baseAmount: "", total: "", status: "Unpaid", dueDate: "", notes: "", taxPct: 0, tax: 0, discountPct: 0, discount: 0, discountAmt: 0, paymentMethod: "Cash" });
      // v30 FIX: auto-recalculate total on any amount change
      useEffect(() => {
        const base = Number(form.baseAmount) || 0;
        if (base <= 0) { setForm(f => ({ ...f, tax: 0, discountAmt: 0, total: "" })); return; }
        const tax = Math.round(base * (Number(form.taxPct) || 0) / 100 * 100) / 100;
        const disc = Math.round(base * (Number(form.discountPct) || 0) / 100 * 100) / 100;
        const total = Math.round((base + tax - disc) * 100) / 100;
        setForm(f => ({ ...f, tax, discountAmt: disc, total: total > 0 ? String(total) : "" }));
      }, [form.baseAmount, form.taxPct, form.discountPct]);
      // v29 FIX: Auto-calculate total whenever baseAmount, taxPct, discountPct changes
      useEffect(() => {
        const base = Number(form.baseAmount) || 0;
        if (base <= 0) return;
        const tax = Math.round(base * (Number(form.taxPct) || 0) / 100 * 100) / 100;
        const disc = Math.round(base * (Number(form.discountPct) || 0) / 100 * 100) / 100;
        const total = base + tax - disc;
        setForm(f => ({ ...f, tax, discountAmt: disc, total: total > 0 ? String(Math.round(total * 100) / 100) : "" }));

        setS(p => ({ ...p, bills: [...p.bills, nb] }));

                    <td style={{ padding: "11px 14px" }}><button onClick={() => { setClientId(b.clientId); setPage("client360") }} style={{ background: "none", border: "none", color: "var(--blue)", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>{cl?.name || "—"}</button></td>

                    <td style={{ padding: "11px 14px" }}>
                      <div style={{ display: "flex", gap: 6 }}>
                        <Btn v="blue" size="sm" onClick={() => printInvoice(b, cl, svc, S.settings)}>🖨</Btn>
                        {["admin", "manager"].includes(user.role) && <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                          <select value={b.status} onChange={e => { const st = e.target.value; const paid = st === "Paid" ? b.total : st === "Unpaid" ? 0 : b.paid || 0; setS(p => ({ ...p, bills: p.bills.map(x => x.id === b.id ? { ...x, status: st, paid } : x) })); toast("Status updated", "success") }}
                            style={{ padding: "4px 8px", borderRadius: 5, border: "1px solid var(--border)", background: "rgba(255,255,255,0.03)", color: "var(--text2)", fontSize: 11, cursor: "pointer", fontFamily: "var(--font)", width: "100%" }}>
                            {Object.keys(BILL_STATUS).map(st => <option key={st} value={st}>{st}</option>)}
                          </select>
                          <select value={b.paymentMethod || "Cash"} onChange={e => { setS(p => ({ ...p, bills: p.bills.map(x => x.id === b.id ? { ...x, paymentMethod: e.target.value } : x) })); toast("Payment method updated", "success") }}
                            style={{ padding: "4px 8px", borderRadius: 5, border: "1px solid var(--border)", background: "rgba(255,255,255,0.03)", color: "var(--text3)", fontSize: 10, cursor: "pointer", fontFamily: "var(--font)", width: "100%" }}>

                          onMouseEnter={e => e.currentTarget.style.color = "var(--red)"} onMouseLeave={e => e.currentTarget.style.color = "var(--text3)"}>🗑</button>}
                      </div>
                    </td>
                  </tr>;
                })}
                </tbody>
              </table>
            </div>
          </div>}
        {modal && <Modal title="🧾 New Invoice" onClose={() => setModal(false)} width={560}>
          {/* Client & Service */}
          <Sel label="Client *" value={form.clientId} onChange={e => setForm(f => ({ ...f, clientId: e.target.value, serviceId: "" }))} required options={[{ v: "", l: "— Select Client —" }, ...S.clients.filter(c => c.status === "active" && !c._deleted).sort((a, b) => a.name.localeCompare(b.name)).map(c => ({ v: c.id, l: c.name + " (" + c.clientNo + ")" }))]} />
          {form.clientId && <Sel label="Service (Optional)" value={form.serviceId} onChange={e => { const svc = S.services.find(s => s.id === e.target.value); setForm(f => ({ ...f, serviceId: e.target.value, description: svc?.serviceType || f.description })) }} options={[{ v: "", l: "— None —" }, ...S.services.filter(s => s.clientId === form.clientId && !s._deleted).map(s => ({ v: s.id, l: s.serviceType + " (" + s.svcNo + ")" }))]} />}
          <Field label="Description *" value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} placeholder="e.g. GST Filing 2024-25, ITR Filing…" required />

          {/* ══ LIVE CALCULATOR ══ */}
          <div style={{ background: "rgba(201,168,76,0.04)", border: "1px solid rgba(201,168,76,0.15)", borderRadius: 12, padding: "16px 16px 12px", marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "var(--gold)", textTransform: "uppercase", letterSpacing: ".1em", marginBottom: 12 }}>💰 Invoice Calculator</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 14px" }}>

                  const tax = base * (Number(form.taxPct) || 0) / 100;

                  const total = Math.round((base + tax - disc) * 100) / 100;
                  setForm(f => ({ ...f, baseAmount: e.target.value, tax: Math.round(tax * 100) / 100, discountAmt: Math.round(disc * 100) / 100, total: total > 0 ? total : "" }));

              <div style={{ marginBottom: 14 }}>
                <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 5 }}>GST % (Tax)</label>
                <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                  {[0, 5, 12, 18, 28].map(pct => <button key={pct} type="button"
                    onClick={() => {
                      const base = Number(form.baseAmount || form.total) || 0;
                      const tax = base * pct / 100;
                      const disc = base * (Number(form.discountPct) || 0) / 100;
                      const total = Math.round((base + tax - disc) * 100) / 100;
                      setForm(f => ({ ...f, taxPct: pct, tax: Math.round(tax * 100) / 100, total: total > 0 ? total : "" }));
                    }}
                    style={{ padding: "5px 10px", borderRadius: 6, border: "1px solid " + (form.taxPct === pct ? "var(--gold)" : "var(--border)"), background: form.taxPct === pct ? "var(--gold3)" : "var(--glass)", color: form.taxPct === pct ? "var(--gold)" : "var(--text2)", fontSize: 12, cursor: "pointer", fontWeight: form.taxPct === pct ? 700 : 500, transition: "all .12s" }}>
                    {pct}%
                  </button>)}
                </div>
              </div>
              <div style={{ marginBottom: 14 }}>
                <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 5 }}>Discount %</label>
                <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                  {[0, 5, 10, 15, 20].map(pct => <button key={pct} type="button"
                    onClick={() => {
                      const base = Number(form.baseAmount || form.total) || 0;
                      const tax = base * (Number(form.taxPct) || 0) / 100;
                      const disc = base * pct / 100;
                      const total = Math.round((base + tax - disc) * 100) / 100;
                      setForm(f => ({ ...f, discountPct: pct, discount: Math.round(disc * 100) / 100, total: total > 0 ? total : "" }));
                    }}
                    style={{ padding: "5px 10px", borderRadius: 6, border: "1px solid " + (form.discountPct === pct ? "var(--blue)" : "var(--border)"), background: form.discountPct === pct ? "var(--blue2)" : "var(--glass)", color: form.discountPct === pct ? "var(--blue)" : "var(--text2)", fontSize: 12, cursor: "pointer", fontWeight: form.discountPct === pct ? 700 : 500, transition: "all .12s" }}>
                    {pct}%
                  </button>)}
                </div>
              </div>
              <div />
            </div>

            {/* Calculation breakdown */}
            {(Number(form.baseAmount || form.total) || 0) > 0 && <div style={{ background: "rgba(0,0,0,0.2)", borderRadius: 9, padding: "12px 14px", marginTop: 4 }}>
              {[
                { l: "Base Amount", v: fmtMoney(Number(form.baseAmount || form.total) || 0), c: "var(--text)" },
                ...(form.taxPct > 0 ? [{ l: `GST ${form.taxPct}% (CGST ${form.taxPct / 2}% + SGST ${form.taxPct / 2}%)`, v: "+" + fmtMoney(form.tax || 0), c: "var(--orange)" }] : []),
                ...((form.discountPct || 0) > 0 ? [{ l: `Discount ${form.discountPct}%`, v: "-" + fmtMoney(form.discountAmt || 0), c: "var(--red)" }] : []),
              ].map(row => <div key={row.l} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                <span style={{ color: "var(--text3)" }}>{row.l}</span>
                <span style={{ color: row.c, fontFamily: "var(--font-mono)", fontWeight: 600 }}>{row.v}</span>
              </div>)}
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 15, fontWeight: 800, paddingTop: 8, marginTop: 4, borderTop: "1px solid var(--border2)" }}>
                <span style={{ color: "var(--text)" }}>Grand Total</span>
                <span style={{ color: "var(--gold)", fontFamily: "var(--font-mono)" }}>{fmtMoney(Number(form.total) || 0)}</span>
              </div>
            </div>}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 14px" }}>
            <Sel label="Status" value={form.status} onChange={e => setForm(f => ({ ...f, status: e.target.value }))} options={Object.keys(BILL_STATUS)} />
            <Sel label="Payment Method" value={form.paymentMethod} onChange={e => setForm(f => ({ ...f, paymentMethod: e.target.value }))} options={PAYMENT_METHODS} />
            <Field label="Due Date" type="date" value={form.dueDate} onChange={e => setForm(f => ({ ...f, dueDate: e.target.value }))} />
          </div>
          <Field label="Notes" value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} rows={2} placeholder="Optional notes…" />
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
            <Btn onClick={() => setModal(false)} v="ghost">Cancel</Btn>
            <Btn onClick={save} disabled={!form.clientId || !form.total || isNaN(Number(form.total))}>🧾 Create Invoice</Btn>
          </div>
        </Modal>}
      </Page>;
    }


    /* ══ REPORTS PAGE ══ */
    function ReportsPage({ S, user }) {
      const [tab, setTab] = useState("overview");
      const [fClient, setFClient] = useState(""); const [fMobile, setFMobile] = useState("");
      const [fType, setFType] = useState(""); const [fYear, setFYear] = useState(""); const [fMonth, setFMonth] = useState(""); const [fStatus, setFStatus] = useState("");
      const [exportQ, setExportQ] = useState("");
      const TABS = [{ v: "overview", l: "📊 Overview" }, { v: "revenue", l: "💰 Revenue" }, { v: "clients", l: "👥 Clients" }, { v: "tasks", l: "✅ Tasks" }, { v: "employees", l: "👤 Employees" }, { v: "services", l: "⚙ Services" }, { v: "search", l: "🔍 Deep Search" }, { v: "advanced", l: "📈 Advanced" }, { v: "export", l: "📤 Export" }];
      const [searchQ2, setSearchQ2] = useState(""); const [searchType, setSearchType] = useState("all");
      const MNAMES = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      // ── Data declarations FIRST to avoid temporal dead zone ──
      const _delCIds_r = new Set((S.clients || []).filter(c => c._deleted).map(c => c.id));
      const bills = (S.bills || []).filter(b => !b._deleted && !(b.clientId && _delCIds_r.has(b.clientId)));
      const tasks = (S.tasks || []).filter(t => !t._deleted && !(t.clientId && _delCIds_r.has(t.clientId)));
      const clients = (S.clients || []).filter(c => !c._deleted);
      const services = (S.services || []).filter(s => !s._deleted && !(s.clientId && _delCIds_r.has(s.clientId)));
      const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      const years = [...new Set(bills.map(b => new Date(b.createdAt).getFullYear()))].sort((a, b) => b - a);
      const totalBilled = bills.reduce((s, b) => s + (b.total || 0), 0);
      const totalPaid = bills.filter(b => b.status === "Paid").reduce((s, b) => s + (b.total || 0), 0);
      const totalOut = bills.filter(b => b.status !== "Paid").reduce((s, b) => s + (b.total || 0), 0);
      const completedT = tasks.filter(t => t.status === "completed").length;
      const overdueT = tasks.filter(t => isOverdue(t.dueDate) && t.status !== "completed").length;
      const inProgT = tasks.filter(t => t.status === "in progress").length;
      const pendingT = tasks.filter(t => t.status === "pending").length;

      const monthlyData = useMemo(() => {
        const arr = []; const dn = new Date();
        for (let i = 11; i >= 0; i--) {
          const d = new Date(dn); d.setMonth(d.getMonth() - i);
          const y = d.getFullYear(); const m = d.getMonth();
          const billed = bills.filter(b => { const bd = new Date(b.date || b.createdAt); return bd.getFullYear() === y && bd.getMonth() === m; }).reduce((s, b) => s + (b.total || 0), 0);
          const paid = bills.filter(b => { const bd = new Date(b.date || b.createdAt); return bd.getFullYear() === y && bd.getMonth() === m && b.status === "Paid"; }).reduce((s, b) => s + (b.total || 0), 0);
          const newC = clients.filter(cc => { const cd = new Date(cc.createdAt); return cd.getFullYear() === y && cd.getMonth() === m; }).length;
          arr.push({ label: MNAMES[m].slice(0, 3), billed, paid, newC });
        }
        return arr;
      }, [bills, clients]);
      const maxRevM = Math.max(...monthlyData.map(m => m.billed), 1);
      const maxCM = Math.max(...monthlyData.map(m => m.newC), 1);

      const topClients = useMemo(() => {
        const map = {};
        bills.forEach(b => {
          const cl = clients.find(cc => cc.id === b.clientId);
          if (!cl) return;
          if (!map[b.clientId]) map[b.clientId] = { name: cl.name, total: 0, count: 0 };
          map[b.clientId].total += b.total || 0;
          map[b.clientId].count++;
        });
        return Object.values(map).sort((a, b) => b.total - a.total).slice(0, 10);
      }, [bills, clients]);

      const agingDues = useMemo(() => {
        const r = { ok: 0, d7: 0, d30: 0, old: 0 };
        bills.filter(b => b.status !== "Paid").forEach(b => {
          if (!b.dueDate) return;
          const diff = Math.floor((Date.now() - new Date(b.dueDate)) / 86400000);
          const bal = (b.total || 0) - (b.paid || 0);
          if (diff <= 0) r.ok += bal;
          else if (diff <= 7) r.d7 += bal;
          else if (diff <= 30) r.d30 += bal;
          else r.old += bal;
        });
        return r;
      }, [bills]);
      const svcRevenue = useMemo(() => getSvcTypes().map(st => { const svcs = services.filter(s => s.serviceType === st); const rev = bills.filter(b => svcs.some(s => s.id === b.serviceId)).reduce((s, b) => s + (b.total || 0), 0); return { name: st, count: svcs.length, revenue: rev } }).filter(s => s.count > 0).sort((a, b) => b.revenue - a.revenue), [services, bills]);

      const userPerf = useMemo(() => S.users.filter(u => u.status === "active" && !u._deleted).map(u => { const tc = tasks.filter(t => t.assignedTo === u.id).length; const done = tasks.filter(t => t.assignedTo === u.id && t.status === "completed").length; const cc = clients.filter(c => c.assignedTo === u.id).length; return { ...u, taskCount: tc, done, pending: tc - done, clientCount: cc, rate: tc > 0 ? Math.round(done / tc * 100) : 0 } }), [S.users, tasks, clients]);

      const filteredBills = useMemo(() => bills.filter(b => {
        const cl = clients.find(c => c.id === b.clientId); const svc = services.find(s => s.id === b.serviceId);
        if (exportQ) { const q = exportQ.toLowerCase(); const hit = cl?.name?.toLowerCase().includes(q) || cl?.phone?.includes(exportQ) || b.invoiceNo?.toLowerCase().includes(q) || svc?.serviceType?.toLowerCase().includes(q); if (!hit) return false }
        if (fClient && !cl?.name?.toLowerCase().includes(fClient.toLowerCase())) return false;
        if (fMobile && !cl?.phone?.includes(fMobile)) return false;
        if (fType && svc?.serviceType !== fType) return false;
        if (fStatus && b.status !== fStatus) return false;
        if (fYear && new Date(b.createdAt).getFullYear().toString() !== fYear) return false;
        if (fMonth && new Date(b.createdAt).getMonth().toString() !== fMonth) return false;
        return true;
      }), [bills, clients, services, exportQ, fClient, fMobile, fType, fStatus, fYear, fMonth]);

      const firm = S.settings?.firmName || "OM Associates";

      const doExport = (type, format) => {
        let rows = [], head = [], body = [];
        if (type === "revenue") {
          rows = filteredBills.map(b => { const cl = clients.find(c => c.id === b.clientId); const svc = services.find(s => s.id === b.serviceId); return { "Invoice No": b.invoiceNo, "Client": cl?.name || "", "Mobile": cl?.phone || "", "Service": svc?.serviceType || b.description || "", "Amount": b.total, "Paid": b.paid || 0, "Balance": (b.total || 0) - (b.paid || 0), "Status": b.status, "Date": fmtDate(b.date || b.createdAt), "Due": fmtDate(b.dueDate) } });
          head = [["Invoice No", "Client", "Mobile", "Service", "Amount", "Status", "Date", "Due"]];
          body = filteredBills.map(b => { const cl = clients.find(c => c.id === b.clientId); const svc = services.find(s => s.id === b.serviceId); return [b.invoiceNo, cl?.name || "", cl?.phone || "", svc?.serviceType || b.description || "", fmtMoney(b.total), b.status, fmtDate(b.date || b.createdAt), fmtDate(b.dueDate)] });
        } else if (type === "clients") {
          rows = clients.map(c => { const asgn = S.users.find(u => u.id === c.assignedTo); return { "ID": c.clientNo, "Name": c.name, "Type": c.type, "Mobile": c.phone || "", "Email": c.email || "", "GST": c.gstin || "", "PAN": c.pan || "", "Assigned": asgn?.name || "", "Status": c.status, "Joined": fmtDate(c.createdAt) } });
          head = [["ID", "Name", "Type", "Mobile", "Email", "GST", "Status"]];
          body = clients.map(c => [c.clientNo, c.name, c.type, c.phone || "", c.email || "", c.gstin || "", c.status]);
        } else {
          rows = tasks.map(t => { const cl = clients.find(c => c.id === t.clientId); const asgn = S.users.find(u => u.id === t.assignedTo); return { "Title": t.title, "Client": cl?.name || "", "Assigned": asgn?.name || "", "Priority": t.priority, "Status": t.status, "Due": fmtDate(t.dueDate) } });
          head = [["Title", "Client", "Assigned", "Priority", "Status", "Due"]];
          body = tasks.map(t => { const cl = clients.find(c => c.id === t.clientId); const asgn = S.users.find(u => u.id === t.assignedTo); return [t.title, cl?.name || "", asgn?.name || "", t.priority, t.status, fmtDate(t.dueDate)] });
        }
        if (!rows.length) { alert("No data to export"); return }
        const fname = "OM_" + type + "_" + today();
        if (format === "csv") exportCSV(rows, fname + ".csv");
        else if (format === "xlsx") exportXLSX(rows, fname + ".xlsx", type.charAt(0).toUpperCase() + type.slice(1));
        else if (format === "pdf") exportPDFTable((type === "revenue" ? "Revenue" : type === "clients" ? "Clients" : "Tasks") + " Report", head, body, fname + ".pdf", firm);
        else if (format === "print") { const totalLine = type === "revenue" ? "Total: " + fmtMoney(filteredBills.reduce((s, b) => s + (b.total || 0), 0)) : ""; printTable((type === "revenue" ? "Revenue" : type === "clients" ? "Clients" : "Tasks") + " Report", head[0], body, totalLine, firm); }
      };

      return <Page title="Reports & Analytics" subtitle="Firm-wide insights">
        <Tabs tabs={TABS} value={tab} onChange={setTab} style={{ marginBottom: 20 }} />

        {tab === "overview" && <div>
          <div className="stat-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 12, marginBottom: 18 }}>

              <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--text)", marginBottom: 16, fontFamily: "var(--font-serif)" }}>Task Status</div>

                  <div style={{ height: 6, borderRadius: 3, background: "rgba(255,255,255,0.05)" }}><div style={{ height: "100%", width: pct + "%", background: r.c, borderRadius: 3, transition: "width .6s ease" }} /></div>
                </div>;

            <div style={{ background: "var(--glass)", backdropFilter: "blur(20px)", border: "1px solid var(--border)", borderRadius: 14, padding: 18 }}>
              <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--text)", marginBottom: 16, fontFamily: "var(--font-serif)" }}>Revenue</div>
              {[["Total Billed", totalBilled, "var(--gold)"], ["Collected", totalPaid, "var(--green)"], ["Outstanding", totalOut, "var(--red)"]].map(([l, v, c]) => <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: "1px solid var(--border)", fontSize: 13 }}><span style={{ color: "var(--text2)" }}>{l}</span><span style={{ fontWeight: 700, color: c }}>{fmtMoney(v)}</span></div>)}
              <div style={{ marginTop: 14 }}>
                <div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 5, letterSpacing: ".05em", textTransform: "uppercase" }}>Collection Rate</div>
                <div style={{ height: 8, borderRadius: 4, background: "rgba(255,255,255,0.05)" }}><div style={{ height: "100%", width: (totalBilled > 0 ? totalPaid / totalBilled * 100 : 0) + "%", background: "linear-gradient(90deg,var(--gold),var(--green))", borderRadius: 4, transition: "width .6s" }} /></div>
                <div style={{ fontSize: 13, color: "var(--gold)", marginTop: 5, fontWeight: 700 }}>{totalBilled > 0 ? Math.round(totalPaid / totalBilled * 100) : 0}% collected</div>
              </div>
            </div>
          </div>
        </div>}

        {tab === "revenue" && <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 18 }} className="grid2">
            <KPI label="Total Billed" value={fmtMoney(totalBilled)} icon="💳" color="var(--gold)" />
            <KPI label="Collected" value={fmtMoney(totalPaid)} icon="✅" color="var(--green)" />
            <KPI label="Outstanding" value={fmtMoney(totalOut)} icon="⚠️" color="var(--red)" />
          </div>
          <div style={{ background: "var(--glass)", backdropFilter: "blur(20px)", border: "1px solid var(--border)", borderRadius: 14, padding: 18 }}>
            <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--text)", marginBottom: 16, fontFamily: "var(--font-serif)" }}>Revenue by Service Type</div>
            {svcRevenue.slice(0, 12).map(s => {
              const pct = totalBilled > 0 ? s.revenue / totalBilled * 100 : 0; return <div key={s.name} style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, marginBottom: 4 }}><span style={{ color: "var(--text2)" }}>{s.name} <span style={{ color: "var(--text3)" }}>({s.count})</span></span><span style={{ color: "var(--gold)", fontWeight: 700 }}>{fmtMoney(s.revenue)} ({pct.toFixed(1)}%)</span></div>
                <div style={{ height: 5, borderRadius: 3, background: "rgba(255,255,255,0.05)" }}><div style={{ height: "100%", width: pct + "%", background: "linear-gradient(90deg,var(--gold),var(--teal))", borderRadius: 3 }} /></div>
              </div>;
            })}
            {svcRevenue.length === 0 && <Empty icon="⚙️" text="No revenue data yet." />}
          </div>
        </div>}

        {tab === "tasks" && <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 18 }} className="stat-grid">
            <KPI label="Total" value={tasks.length} icon="📋" color="var(--gold)" />
            <KPI label="Completed" value={completedT} icon="✅" color="var(--green)" />
            <KPI label="In Progress" value={inProgT} icon="⚡" color="var(--blue)" />
            <KPI label="Overdue" value={overdueT} icon="🔴" color="var(--red)" />
          </div>
          <div style={{ background: "var(--glass)", backdropFilter: "blur(20px)", border: "1px solid var(--border)", borderRadius: 14, padding: 18 }}>
            <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--text)", marginBottom: 14, fontFamily: "var(--font-serif)" }}>Team Performance</div>
            <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 600 }}>
                <thead><tr style={{ borderBottom: "1px solid var(--border)" }}>
                  {["Member", "Role", "Clients", "Tasks", "Done", "Rate"].map(h => <th key={h} style={{ padding: "9px 12px", textAlign: "left", fontSize: 10.5, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".07em" }}>{h}</th>)}
                </tr></thead>
                <tbody>{userPerf.map((u, i) => <tr key={u.id} style={{ borderBottom: i < userPerf.length - 1 ? "1px solid var(--border)" : "none" }}>
                  <td style={{ padding: "10px 12px" }}><div style={{ display: "flex", alignItems: "center", gap: 8 }}><Avatar name={u.name} size={28} /><span style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>{u.name}</span></div></td>
                  <td style={{ padding: "10px 12px" }}><RoleBadge role={u.role} /></td>
                  <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, color: "var(--teal)" }}>{u.clientCount}</td>
                  <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, color: "var(--text2)" }}>{u.taskCount}</td>
                  <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, color: "var(--green)" }}>{u.done}</td>
                  <td style={{ padding: "10px 12px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ flex: 1, height: 6, borderRadius: 3, background: "rgba(255,255,255,0.05)" }}><div style={{ height: "100%", width: u.rate + "%", background: u.rate > 70 ? "var(--green)" : u.rate > 40 ? "var(--orange)" : "var(--red)", borderRadius: 3 }} /></div>
                      <span style={{ fontSize: 12, fontWeight: 700, color: "var(--text2)", minWidth: 34 }}>{u.rate}%</span>
                    </div>
                  </td>
                </tr>)}</tbody>
              </table>
            </div>
          </div>
        </div>}


        {tab === "clients" && <div style={{ display: "grid", gap: 14 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 10, marginBottom: 4 }}>
            {[{ l: "Total Clients", v: clients.length, c: "var(--gold)" }, { l: "Active", v: clients.filter(c => c.status === "active").length, c: "var(--green)" }, { l: "Inactive", v: clients.filter(c => c.status !== "active").length, c: "var(--red)" }, { l: "Companies", v: clients.filter(c => c.type === "Company").length, c: "var(--blue)" }, { l: "Individuals", v: clients.filter(c => c.type === "Individual").length, c: "var(--purple)" }, { l: "New This Month", v: clients.filter(c => { const d = new Date(c.createdAt); const n = new Date(); return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear(); }).length, c: "var(--teal)" }].map(({ l, v, c }) => (
              <div key={l} style={{ background: "var(--glass)", border: "1px solid var(--border)", borderRadius: 12, padding: "14px 16px" }}>
                <div style={{ fontSize: 24, fontWeight: 800, color: c, fontFamily: "var(--font-mono)" }}>{v}</div>
                <div style={{ fontSize: 11, color: "var(--text3)", fontWeight: 600, marginTop: 2 }}>{l}</div>
              </div>
            ))}
          </div>
          {/* Client acquisition monthly */}
          <div style={{ background: "var(--glass)", border: "1px solid var(--border)", borderRadius: 14, padding: 18 }}>
            <div style={{ fontSize: 13.5, fontWeight: 700, color: "var(--text)", marginBottom: 14 }}>📈 Client Acquisition (Last 12 Months)</div>
            <div style={{ display: "flex", gap: 4, alignItems: "flex-end", height: 100 }}>
              {monthlyData.map((m, i) => {
                const h = Math.max(3, Math.round(m.newC / Math.max(...monthlyData.map(x => x.newC), 1) * 80)); return <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                  <div title={m.newC + " new clients"} style={{ width: "100%", height: h, background: "linear-gradient(180deg,var(--teal),var(--blue))", borderRadius: "3px 3px 0 0", minHeight: m.newC > 0 ? 4 : 2, opacity: .85 }} />
                  <div style={{ fontSize: 8.5, color: "var(--text3)" }}>{m.label}</div>
                </div>;
              })}
            </div>
          </div>
          {/* Clients by assigned employee */}
          <div style={{ background: "var(--glass)", border: "1px solid var(--border)", borderRadius: 14, padding: 18 }}>
            <div style={{ fontSize: 13.5, fontWeight: 700, color: "var(--text)", marginBottom: 12 }}>👤 Clients by Assigned Employee</div>
            {S.users.filter(u => u.status === "active" && !u._deleted).map(u => {
              const cc = clients.filter(c => c.assignedTo === u.id && c.status === "active").length; const pct = clients.filter(c => c.status === "active").length > 0 ? Math.round(cc / clients.filter(c => c.status === "active").length * 100) : 0; return cc > 0 ? <div key={u.id} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, fontSize: 12.5 }}><span style={{ color: "var(--text2)", fontWeight: 500 }}>{u.name}</span><span style={{ fontWeight: 700, color: "var(--text)" }}>{cc} <span style={{ color: "var(--text3)", fontWeight: 400 }}>({pct}%)</span></span></div>
                <div style={{ height: 6, borderRadius: 3, background: "var(--glass3)", overflow: "hidden" }}><div style={{ height: "100%", width: pct + "%", background: "linear-gradient(90deg,var(--teal),var(--blue))", borderRadius: 3, transition: "width .5s" }} /></div>
              </div> : null;
            })}
          </div>
          {/* Client table */}
          <div style={{ background: "var(--glass)", border: "1px solid var(--border)", borderRadius: 14, overflow: "hidden" }}>
            <div style={{ padding: "12px 16px", fontWeight: 700, fontSize: 13, color: "var(--text)", borderBottom: "1px solid var(--border)" }}>Client Directory</div>
            <div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead><tr style={{ background: "rgba(255,255,255,0.02)" }}>{["Client", "Type", "Mobile", "Assigned To", "Services", "Invoices", "Total Billed", "Status"].map(h => <th key={h} style={{ padding: "9px 12px", textAlign: "left", fontSize: 10, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", whiteSpace: "nowrap" }}>{h}</th>)}</tr></thead>
              <tbody>{clients.slice(0, 50).map((c, i) => {

                  <td style={{ padding: "8px 12px", color: "var(--text2)" }}>{asgn?.name || "—"}</td>
                  <td style={{ padding: "8px 12px", textAlign: "center", fontWeight: 700, color: "var(--teal)" }}>{svcs}</td>
                  <td style={{ padding: "8px 12px", textAlign: "center", fontWeight: 700, color: "var(--blue)" }}>{invs.length}</td>
                  <td style={{ padding: "8px 12px", fontWeight: 700, color: "var(--gold)", fontFamily: "var(--font-mono)" }}>{fmtMoney(billed)}</td>

        {tab === "employees" && <div style={{ display: "grid", gap: 14 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 10 }}>
            {[{ l: "Total Staff", v: S.users.length, c: "var(--blue)" }, { l: "Active", v: S.users.filter(u => u.status === "active" && !u._deleted).length, c: "var(--green)" }, { l: "Managers", v: S.users.filter(u => u.role === "manager").length, c: "var(--purple)" }, { l: "Advocates", v: S.users.filter(u => u.role === "advocate").length, c: "var(--teal)" }].map(({ l, v, c }) => (
              <div key={l} style={{ background: "var(--glass)", border: "1px solid var(--border)", borderRadius: 12, padding: "14px 16px" }}>
                <div style={{ fontSize: 24, fontWeight: 800, color: c, fontFamily: "var(--font-mono)" }}>{v}</div>
                <div style={{ fontSize: 11, color: "var(--text3)", fontWeight: 600, marginTop: 2 }}>{l}</div>

          {/* Employee performance detailed table */}
          <div style={{ background: "var(--glass)", border: "1px solid var(--border)", borderRadius: 14, overflow: "hidden" }}>

            <div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse" }}>

        if (!form.name.trim()) e.name = "Required";
        if (!form.username.trim()) e.username = "Required";
        if (form.email && !/\S+@\S+\.\S+/.test(form.email)) e.email = "Invalid";
        if (!edit && form.password.length < 6) e.password = "Min 6 chars";
        if (S.users.some(u => u.id !== edit?.id && u.username?.toLowerCase() === form.username.toLowerCase())) e.username = "Taken";
        setErr(e); return !Object.keys(e).length;
      };

      const save = () => {
        if (!validate()) return;
        if (edit) {
          setS(p => ({ ...p, users: p.users.map(u => u.id === edit.id ? { ...u, ...form, passwordHash: form.password ? hashPw(form.password) : u.passwordHash } : u) }));
          audit(setS, user, "User Updated", form.name); toast("User updated!");
        } else {
          const nu = { id: uid("USR"), name: form.name, username: form.username, email: form.email, phone: form.phone, role: form.role, status: form.status, department: form.department, designation: form.designation, passwordHash: hashPw(form.password), joinedAt: now(), createdBy: user.id };
          setS(p => ({ ...p, users: [...p.users, nu] }));
          audit(setS, user, "User Created", form.name + " (" + form.role + ")"); toast("User " + form.name + " created!");
        }
        setModal(false);
      };

      const del = u => {
        if (u.id === user.id) { toast("Cannot delete yourself", "error"); return }
        if (S.users.filter(x => x.role === "admin").length <= 1 && u.role === "admin") { toast("Cannot delete last admin", "error"); return }
        if (!confirm("Delete user \"" + u.name + "\"? Cannot be undone.")) return;
        setS(p => ({ ...p, users: p.users.filter(x => x.id !== u.id) }));
        audit(setS, user, "User Deleted", u.name); toast("Deleted", "warn");
      };

      const openEdit = u => { setForm({ name: u.name, username: u.username || "", email: u.email || "", phone: u.phone || "", role: u.role, password: "", status: u.status, department: u.department || "", designation: u.designation || "" }); setEdit(u); setErr({}); setModal(true) };
      const openAdd = () => { setForm({ name: "", username: "", email: "", phone: "", role: "employee", password: "", status: "active", department: "", designation: "" }); setEdit(null); setErr({}); setModal(true) };

      const filtered = S.users.filter(u => !q || u.name.toLowerCase().includes(q.toLowerCase()) || u.username?.toLowerCase().includes(q.toLowerCase()) || u.email?.toLowerCase().includes(q.toLowerCase()));

      return <Page title="Users" subtitle={S.users.filter(u => u.status === "active" && !u._deleted).length + " active · " + S.users.length + " total"} action={<Btn onClick={openAdd}>＋ Add User</Btn>}>
        <SearchBar value={q} onChange={e => setQ(e.target.value)} placeholder="Search users…" style={{ marginBottom: 16 }} />
        <div style={{ background: "var(--glass)", backdropFilter: "blur(20px)", border: "1px solid var(--border)", borderRadius: 14, overflow: "hidden" }}>
          {filtered.sort((a, b) => a.name.localeCompare(b.name)).map((u, i) => <div key={u.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 18px", borderBottom: i < filtered.length - 1 ? "1px solid var(--border)" : "none", flexWrap: "wrap" }}>
            <Avatar name={u.name} size={38} />
            <div style={{ flex: 1, minWidth: 160 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: "var(--text)", display: "flex", alignItems: "center", gap: 8 }}>
                {u.name}{u.id === user.id && <span style={{ fontSize: 10, background: "var(--gold3)", color: "var(--gold)", padding: "1px 7px", borderRadius: 4, fontWeight: 600 }}>You</span>}
              </div>
              <div style={{ fontSize: 12, color: "var(--text3)", display: "flex", gap: 10, flexWrap: "wrap", marginTop: 2 }}>
                <span>@{u.username}</span>{u.email && <span>{u.email}</span>}{u.phone && <span>📞 {u.phone}</span>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <RoleBadge role={u.role} /><StatusBadge status={u.status} />
              <Btn v="glass" size="sm" onClick={() => openEdit(u)}>✏ Edit</Btn>
              <Btn v="blue" size="sm" onClick={() => { setResetU(u); setNewPw(""); setNewPw2(""); }}>🔑 Reset PW</Btn>
              {u.id !== user.id && <Btn v={u.status === "active" ? "danger" : "success"} size="sm" onClick={() => { setS(p => ({ ...p, users: p.users.map(x => x.id === u.id ? { ...x, status: x.status === "active" ? "inactive" : "active" } : x) })); toast(u.name + " " + (u.status === "active" ? "deactivated" : "activated")) }}>{u.status === "active" ? "Deactivate" : "Activate"}</Btn>}
              {u.id !== user.id && <Btn v="danger" size="sm" onClick={() => del(u)} title="Delete">🗑</Btn>}
            </div>
          </div>)}
          {filtered.length === 0 && <Empty icon="👤" text="No users found." />}
        </div>
        {modal && <Modal title={edit ? "Edit User" : "Add User"} onClose={() => setModal(false)} width={560}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
            <Field label="Full Name" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} required error={err.name} autoFocus />
            <Field label="Username" value={form.username} onChange={e => setForm(f => ({ ...f, username: e.target.value }))} required error={err.username} />
            <Field label="Email" type="email" value={form.email} onChange={e => setForm(f => ({ ...f, email: e.target.value }))} error={err.email} />
            <Field label="Phone" value={form.phone} onChange={e => setForm(f => ({ ...f, phone: e.target.value }))} />
            <Field label="Department" value={form.department} onChange={e => setForm(f => ({ ...f, department: e.target.value }))} placeholder="e.g. Accounts, Legal" />
            <Field label="Designation" value={form.designation} onChange={e => setForm(f => ({ ...f, designation: e.target.value }))} placeholder="e.g. Senior CA" />
            <Sel label="Role" value={form.role} onChange={e => setForm(f => ({ ...f, role: e.target.value }))} required options={Object.entries(ROLES).map(([k, v]) => ({ v: k, l: v.l }))} />
            <Sel label="Status" value={form.status} onChange={e => setForm(f => ({ ...f, status: e.target.value }))} options={["active", "inactive"]} />
            <Field label={edit ? "New Password (blank = keep)" : "Password"} type="password" value={form.password} onChange={e => setForm(f => ({ ...f, password: e.target.value }))} required={!edit} error={err.password} hint={!edit ? "Min 6 chars" : undefined} style={{ gridColumn: "1/-1" }} />
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}><Btn onClick={() => setModal(false)} v="ghost">Cancel</Btn><Btn onClick={save}>{edit ? "Save" : "Create"}</Btn></div>
        </Modal>}
        {resetU && <Modal title={"🔑 Reset Password — " + resetU.name} onClose={() => { setResetU(null); setNewPw(""); setNewPw2(""); }} width={420}>
          <div style={{ background: "rgba(79,142,247,0.07)", border: "1px solid rgba(79,142,247,0.2)", borderRadius: 9, padding: "10px 14px", marginBottom: 14, fontSize: 12.5, color: "var(--text2)", lineHeight: 1.8 }}>
            <b style={{ color: "var(--blue)" }}>Admin Password Reset</b><br />
            User: <b>{resetU.name}</b> (@{resetU.username})<br />
            New password set చేయండి — user next login లో use చేయవచ్చు.
          </div>
          <Field label="New Password" type="password" value={newPw} onChange={e => setNewPw(e.target.value)} placeholder="Min 6 characters" autoFocus hint="Min 6 characters" />
          <Field label="Confirm New Password" type="password" value={newPw2} onChange={e => setNewPw2(e.target.value)} placeholder="Repeat password" onKeyDown={e => e.key === "Enter" && doResetPw()} />
          {newPw && newPw2 && newPw !== newPw2 && <div style={{ fontSize: 12, color: "var(--red)", marginBottom: 8 }}>⚠ Passwords don't match</div>}
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
            <Btn onClick={() => { setResetU(null); setNewPw(""); setNewPw2(""); }} v="ghost">Cancel</Btn>
            <Btn onClick={doResetPw} disabled={newPw.length < 6 || newPw !== newPw2}>🔑 Reset Password</Btn>
          </div>
        </Modal>}
      </Page>;
    }

    /* ══ DATA RECOVERY PANEL — 5-Layer Storage Management ══ */
    function DataRecoveryPanel({ S, setS, toast }) {
      const [snaps, setSnaps] = useState([]);
      const [loading, setLoading] = useState(false);
      const [restoring, setRestoring] = useState(null);
      const [storInfo, setStorInfo] = useState({ ls: 0, idb: 0, snapsCount: 0 });

      const loadInfo = async () => {
        setLoading(true);
        const s = await getSnapshots();
        setSnaps(s);
        let lsSz = 0;
        try { Object.keys(localStorage).filter(k => k.startsWith(PFX)).forEach(k => { lsSz += (localStorage.getItem(k) || "").length; }); } catch (e) { }
        setStorInfo({ ls: Math.round(lsSz / 1024), snapsCount: s.length });
        setLoading(false);
      };
      useEffect(() => { loadInfo(); }, []);

      const doRestore = async (snap) => {
        if (!confirm("Restore this snapshot? Current unsaved data will be replaced.")) return;
        setRestoring(snap.ts);
        try {
          const data = JSON.parse(snap.data || "{}");
          if (!data || (!data.clients && !data.users)) { toast("Snapshot empty", "error"); setRestoring(null); return; }
          DATA_KEYS.forEach(k => { if (data[k] != null) ss(k, data[k]); });
          setS(prev => ({ ...prev, ...data }));
          if (_inited) await pushCloud(data).catch(() => { });
          toast("✅ Restored: " + ((data.clients || []).length) + " clients", "success");
        } catch (e) { toast("Restore failed: " + e.message, "error"); }
        setRestoring(null);
      };

      const forcePull = async () => {
        setLoading(true);
        try {
          const data = await pullCloud();
          if (data && data._ts) {
            _fromCloud = true;
            DATA_KEYS.forEach(k => { if (data[k] != null) ss(k, data[k]); });
            setS(prev => ({ ...prev, ...data }));
            clearTimeout(_fromCloudTimer); _fromCloudTimer = setTimeout(() => { _fromCloud = false; }, 800);
            await saveSnapshot(data, "manual-pull");
            toast("✅ Pulled from Firebase — " + (fromFB(data.clients) || []).length + " clients", "success");
          } else toast("Firebase has no data", "warn");
        } catch (e) { toast("Pull failed: " + e.message, "error"); }
        setLoading(false); loadInfo();
      };

      const forcePush = async () => {
        if (!confirm("Push ALL local data to Firebase? Cloud will be overwritten.")) return;
        setLoading(true);
        try {
          const ok = await pushCloud(S);
          if (ok) { await saveSnapshot(S, "manual-push"); toast("✅ Pushed to Firebase", "success"); }
          else toast("Push failed", "error");
        } catch (e) { toast("Push failed: " + e.message, "error"); }
        setLoading(false); loadInfo();
      };

      const makeSnap = async () => {
        await saveSnapshot(S, "manual-" + new Date().toLocaleTimeString("en-IN"));
        toast("✅ Snapshot saved", "success"); loadInfo();
      };

      const dataCount = { clients: S.clients?.length || 0, users: S.users?.length || 0, tasks: S.tasks?.length || 0, bills: S.bills?.length || 0, documents: S.documents?.length || 0, services: S.services?.length || 0 };
      const total = Object.values(dataCount).reduce((a, b) => a + b, 0);

      const LAYERS = [
        { icon: "⚡", name: "RAM Cache", desc: "Every keystroke saved", ok: true, color: "#6366f1" },
        { icon: "💾", name: "localStorage+LZ", desc: storInfo.ls + "KB stored, 70% compressed", ok: storInfo.ls > 0, color: "#3b82f6" },
        { icon: "🗄️", name: "IndexedDB", desc: "No size limit, survives cache clear", ok: true, color: "#10b981" },
        { icon: "📸", name: "10 Snapshots", desc: storInfo.snapsCount + " saved, auto every 3 min", ok: storInfo.snapsCount > 0, color: "#f59e0b" },
        { icon: "☁️", name: "Firebase RTDB", desc: _inited ? "Connected & syncing" : "Not connected", ok: _inited, color: "#c9a84c" },
      ];

      return <div>
        {/* Storage Health */}
        <div style={{ background: "linear-gradient(135deg,rgba(16,185,129,0.08),rgba(16,185,129,0.03))", border: "1px solid rgba(16,185,129,0.22)", borderRadius: 14, padding: 18, marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
            <div>
              <div style={{ fontSize: 14, fontWeight: 700, color: "var(--text)" }}>🛡️ 5-Layer Storage Health</div>
              <div style={{ fontSize: 12, color: "var(--text3)", marginTop: 2 }}>{total} total records — data never lost</div>
            </div>
            <button onClick={loadInfo} disabled={loading} style={{ background: "var(--glass2)", border: "1px solid var(--border)", borderRadius: 7, padding: "5px 12px", cursor: "pointer", fontSize: 12, color: "var(--text2)" }}>
              {loading ? "…" : "🔄 Refresh"}
            </button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 8, marginBottom: 14 }}>
            {LAYERS.map(l => <div key={l.name} style={{ background: l.ok ? "rgba(16,185,129,0.07)" : "var(--glass)", border: "1px solid " + (l.ok ? "rgba(16,185,129,0.2)" : "var(--border)"), borderRadius: 9, padding: "9px 8px", textAlign: "center" }}>
              <div style={{ fontSize: 20, marginBottom: 4 }}>{l.icon}</div>
              <div style={{ fontSize: 10.5, fontWeight: 700, color: "var(--text)", marginBottom: 2 }}>{l.name}</div>
              <div style={{ fontSize: 9.5, color: l.ok ? "var(--green)" : "var(--text3)" }}>{l.ok ? "✅ Active" : "⚠️ Empty"}</div>
              <div style={{ fontSize: 9, color: "var(--text3)", marginTop: 1, lineHeight: 1.3 }}>{l.desc}</div>
            </div>)}
          </div>
          <div style={{ background: "var(--glass)", borderRadius: 9, padding: "9px 12px", marginBottom: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".07em", marginBottom: 7 }}>Current Records</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 5 }}>
              {Object.entries(dataCount).map(([k, v]) => <div key={k} style={{ fontSize: 12 }}>
                <span style={{ color: "var(--text3)", textTransform: "capitalize" }}>{k}: </span>
                <span style={{ fontWeight: 700, color: v > 0 ? "var(--gold)" : "var(--text3)" }}>{v}</span>
              </div>)}
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button onClick={forcePull} disabled={!_inited || loading} style={{ flex: 1, padding: "9px", background: "rgba(79,142,247,0.1)", border: "1px solid rgba(79,142,247,0.25)", borderRadius: 9, color: "var(--blue)", cursor: "pointer", fontSize: 12.5, fontWeight: 600, opacity: !_inited ? 0.5 : 1 }}>☁️ Pull from Firebase</button>
            <button onClick={forcePush} disabled={!_inited || loading} style={{ flex: 1, padding: "9px", background: "rgba(16,185,129,0.08)", border: "1px solid rgba(16,185,129,0.25)", borderRadius: 9, color: "var(--green)", cursor: "pointer", fontSize: 12.5, fontWeight: 600, opacity: !_inited ? 0.5 : 1 }}>📤 Push to Firebase</button>
            <button onClick={makeSnap} style={{ flex: 1, padding: "9px", background: "var(--gold4)", border: "1px solid rgba(201,168,76,0.25)", borderRadius: 9, color: "var(--gold)", cursor: "pointer", fontSize: 12.5, fontWeight: 600 }}>📸 Save Snapshot</button>
          </div>
        </div>

        {/* Snapshots list */}
        <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, padding: 18 }}>
          <div style={{ fontSize: 13.5, fontWeight: 700, color: "var(--text)", marginBottom: 12 }}>📸 Version History — Last 10 Snapshots</div>
          {snaps.length === 0 ? <div style={{ textAlign: "center", padding: 20, color: "var(--text3)", fontSize: 13 }}>No snapshots yet — auto-saves every 3 minutes</div> :
            <div style={{ display: "grid", gap: 7 }}>
              {snaps.map(s => <div key={s.ts} style={{ display: "flex", alignItems: "center", gap: 11, padding: "9px 12px", background: "var(--glass)", border: "1px solid var(--border)", borderRadius: 9 }}
                onMouseEnter={e => e.currentTarget.style.borderColor = "var(--gold)"}
                onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}>
                <span style={{ fontSize: 18 }}>📸</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 12.5, fontWeight: 600, color: "var(--text)" }}>{new Date(s.ts).toLocaleString("en-IN")}</div>
                  <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 2 }}>{s.label} · {s.clients} clients · {s.tasks || 0} tasks · {Math.round((s.size || 0) / 1024)}KB</div>
                </div>
                <button onClick={() => doRestore(s)} disabled={restoring === s.ts}
                  style={{ background: "var(--gold4)", border: "1px solid rgba(201,168,76,0.25)", borderRadius: 7, padding: "5px 11px", cursor: "pointer", fontSize: 12, color: "var(--gold)", fontWeight: 600, whiteSpace: "nowrap" }}
                  onMouseEnter={e => e.currentTarget.style.background = "rgba(201,168,76,0.18)"}
                  onMouseLeave={e => e.currentTarget.style.background = "var(--gold4)"}>
                  {restoring === s.ts ? "Restoring…" : "↩ Restore"}
                </button>
              </div>)}
            </div>}
        </div>
      </div>;
    }


    /* ══ SETTINGS PAGE ══ */
    function SettingsPage({ S, setS, user, setUser, onSyncSave }) {
      const toast = useToast(); const [tab, setTab] = useState("account");
      const [pw, setPw] = useState({ old: "", new_: "", conf: "" }); const [firm, setFirm] = useState(S.settings);
      const isAdmin = user.role === "admin";
      const TABS = [{ v: "account", l: "Account" }, { v: "firm", l: "Firm" }, { v: "reminders", l: "🔔 Reminders" }, { v: "style", l: "🎨 Personalize" }, { v: "payments", l: "💳 Payments" }, { v: "system", l: "System" }, { v: "backup", l: "Backup" }, { v: "sync", l: "☁ Cloud Sync" }, { v: "install", l: "📲 Install" }];
      const [rzpKey, setRzpKeyInput] = useState(() => getRazorpayKey());

      const changePw = () => {
        if (hashPw(pw.old) !== user.passwordHash) { toast("Wrong current password", "error"); return }
        if (pw.new_.length < 6) { toast("Min 6 chars", "error"); return }
        if (pw.new_ !== pw.conf) { toast("Passwords don't match", "error"); return }
        const upd = S.users.map(u => u.id === user.id ? { ...u, passwordHash: hashPw(pw.new_) } : u);
        setS(p => ({ ...p, users: upd })); setUser(prev => ({ ...prev, passwordHash: hashPw(pw.new_) }));
        toast("Password changed!"); setPw({ old: "", new_: "", conf: "" });
      };

      const saveFirm = () => {
        const s = { ...S.settings, ...firm }; setS(p => ({ ...p, settings: s }));
        audit(setS, user, "Firm Settings Updated", ""); toast("Saved!");
      };

      const exportBackup = () => {
        const data = { ...S, exportedAt: now(), version: "6.0" };
        const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: "application/json" })); a.download = "OM_CRM_Backup_" + today() + ".json"; a.click();
        toast("Backup downloaded!");
      };

      /* v28: Export users so Backend can login without Firebase */
      const exportUsersForBackend = () => {
        const users = (S.users || []).filter(u => u.status === "active");
        const json = JSON.stringify(users, null, 2);
        // Also write to bridge key so Backend can read automatically
        try { localStorage.setItem("oma_backend_users_bridge", json); } catch (e) { }
        // Copy to clipboard
        navigator.clipboard?.writeText(json).then(() => {
          toast("✅ " + users.length + " users copied to clipboard! Paste in Backend → 🔄 Sync Users", "success");
        }).catch(() => {
          // Fallback: download
          const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([json], { type: "application/json" })); a.download = "CRM_Users_for_Backend.json"; a.click();
          toast("Downloaded users JSON for Backend", "success");
        });
      };

      const importBackup = e => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader(); r.onload = ev => {
          try {
            const d = JSON.parse(ev.target.result); if (!d.users || !d.clients) { toast("Invalid file", "error"); return }
            if (!confirm("Restore backup from " + fmtDate(d.exportedAt) + "? This replaces ALL current data.")) return;
            const { exportedAt, version, ...state } = d; Object.keys(state).forEach(k => ss(k, state[k]));
            toast("Restored! Reloading…"); setTimeout(() => window.location.reload(), 1200);
          } catch (e) { toast("Invalid backup file", "error") }
        }; r.readAsText(f); e.target.value = "";
      };

      const freshStart = async () => {
        if (!confirm("FRESH START: Delete ALL data from this device AND cloud?\nType OK to proceed.")) return;
        const r = prompt("Type RESET to confirm:"); if (r !== "RESET") return;
        ["clients", "services", "tasks", "documents", "bills", "payments", "messages", "activity", "notes", "users", "settings", "session"].forEach(k => { try { localStorage.removeItem(PFX + k) } catch (e) { } });
        if (_inited && _db) { try { await _db.ref("omcrm/" + SYNC_KEY).remove() } catch (e) { } }
        toast("Reset done! Reloading…", "warn"); setTimeout(() => window.location.reload(), 1500);
      };

      return <Page title="Settings">
        <Tabs tabs={isAdmin ? TABS : TABS.filter(t => t.v === "account")} value={tab} onChange={setTab} style={{ marginBottom: 20 }} />

        {tab === "account" && <div style={{ maxWidth: 480 }}>
          <div style={{ background: "var(--glass)", backdropFilter: "blur(20px)", border: "1px solid var(--border)", borderRadius: 14, padding: 20, marginBottom: 16 }}>
            <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--gold)", marginBottom: 16, fontFamily: "var(--font-serif)" }}>Account</div>
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 18 }}>
              <Avatar name={user.name} size={50} />
              <div>
                <div style={{ fontSize: 16, fontWeight: 700, color: "var(--text)" }}>{user.name}</div>
                <RoleBadge role={user.role} />
                <div style={{ fontSize: 12, color: "var(--text3)", marginTop: 4 }}>@{user.username}</div>
              </div>
            </div>
            {[["Email", user.email || "—"], ["Phone", user.phone || "—"], ["User ID", user.id]].map(([k, v]) => <div key={k} style={{ display: "flex", gap: 12, padding: "7px 0", borderTop: "1px solid var(--border)", fontSize: 13 }}><span style={{ color: "var(--text3)", minWidth: 70, fontWeight: 600 }}>{k}</span><span style={{ color: "var(--text2)", fontFamily: k === "User ID" ? "var(--font-mono)" : undefined, fontSize: k === "User ID" ? 11.5 : 13 }}>{v}</span></div>)}
          </div>
          <div style={{ background: "var(--glass)", backdropFilter: "blur(20px)", border: "1px solid var(--border)", borderRadius: 14, padding: 20 }}>

    /* ══ REMINDER SETTINGS ══ */
    function ReminderSettings({ S, setS, toast }) {
      const cfg = S.settings || {};
      const [enabled, setEnabled] = useState(cfg.autoReminderEnabled !== false);
      const [time, setTime] = useState(cfg.reminderTime || "09:00");
      const [days, setDays] = useState(cfg.reminderDaysBefore || [1, 3, 7]);
      const [notifPerm, setNotifPerm] = useState(typeof Notification !== "undefined" ? Notification.permission : "unsupported");
      const [waKey, setWaKey] = useState(cfg.callMeBotApiKey || "");
      const [waEnabled, setWaEnabled] = useState(cfg.autoWAEnabled !== false);
      const [waPhone, setWaPhone] = useState(cfg.firmPhone || "9581880088");
      const [cats, setCats] = useState({
        tasks: cfg.reminderTasks !== false,
        services: cfg.reminderServices !== false,
        gst: cfg.reminderGST !== false,
        billing: cfg.reminderBilling !== false,
      });

      const toggleDay = d => {
        setDays(prev => prev.includes(d) ? prev.filter(x => x !== d) : [...prev, d].sort((a, b) => a - b));
      };

      const save = () => {
        setS(p => ({
          ...p, settings: {

    function FloatingNotepad({ user }) {
      const [open, setOpen] = useState(false);

      const [tabs, setTabs] = useState(() => ls(key, [{ id: "t1", title: "Note 1", content: "" }]));
      const [active, setActive] = useState("t1");
      const [saved, setSaved] = useState(true);
      const timer = useRef(null);
      const persist = t => { ss(key, t); setSaved(true) };
      const update = val => { const u = tabs.map(t => t.id === active ? { ...t, content: val } : t); setTabs(u); setSaved(false); clearTimeout(timer.current); timer.current = setTimeout(() => persist(u), 600) };
      const addTab = () => { const id = "t" + Date.now(); const u = [...tabs, { id, title: "Note " + (tabs.length + 1), content: "" }]; setTabs(u); setActive(id); persist(u) };
      const renameTab = id => { const c = tabs.find(t => t.id === id)?.title || ""; const n = prompt("Rename tab:", c); if (!n) return; const u = tabs.map(t => t.id === id ? { ...t, title: n.trim().slice(0, 16) } : t); setTabs(u); persist(u) };
      const delTab = (id, e) => { e.stopPropagation(); if (tabs.length <= 1) return; const u = tabs.filter(t => t.id !== id); setTabs(u); if (active === id) setActive(u[0].id); persist(u) };
      const note = tabs.find(t => t.id === active) || tabs[0];
      useEffect(() => () => clearTimeout(timer.current), []);
      useEffect(() => {
        const handler = (e) => { if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === "N") { e.preventDefault(); setOpen(o => !o); } };
        document.addEventListener("keydown", handler);
        return () => document.removeEventListener("keydown", handler);
      }, []);

      if (!open) return <button onClick={() => setOpen(true)} title="Notes (Ctrl+Shift+N)" style={{ position: "fixed", bottom: 24, right: 24, width: 46, height: 46, borderRadius: "50%", background: "linear-gradient(135deg,var(--gold),#a07820)", border: "none", cursor: "pointer", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "var(--shadow2),var(--glow-gold)", zIndex: 800, color: "#fff" }}>📝</button>;

      return <div style={{ position: "fixed", bottom: 24, right: 24, width: 340, background: "var(--card2)", backdropFilter: "blur(24px)", border: "1px solid var(--border2)", borderRadius: 14, boxShadow: "var(--shadow2)", zIndex: 800, display: "flex", flexDirection: "column", maxHeight: 480, animation: "scaleIn .2s ease" }}>

          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: "var(--text)" }}>📝 My Notes</span>

    /* ══ MESSAGES (simplified) ══ */
    let _pc = null, _localStream = null, _callRef = null, _callUnsub = null, _screenStream = null;

    const initWebRTC = async (isVideo = false) => {
      try {
        const constraints = { audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 48000 }, video: isVideo ? { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } : false };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        _localStream = stream;
        _pc = new RTCPeerConnection({
          iceServers: [
            { urls: ["stun:stun.l.google.com:19302","stun:stun1.l.google.com:19302","stun:stun.cloudflare.com:3478"] },
            { urls: "stun:stun2.l.google.com:19302" },
          ],
          iceCandidatePoolSize: 10,
        });
        stream.getTracks().forEach(t => _pc.addTrack(t, stream));
        return { pc: _pc, stream };
      } catch (e) {
        throw new Error("Camera/Mic blocked. Allow access in browser settings.");
      }
    };

    const endCall = () => {
      try { _pc?.close(); } catch (e) { }
      _pc = null;
      try { _localStream?.getTracks().forEach(t => t.stop()); } catch (e) { }
      _localStream = null;
      try { _screenStream?.getTracks().forEach(t => t.stop()); } catch (e) { }
      _screenStream = null;
      if (_callRef) _callRef.remove().catch(() => { });
      if (_callUnsub) { _callUnsub(); _callUnsub = null; }
    };

    /* ═══════════════════════════════════════════════════════════
       MESSAGES PAGE — WhatsApp + Google Meet

    function MessagesPage({ S, setS, user }) {
      const toast = useToast();
      const [tab, setTab] = useState("direct");
      const [active, setActive] = useState(null);
      const [input, setInput] = useState("");
      const [replyTo, setReplyTo] = useState(null);
      const [msgMenu, setMsgMenu] = useState(null);// {id,x,y}
      const [reactions, setReactions] = useState({});// {msgId: {emoji:count}}
      const [callState, setCallState] = useState(null);
      const [callControls, setCallControls] = useState({ muted: false, videoOff: false, sharing: false, pip: false });
      const [incomingCall, setIncomingCall] = useState(null);
      const [showNewGroup, setShowNewGroup] = useState(false); const [showNotepad, setShowNotepad] = useState(false); const [notepadText, setNotepadText] = useState("");
      const [newGroupName, setNewGroupName] = useState("");
      const [newGroupMembers, setNewGroupMembers] = useState([]);
      const [searchQ, setSearchQ] = useState("");
      const [notifPerm, setNotifPerm] = useState(typeof Notification !== "undefined" ? Notification.permission : "unsupported");
      const inputRef = useRef(null);
      const bottomRef = useRef(null);
      const localVidRef = useRef(null);
      const remoteVidRef = useRef(null);
      const callListenRef = useRef(null);
      const [elapsed, setElapsed] = useState(0);
      const elapsedRef = useRef(null);

      const others = useMemo(() => S.users.filter(u => u.id !== user.id && u.status === "active"), [S.users, user.id]);
      const groups = S.groups || [];

      const getDMs = uid => (S.messages || []).filter(m =>
        (m.fromId === user.id && m.toId === uid && !m.groupId) ||
        (m.fromId === uid && m.toId === user.id && !m.groupId)
      ).sort((a, b) => new Date(a.at) - new Date(b.at));

      const getGroupMsgs = gid => (S.messages || []).filter(m => m.groupId === gid).sort((a, b) => new Date(a.at) - new Date(b.at));
      const unreadDM = uid => (S.messages || []).filter(m => m.fromId === uid && m.toId === user.id && !m.read && !m.groupId).length;
      const unreadGroup = gid => (S.messages || []).filter(m => m.groupId === gid && m.fromId !== user.id && !m.read).length;
      const lastDM = uid => { const ms = getDMs(uid); return ms[ms.length - 1] || null; };
      const lastGroup = gid => { const ms = getGroupMsgs(gid); return ms[ms.length - 1] || null; };

      const sortedDMs = [...others]
        .filter(u => !searchQ || u.name.toLowerCase().includes(searchQ.toLowerCase()))
        .sort((a, b) => {
          const ua = unreadDM(a.id), ub = unreadDM(b.id);
          if (ua !== ub) return ub - ua;
          return new Date(lastDM(b.id)?.at || 0) - new Date(lastDM(a.id)?.at || 0);
        });
      const sortedGroups = [...groups]
        .filter(g => g.members?.includes(user.id) && (!searchQ || g.name.toLowerCase().includes(searchQ.toLowerCase())))
        .sort((a, b) => new Date(lastGroup(b.id)?.at || 0) - new Date(lastGroup(a.id)?.at || 0));

      const activeMsgs = !active ? [] : active.isGroup ? getGroupMsgs(active.id) : getDMs(active.id);
      const activeGroup = groups.find(g => g.id === active?.id);

      // ── Send ──
      const send = () => {
        const b = input.trim(); if (!b || !active) return;
        const nm = {
          id: uid("MSG"), fromId: user.id, fromName: user.name,
          body: b, at: now(), read: false,
          ...(replyTo ? { replyTo: { id: replyTo.id, body: replyTo.body.slice(0, 60), fromName: replyTo.fromName } } : {}),
          ...(active.isGroup ? { groupId: active.id, groupName: active.name } : { toId: active.id, toName: active.name }),
        };
        setS(p => ({ ...p, messages: [...(p.messages || []), nm] }));
        setInput(""); setReplyTo(null);
        setTimeout(() => { inputRef.current?.focus(); bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, 50);
      };

      // ── Delete message ──
      const deleteMsg = id => {
        setS(p => ({ ...p, messages: (p.messages || []).filter(m => m.id !== id) }));
        setMsgMenu(null); toast("Message deleted", "warn");
      };

      // ── React to message ──
      const reactMsg = (msgId, emoji) => {
        setReactions(r => ({ ...r, [msgId]: { ...(r[msgId] || {}), [emoji]: ((r[msgId] || {})[emoji] || 0) + 1 } }));
        setMsgMenu(null);
      };

      // ── Mark read ──
      useEffect(() => {
        if (!active) return;
        setS(p => ({
          ...p, messages: (p.messages || []).map(m => {
            if (active.isGroup && m.groupId === active.id && m.fromId !== user.id) return { ...m, read: true };
            if (!active.isGroup && m.fromId === active.id && m.toId === user.id) return { ...m, read: true };
            return m;
          })
        }));
        setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
      }, [active]);

      // ── Create group ──
      const createGroup = () => {
        const name = newGroupName.trim(); if (!name) { toast("Group name required", "error"); return; }
        if (!newGroupMembers.length) { toast("Add at least 1 member", "error"); return; }
        const g = { id: uid("GRP"), name, createdBy: user.id, createdByName: user.name, members: [user.id, ...newGroupMembers], createdAt: now() };
        setS(p => ({ ...p, groups: [...(p.groups || []), g] }));
        setShowNewGroup(false); setNewGroupName(""); setNewGroupMembers([]);
        toast("✅ Group '" + name + "' created!");
        setActive({ id: g.id, name: g.name, isGroup: true }); setTab("groups");
      };

      // ── Call timer ──
      useEffect(() => {
        if (callState?.status === "connected") {
          setElapsed(0);
          elapsedRef.current = setInterval(() => setElapsed(t => t + 1), 1000);
        } else {
          clearInterval(elapsedRef.current); setElapsed(0);
        }
        return () => clearInterval(elapsedRef.current);
      }, [callState?.status]);

      const fmtElapsed = s => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;

      // ── Incoming call listener ──
      useEffect(() => {
        if (!_inited || !_db || !user?.id) return;
        const ref = _db.ref("omcrm/" + SYNC_KEY + "/calls/" + user.id);
        const h = snap => {
          if (!snap.exists()) { setIncomingCall(null); return; }
          const d = snap.val();
          if (d?.status === "ringing") {
            setIncomingCall({ callerId: d.callerId, callerName: d.callerName, isVideo: d.isVideo, callId: d.callId });
            sendBrowserNotif("Incoming " + (d.isVideo ? "Video" : "Voice") + " Call", d.callerName + " is calling", "📞", "incoming-call");
          } else setIncomingCall(null);
        };
        ref.on("value", h);
        return () => ref.off("value", h);
      }, [user?.id]);

      // ── Start call ──
      const startCall = async (peer, isVideo) => {
        if (!_inited || !_db) { toast("Firebase required for calls", "error"); return; }
        if (callState) { toast("Already in a call", "warn"); return; }
        try {
          toast("Starting " + (isVideo ? "video" : "voice") + " call…", "info");
          const { pc, stream } = await initWebRTC(isVideo);
          setTimeout(() => { if (localVidRef.current) localVidRef.current.srcObject = stream; }, 200);
          setLocalVid_unused(stream);
          const callId = uid("CALL");
          _callRef = _db.ref("omcrm/" + SYNC_KEY + "/calls/" + peer.id);
          pc.onicecandidate = e => { if (e.candidate) _db.ref("omcrm/" + SYNC_KEY + "/ice/" + peer.id + "/" + user.id).push(e.candidate.toJSON()); };
          pc.ontrack = e => { setTimeout(() => { if (remoteVidRef.current) remoteVidRef.current.srcObject = e.streams[0]; }, 200); };
          pc.onconnectionstatechange = () => {
            if (pc.connectionState === "connected") setCallState(p => p ? { ...p, status: "connected" } : p);
            if (["disconnected", "failed", "closed"].includes(pc.connectionState)) { endCall(); setCallState(null); }
          };
          const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: isVideo });
          await pc.setLocalDescription(offer);
          await _callRef.set({ status: "ringing", callerId: user.id, callerName: user.name, isVideo, callId, offer: { type: offer.type, sdp: offer.sdp } });
          setCallState({ type: "outgoing", peerId: peer.id, peerName: peer.name, status: "ringing", isVideo });
          // Listen for answer
          const ansRef = _db.ref("omcrm/" + SYNC_KEY + "/calls/" + user.id);
          const ah = snap => {
            if (!snap.exists()) return;
            const d = snap.val();
            if (d.status === "answered" && d.answer) {
              pc.setRemoteDescription(new RTCSessionDescription(d.answer)).then(() => {
                setCallState(p => p ? { ...p, status: "connected" } : p);
                _db.ref("omcrm/" + SYNC_KEY + "/ice/" + user.id + "/" + peer.id).on("child_added", s => { if (s.val()) pc.addIceCandidate(new RTCIceCandidate(s.val())).catch(() => { }); });

              endCall(); setCallState(null); toast(peer.name + " " + (d.status === "declined" ? "declined" : "ended the call"));
            }
          };
          ansRef.on("value", ah); callListenRef.current = () => ansRef.off("value", ah);
        } catch (e) { toast(e.message, "error"); endCall(); setCallState(null); }
      };
      const [localVid_unused, setLocalVid_unused] = useState(null);// for video stream tracking

      // ── Answer ──
      const answerCall = async () => {
        if (!incomingCall || !_inited || !_db) return;
        try {
          const snap = await _db.ref("omcrm/" + SYNC_KEY + "/calls/" + user.id).get();
          if (!snap.exists()) return;
          const d = snap.val();
          const { pc, stream } = await initWebRTC(d.isVideo);
          setTimeout(() => { if (localVidRef.current) localVidRef.current.srcObject = stream; }, 200);
          pc.onicecandidate = e => { if (e.candidate) _db.ref("omcrm/" + SYNC_KEY + "/ice/" + incomingCall.callerId + "/" + user.id).push(e.candidate.toJSON()); };
          pc.ontrack = e => { setTimeout(() => { if (remoteVidRef.current) remoteVidRef.current.srcObject = e.streams[0]; }, 200); };
          pc.onconnectionstatechange = () => {
            if (pc.connectionState === "connected") setCallState(p => p ? { ...p, status: "connected" } : p);
            if (["disconnected", "failed", "closed"].includes(pc.connectionState)) { endCall(); setCallState(null); }
          };
          await pc.setRemoteDescription(new RTCSessionDescription(d.offer));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await _db.ref("omcrm/" + SYNC_KEY + "/calls/" + incomingCall.callerId).update({ status: "answered", answer: { type: answer.type, sdp: answer.sdp } });
          _db.ref("omcrm/" + SYNC_KEY + "/ice/" + user.id + "/" + incomingCall.callerId).on("child_added", s => { if (s.val()) pc.addIceCandidate(new RTCIceCandidate(s.val())).catch(() => { }); });
          setCallState({ type: "incoming", peerId: incomingCall.callerId, peerName: incomingCall.callerName, status: "connected", isVideo: d.isVideo });
          setIncomingCall(null);
        } catch (e) { toast("Answer failed: " + e.message, "error"); endCall(); }
      };

      // ── Call controls ──
      const toggleMute = () => {
        _localStream?.getAudioTracks().forEach(t => t.enabled = callControls.muted);
