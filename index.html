              </div>}
              {callState.status === "connected" && <div style={{ position: "absolute", bottom: 10, left: 12, color: "#fff", fontSize: 12, background: "rgba(0,0,0,0.5)", padding: "4px 10px", borderRadius: 20, fontWeight: 600 }}>{callState.peerName}</div>}
              {callState.status === "connected" && <div style={{ position: "absolute", top: 12, right: 12, color: "#fff", fontSize: 12, background: "rgba(0,0,0,0.5)", padding: "4px 10px", borderRadius: 20 }}>{fmtElapsed(elapsed)}</div>}
            </div>

            {/* Local video (pip) */}
            {callState.isVideo && <div style={{ position: "absolute", bottom: 20, right: 20, width: 180, height: 120, borderRadius: 10, overflow: "hidden", background: "#3c4043", border: "2px solid rgba(255,255,255,0.2)", boxShadow: "0 4px 16px rgba(0,0,0,0.5)" }}>
              <video ref={localVidRef} autoPlay playsInline muted style={{ width: "100%", height: "100%", objectFit: "cover", transform: "scaleX(-1)", display: callControls.videoOff ? "none" : "block" }} />
              {callControls.videoOff && <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: "#9aa0a6", fontSize: 24 }}>📷</div>}
              <div style={{ position: "absolute", bottom: 4, left: 8, color: "#fff", fontSize: 11, background: "rgba(0,0,0,0.5)", padding: "2px 7px", borderRadius: 20 }}>{user.name} (You)</div>
            </div>}
          </div>

          {/* Meet-style controls bar */}
          <div style={{ background: "#292b2d", borderTop: "1px solid #3c4043", padding: "14px 24px", display: "flex", alignItems: "center", justifyContent: "center", gap: 10, width: "100%", flexShrink: 0, flexWrap: "wrap" }}>
            <div style={{ color: "#9aa0a6", fontSize: 12, marginRight: 8, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: callState.status === "connected" ? "#34d399" : "#f59e0b", display: "inline-block" }} />
              {callState.status === "connected" ? fmtElapsed(elapsed) : "Connecting…"}
            </div>
            <CtrlBtn onClick={toggleMute} active2={callControls.muted} icon={callControls.muted ? "🔇" : "🎙"} label={callControls.muted ? "Unmute" : "Mute"} />
            {callState.isVideo && <CtrlBtn onClick={toggleVideo} active2={callControls.videoOff} icon={callControls.videoOff ? "📷" : "🎥"} label={callControls.videoOff ? "Start cam" : "Stop cam"} />}
            <CtrlBtn onClick={toggleScreen} active2={callControls.sharing} icon={callControls.sharing ? "🛑" : "🖥"} label={callControls.sharing ? "Stop share" : "Share screen"} />
            <CtrlBtn onClick={hangUp} danger icon="📵" label="End call" />
          </div>
        </div>}

        {/* ══ INCOMING CALL ══ */}
        {incomingCall && !callState && <div style={{ position: "fixed", top: 20, right: 20, zIndex: 9998, background: "#292b2d", border: "1px solid #5f6368", borderRadius: 16, padding: "20px 22px", boxShadow: "0 12px 40px rgba(0,0,0,0.7)", minWidth: 290, animation: "scaleIn .25s ease" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
            <div style={{ width: 44, height: 44, borderRadius: "50%", background: "#5f6368", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{incomingCall.callerName?.[0]}</div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>{incomingCall.callerName}</div>
              <div style={{ fontSize: 12, color: "#9aa0a6" }}>{incomingCall.isVideo ? "📹 Video" : "📞 Voice"} call incoming…</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={answerCall} style={{ flex: 1, padding: "11px", borderRadius: 50, border: "none", background: "#22c55e", color: "#fff", cursor: "pointer", fontSize: 20 }} title="Answer">📞</button>
            <button onClick={() => { if (_inited && _db) _db.ref("omcrm/" + SYNC_KEY + "/calls/" + user.id).update({ status: "declined" }).catch(() => { }); setIncomingCall(null); }} style={{ flex: 1, padding: "11px", borderRadius: 50, border: "none", background: "#ef4444", color: "#fff", cursor: "pointer", fontSize: 20 }} title="Decline">📵</button>
          </div>
        </div>}

        {/* ══ SIDEBAR ══ */}
        <div style={{ width: 268, flexShrink: 0, borderRight: "1px solid var(--border)", display: "flex", flexDirection: "column", background: "var(--bg2)" }}>
          <div style={{ padding: "14px", borderBottom: "1px solid var(--border)" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 15, fontWeight: 700, color: "var(--text)" }}>💬 Messages</span>
                {((S.messages||[]).filter(m=>m.toId===user.id&&!m.read&&!m._deleted).length + (S.messages||[]).filter(m=>m.groupId&&m.fromId!==user.id&&!m.read&&!m._deleted).length) > 0 &&
                  <span style={{ background:"var(--red)", color:"#fff", borderRadius:20, fontSize:10, padding:"2px 7px", fontWeight:700, minWidth:18, textAlign:"center" }}>
                    {Math.min(99,(S.messages||[]).filter(m=>(m.toId===user.id||m.groupId)&&m.fromId!==user.id&&!m.read&&!m._deleted).length)}
                  </span>}
              </div>
              {notifPerm !== "granted" && <button onClick={requestNotif} style={{ background: "rgba(201,168,76,0.1)", border: "1px solid rgba(201,168,76,0.3)", borderRadius: 7, padding: "3px 8px", cursor: "pointer", fontSize: 11, color: "var(--gold)", fontWeight: 600 }}>🔔 Allow</button>}
            </div>
            {/* Tabs */}
            <div style={{ display: "flex", gap: 0, borderRadius: 8, overflow: "hidden", border: "1px solid var(--border)", marginBottom: 10 }}>
              {["direct", "groups"].map(t => <button key={t} onClick={() => { setTab(t); setActive(null); }}
                style={{ flex: 1, padding: "7px", border: "none", background: tab === t ? "var(--gold3)" : "transparent", color: tab === t ? "var(--gold)" : "var(--text3)", fontSize: 12.5, fontWeight: tab === t ? 700 : 500, cursor: "pointer", transition: "all .15s", textTransform: "capitalize" }}>
                {t === "direct" ? "👤 DMs" : "👥 Groups"}
              </button>)}
            </div>
            {/* Search */}
            <input value={searchQ} onChange={e => setSearchQ(e.target.value)} placeholder="🔍 Search…"
              style={{ width: "100%", padding: "7px 12px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--glass2)", color: "var(--text)", fontSize: 12.5, outline: "none", boxSizing: "border-box" }} />
          </div>
          <div style={{ flex: 1, overflowY: "auto" }}>
            {tab === "all"
              ? <div>{[...(S.messages || [])].sort((a, b) => new Date(b.at) - new Date(a.at)).slice(0, 60).map(m => { const isMe2 = m.fromId === user.id; return <div key={m.id} onClick={() => { if (m.groupId) { setActive({ id: m.groupId, name: m.groupName || "Group", isGroup: true }); setTab("groups"); } else { const oid = isMe2 ? m.toId : m.fromId; setActive({ id: oid, name: isMe2 ? m.toName : m.fromName, isGroup: false }); setTab("direct"); } }} style={{ padding: "10px 14px", borderBottom: "1px solid var(--border)", cursor: "pointer", display: "flex", gap: 10, alignItems: "center" }}><Avatar name={m.groupId ? m.groupName : isMe2 ? m.toName : m.fromName} size={36} /><div style={{ flex: 1, minWidth: 0 }}><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 1 }}><span style={{ fontSize: 12.5, fontWeight: 600, color: "var(--text)" }}>{m.groupId ? "👥 " + (m.groupName || "Group") : isMe2 ? "→ " + (m.toName || "?") : "👤 " + (m.fromName || "?")}</span><span style={{ fontSize: 10, color: "var(--text3)" }}>{new Date(m.at).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: true })}</span></div><div style={{ fontSize: 11.5, color: isMe2 ? "var(--text3)" : "var(--text2)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{isMe2 && <span style={{ color: "var(--teal)", marginRight: 3 }}>You: </span>}{m.body || "[file]"}</div></div></div>; })}
                {!(S.messages || []).length && <div style={{ textAlign: "center", padding: 32, color: "var(--text3)", fontSize: 13 }}>No messages yet</div>}
              </div>
              : tab === "direct" ? sortedDMs.map(u2 => {
                const un = unreadDM(u2.id); const last2 = lastDM(u2.id); const isAct = active?.id === u2.id && !active?.isGroup;
                return <div key={u2.id} onClick={() => setActive({ id: u2.id, name: u2.name, isGroup: false })}
                  style={{ padding: "11px 14px", cursor: "pointer", display: "flex", gap: 10, alignItems: "center", background: isAct ? "var(--glass2)" : "transparent", borderRadius: 0, transition: "background .15s" }}
                  onMouseEnter={e => { if (!isAct) e.currentTarget.style.background = "var(--glass)"; }}
                  onMouseLeave={e => { if (!isAct) e.currentTarget.style.background = "transparent"; }}>
                  <div style={{ position: "relative", flexShrink: 0 }}>
                    <Avatar name={u2.name} size={40} />
                    <div style={{ position: "absolute", bottom: 0, right: 0, width: 11, height: 11, borderRadius: "50%", background: "var(--green)", border: "2px solid var(--card)" }} />
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ fontSize: 13, fontWeight: un ? 700 : 500, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{u2.name}</span>
                      {last2 && <span style={{ fontSize: 10, color: "var(--text3)", flexShrink: 0 }}>{new Date(last2.at).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: true })}</span>}
                    </div>
                    <div style={{ fontSize: 11.5, color: un ? "var(--text2)" : "var(--text3)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{last2 ? last2.body : "Tap to message"}</div>
                  </div>
                  {un > 0 && <span style={{ background: "var(--gold)", color: "#000", borderRadius: 20, fontSize: 10, padding: "2px 7px", fontWeight: 800 }}>{un}</span>}
                </div>;
              })
                : <>
                  <div style={{ padding: "8px 14px" }}>
                    <button onClick={() => setShowNewGroup(true)} style={{ width: "100%", padding: "9px", borderRadius: 9, border: "1px dashed rgba(201,168,76,0.3)", background: "rgba(201,168,76,0.05)", color: "var(--gold)", cursor: "pointer", fontSize: 12.5, fontWeight: 600 }}
                      onMouseEnter={e => e.currentTarget.style.background = "rgba(201,168,76,0.12)"}
                      onMouseLeave={e => e.currentTarget.style.background = "rgba(201,168,76,0.05)"}>＋ New Group</button>
                  </div>
                  {sortedGroups.map(g => {
                    const un = unreadGroup(g.id); const last2 = lastGroup(g.id); const isAct = active?.id === g.id && active?.isGroup;
                    return <div key={g.id} onClick={() => setActive({ id: g.id, name: g.name, isGroup: true })}
                      style={{ padding: "11px 14px", cursor: "pointer", display: "flex", gap: 10, alignItems: "center", background: isAct ? "var(--glass2)" : "transparent", transition: "background .15s" }}
                      onMouseEnter={e => { if (!isAct) e.currentTarget.style.background = "var(--glass)"; }}
                      onMouseLeave={e => { if (!isAct) e.currentTarget.style.background = "transparent"; }}>
                      <div style={{ width: 40, height: 40, borderRadius: "50%", background: "linear-gradient(135deg,rgba(99,102,241,0.18),rgba(168,85,247,0.18))", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>👥</div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ fontSize: 13, fontWeight: un ? 700 : 500, color: "var(--text)" }}>{g.name}</span>
                          {last2 && <span style={{ fontSize: 10, color: "var(--text3)" }}>{new Date(last2.at).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: true })}</span>}
                        </div>
                        <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 1 }}>{g.members?.length || 0} members</div>
                      </div>
                      {un > 0 && <span style={{ background: "var(--gold)", color: "#000", borderRadius: 20, fontSize: 10, padding: "2px 7px", fontWeight: 800 }}>{un}</span>}
                    </div>;
                  })}
                </>}
          </div>
        </div>

        {/* ══ CHAT AREA ══ */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, position: "relative" }}>
          {!active
            ? <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, color: "var(--text3)" }}>
              <div style={{ fontSize: 64 }}>💬</div>
              <div style={{ fontSize: 17, fontWeight: 700, color: "var(--text)" }}>Select a conversation</div>
              <div style={{ fontSize: 13 }}>Choose from left to start chatting</div>
            </div>
            : <>
              {/* Chat header */}
              <div style={{ padding: "12px 16px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 12, background: "var(--bg2)", flexShrink: 0 }}>
                {active.isGroup
                  ? <div style={{ width: 42, height: 42, borderRadius: "50%", background: "linear-gradient(135deg,rgba(99,102,241,0.18),rgba(99,102,241,0.06))", border: "1px solid rgba(99,102,241,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>👥</div>
                  : <div style={{ position: "relative" }}><Avatar name={active.name} size={42} /><div style={{ position: "absolute", bottom: 0, right: 0, width: 11, height: 11, borderRadius: "50%", background: "var(--green)", border: "2px solid var(--bg2)" }} /></div>
                }
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "var(--text)" }}>{active.name}</div>
                  <div style={{ fontSize: 11.5, color: "var(--text3)" }}>{active.isGroup ? (activeGroup?.members?.length || 0) + " members" : others.find(o => o.id === active.id)?.role || "Team Member"}</div>
                </div>
                {!active.isGroup && <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => startCall({ id: active.id, name: active.name }, false)} title="Voice Call"
                    style={{ width: 38, height: 38, borderRadius: "50%", border: "none", background: "rgba(34,197,94,0.12)", cursor: "pointer", fontSize: 17, display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s" }}
                    onMouseEnter={e => e.currentTarget.style.background = "rgba(34,197,94,0.22)"}
                    onMouseLeave={e => e.currentTarget.style.background = "rgba(34,197,94,0.12)"}>📞</button>
                  <button onClick={() => startCall({ id: active.id, name: active.name }, true)} title="Video Call"
                    style={{ width: 38, height: 38, borderRadius: "50%", border: "none", background: "rgba(99,102,241,0.12)", cursor: "pointer", fontSize: 17, display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s" }}
                    onMouseEnter={e => e.currentTarget.style.background = "rgba(99,102,241,0.22)"}
                    onMouseLeave={e => e.currentTarget.style.background = "rgba(99,102,241,0.12)"}>🎥</button>
                </div>}
              </div>

              {/* Messages */}
              <div style={{ flex: 1, overflowY: "auto", padding: "16px", display: "flex", flexDirection: "column", gap: 3 }} className="page-scroll">
                {activeMsgs.length === 0 && <div style={{ textAlign: "center", color: "var(--text3)", fontSize: 13, marginTop: 40, lineHeight: 2 }}>
                  <div style={{ fontSize: 40, marginBottom: 8 }}>💬</div>
                  No messages yet<br />Say hello! 👋
                </div>}
                {activeMsgs.map((m, i) => {
                  const isMe = m.fromId === user.id;
                  const showName = active.isGroup && !isMe;
                  const msgReactions = reactions[m.id] || {};
                  const hasReactions = Object.keys(msgReactions).some(k => msgReactions[k] > 0);
                  return <div key={m.id} style={{ display: "flex", flexDirection: "column", alignItems: isMe ? "flex-end" : "flex-start", marginBottom: 2, animation: "fadeIn .15s ease", position: "relative" }}>
                    {showName && <div style={{ fontSize: 10.5, color: "var(--text3)", marginBottom: 3, paddingLeft: 8, fontWeight: 600 }}>{m.fromName}</div>}

                    {/* Reply preview */}
                    {m.replyTo && <div style={{ fontSize: 11, color: "var(--text3)", padding: "3px 10px", borderLeft: "3px solid var(--gold)", background: "var(--glass)", borderRadius: 6, marginBottom: 3, maxWidth: "60%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      <span style={{ fontWeight: 600 }}>{m.replyTo.fromName}: </span>{m.replyTo.body}
                    </div>}

                    <div style={{ display: "flex", alignItems: "flex-end", gap: 5, flexDirection: isMe ? "row-reverse" : "row", maxWidth: "75%" }}
                      onContextMenu={e => { e.preventDefault(); setMsgMenu({ id: m.id, x: e.clientX, y: e.clientY, isMe, msg: m }); }}>
                      {!isMe && !active.isGroup && <Avatar name={m.fromName} size={26} />}
                      <div style={{
                        padding: m.fileData ? "6px" : "9px 13px", borderRadius: isMe ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
                        background: isMe ? "linear-gradient(135deg,var(--gold),#8b6010)" : "var(--card)",
                        color: isMe ? "#fff" : "var(--text)", fontSize: 13.5, lineHeight: 1.55,
                        boxShadow: "0 1px 4px rgba(0,0,0,0.12)", cursor: "context-menu", userSelect: "text", overflow: "hidden",
                        maxWidth: "100%"
                      }}>
                        {m.fileData && m.fileType?.startsWith("image/") ?
                          /* ── Image: auto preview inline ── */
                          <div style={{ cursor: "pointer" }} onClick={() => window.open(m.fileData, "_blank")}>
                            <img src={m.fileData} alt={m.fileName}
                              style={{ maxWidth: 260, maxHeight: 220, borderRadius: 10, display: "block", objectFit: "cover" }} />
                            <div style={{ fontSize: 10, marginTop: 4, opacity: .75, padding: "0 2px" }}>{m.fileName}</div>
                          </div>
                          : m.fileData && m.fileType === "application/pdf" ?
                            /* ── PDF: inline iframe preview ── */
                            <div style={{ width: 280 }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "4px 6px", marginBottom: 4 }}>
                                <span style={{ fontSize: 20 }}>📕</span>
                                <div style={{ fontSize: 12, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{m.fileName}</div>
                              </div>
                              <iframe src={m.fileData} style={{ width: "100%", height: 200, borderRadius: 8, border: "none", background: "#fff" }} title={m.fileName} />
                              <div style={{ display: "flex", gap: 6, marginTop: 5, padding: "0 2px" }}>
                                <a href={m.fileData} target="_blank" rel="noreferrer"
                                  style={{ fontSize: 11, color: isMe ? "rgba(255,255,255,0.9)" : "var(--blue)", textDecoration: "none", fontWeight: 600, padding: "3px 8px", background: isMe ? "rgba(255,255,255,0.15)" : "var(--blue2)", borderRadius: 5 }}>👁 Full View</a>
                                <a href={m.fileData} download={m.fileName}
                                  style={{ fontSize: 11, color: isMe ? "rgba(255,255,255,0.7)" : "var(--text3)", textDecoration: "none", padding: "3px 8px", background: "var(--glass2)", borderRadius: 5 }}>⬇ Save</a>
                              </div>
                            </div>
                            : m.fileData && m.fileType?.startsWith("video/") ?
                              /* ── Video: inline player ── */
                              <div style={{ width: 280 }}>
                                <video src={m.fileData} controls style={{ width: "100%", borderRadius: 10, maxHeight: 180 }} preload="metadata" />
                                <div style={{ fontSize: 10, marginTop: 3, opacity: .7, padding: "0 2px" }}>{m.fileName}</div>
                              </div>
                              : m.fileData && m.fileType?.startsWith("audio/") ?
                                /* ── Audio: inline player ── */
                                <div style={{ minWidth: 240 }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                                    <span style={{ fontSize: 20 }}>🎵</span>
                                    <div style={{ fontSize: 12, fontWeight: 700, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.fileName}</div>
                                  </div>
                                  <audio src={m.fileData} controls style={{ width: "100%", height: 36 }} />
                                </div>
                                : m.fileData ?
                                  /* ── Other files: icon + view/download ── */
                                  <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 8px", minWidth: 200, maxWidth: 260 }}>
                                    <span style={{ fontSize: 28, flexShrink: 0 }}>
                                      {/\.(doc|docx)$/i.test(m.fileName || "") ? "📝"
                                        : /\.(xls|xlsx|csv)$/i.test(m.fileName || "") ? "📊"
                                          : /\.(ppt|pptx)$/i.test(m.fileName || "") ? "📽"
                                            : /\.(zip|rar|7z)$/i.test(m.fileName || "") ? "📦"
                                              : /\.(mp4|avi|mov|mkv)$/i.test(m.fileName || "") ? "🎬"
                                                : /\.(mp3|wav|ogg|aac)$/i.test(m.fileName || "") ? "🎵"
                                                  : "📄"}
                                    </span>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                      <div style={{ fontSize: 12.5, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.fileName}</div>
                                      <div style={{ fontSize: 10.5, opacity: .7, marginTop: 2 }}>{m.fileSize ? Math.round(m.fileSize / 1024) + "KB" : ""}</div>
                                      <div style={{ display: "flex", gap: 6, marginTop: 5 }}>
                                        <a href={m.fileData} target="_blank" rel="noreferrer"
                                          style={{ fontSize: 11, color: isMe ? "rgba(255,255,255,0.9)" : "var(--blue)", textDecoration: "none", fontWeight: 600, padding: "2px 8px", background: isMe ? "rgba(255,255,255,0.15)" : "var(--blue2)", borderRadius: 5 }}>👁 View</a>
                                        <a href={m.fileData} download={m.fileName}
                                          style={{ fontSize: 11, color: isMe ? "rgba(255,255,255,0.7)" : "var(--text3)", textDecoration: "none", padding: "2px 8px", background: "var(--glass2)", borderRadius: 5 }}>⬇ Save</a>
                                      </div>
                                    </div>
                                  </div>
                                  : m.body}
                      </div>
                    </div>

                    {/* Time + read receipt */}
                    <div style={{ fontSize: 10, color: "var(--text3)", marginTop: 2, paddingLeft: isMe ? 0 : 32, textAlign: isMe ? "right" : "left", display: "flex", alignItems: "center", gap: 4, flexDirection: isMe ? "row-reverse" : "row" }}>
                      {new Date(m.at).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" })}
                      {isMe && <span style={{ color: m.read ? "var(--blue)" : "var(--text3)", fontSize: 11 }}>✓✓</span>}
                    </div>

                    {/* Emoji reactions */}
                    {hasReactions && <div style={{ display: "flex", gap: 3, marginTop: 2, flexDirection: isMe ? "row-reverse" : "row" }}>
                      {Object.entries(msgReactions).filter(([, c]) => c > 0).map(([e, c]) => <span key={e} style={{ background: "var(--glass2)", border: "1px solid var(--border)", borderRadius: 20, padding: "1px 7px", fontSize: 12, cursor: "pointer" }} onClick={() => reactMsg(m.id, e)}>{e} {c}</span>)}
                    </div>}
                  </div>;
                })}
                <div ref={bottomRef} />
              </div>

              {/* Reply bar */}
              {replyTo && <div style={{ padding: "8px 16px", background: "var(--glass2)", borderTop: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                <div style={{ flex: 1, borderLeft: "3px solid var(--gold)", paddingLeft: 8, fontSize: 12, color: "var(--text2)" }}>
                  <span style={{ fontWeight: 600 }}>{replyTo.fromName}: </span>{replyTo.body.slice(0, 80)}
                </div>
                <button onClick={() => setReplyTo(null)} style={{ background: "none", border: "none", color: "var(--text3)", cursor: "pointer", fontSize: 16 }}>×</button>
              </div>}

              {/* Input */}
              {showNotepad && <div style={{ padding: "10px 14px", borderTop: "1px solid var(--border)", background: "var(--glass)", animation: "fadeIn .15s ease" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 6, display: "flex", justifyContent: "space-between" }}>
                  <span>📝 Quick Note</span>
                  <button onClick={() => setShowNotepad(false)} style={{ background: "none", border: "none", color: "var(--text3)", cursor: "pointer", fontSize: 14 }}>✕</button>
                </div>
                <textarea value={notepadText} onChange={e => setNotepadText(e.target.value)} placeholder="Type a quick note…" rows={3}
                  style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--glass2)", color: "var(--text)", fontSize: 13, resize: "vertical", fontFamily: "var(--font)" }} />
                <div style={{ display: "flex", gap: 6, marginTop: 6, justifyContent: "flex-end" }}>
                  <button onClick={() => { if (notepadText.trim()) { setInput(notepadText.trim()); setNotepadText(""); setShowNotepad(false); } }} style={{ padding: "5px 12px", borderRadius: 7, border: "none", background: "var(--gold3)", color: "var(--gold)", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>↗ Copy to Message</button>
                  <button onClick={() => setNotepadText("")} style={{ padding: "5px 12px", borderRadius: 7, border: "1px solid var(--border)", background: "none", color: "var(--text3)", cursor: "pointer", fontSize: 12 }}>Clear</button>
                </div>
              </div>}
              <div className="msg-input-bar" style={{ padding: "10px 14px", borderTop: "1px solid var(--border)", display: "flex", gap: 8, alignItems: "center", flexShrink: 0 }}>
                {/* Attachment button */}
                <button onClick={() => setShowNotepad(v => !v)} title="Notepad" style={{ width: 38, height: 38, borderRadius: "50%", border: "1px solid var(--border2)", background: "var(--glass2)", color: "var(--text2)", cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>📝</button>
                <label title="Attach image/document (max 2MB)" style={{ cursor: "pointer", flexShrink: 0 }}>
                  <div style={{ width: 38, height: 38, borderRadius: "50%", border: "1px solid var(--border2)", background: "var(--glass2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, transition: "all .15s" }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = "var(--gold)"}
                    onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border2)"}>📎</div>
                  <input type="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" style={{ display: "none" }} onChange={e => {
                    const file = e.target.files[0]; if (!file) return;
                    if (file.size > 2 * 1024 * 1024) { toast("Max 2MB file size", "error"); return; }
                    const reader = new FileReader();
                    reader.onload = ev => {
                      const nm = {
                        id: uid("MSG"), fromId: user.id, fromName: user.name,
                        body: "[📎 " + file.name + "]",
                        fileData: ev.target.result, fileName: file.name, fileType: file.type,
                        at: now(), read: false,
                        ...(active.isGroup ? { groupId: active.id, groupName: active.name } : { toId: active.id, toName: active.name }),
                      };
                      setS(p => ({ ...p, messages: [...(p.messages || []), nm] }));
                      toast("✅ File sent: " + file.name, "success");
                      setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
                    };
                    reader.readAsDataURL(file);
                    e.target.value = "";
                  }} />
                </label>
                <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
                  placeholder={active.isGroup ? "Message " + active.name + "…" : "Message " + active.name + "…"}
                  style={{ flex: 1, padding: "11px 16px", borderRadius: 24, border: "1px solid var(--border2)", background: "var(--glass2)", color: "var(--text)", fontSize: 14, outline: "none", fontFamily: "var(--font)", transition: "border .15s" }}
                  onFocus={e => e.target.style.borderColor = "var(--gold)"}
                  onBlur={e => e.target.style.borderColor = "var(--border2)"} />
                <button onClick={send} disabled={!input.trim() && !active}
                  style={{ width: 44, height: 44, borderRadius: "50%", border: "none", background: input.trim() ? "linear-gradient(135deg,var(--gold),#8b6010)" : "var(--glass2)", cursor: input.trim() ? "pointer" : "default", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s", flexShrink: 0, boxShadow: input.trim() ? "0 2px 12px rgba(201,168,76,0.4)" : "none" }}>
                  ➤
                </button>
              </div>
            </>}
        </div>

        {/* ══ WHATSAPP-STYLE MESSAGE CONTEXT MENU ══ */}
        {msgMenu && <div style={{ position: "fixed", top: msgMenu.y, left: Math.min(msgMenu.x, window.innerWidth - 200), zIndex: 9997, background: "var(--card2)", border: "1px solid var(--border2)", borderRadius: 12, boxShadow: "0 8px 32px rgba(0,0,0,0.4)", padding: 6, minWidth: 180, animation: "scaleIn .1s ease" }}
          onClick={e => e.stopPropagation()}>
          {/* Emoji reactions */}
          <div style={{ display: "flex", gap: 3, padding: "6px 8px", borderBottom: "1px solid var(--border)", justifyContent: "center" }}>
            {EMOJIS.map(e => <button key={e} onClick={() => reactMsg(msgMenu.id, e)}
              style={{ background: "none", border: "none", cursor: "pointer", fontSize: 20, padding: "2px 4px", borderRadius: 6, transition: "transform .1s" }}
              onMouseEnter={ev => ev.currentTarget.style.transform = "scale(1.3)"}
              onMouseLeave={ev => ev.currentTarget.style.transform = "scale(1)"}>{e}</button>)}
          </div>
          {[
            { icon: "↩", label: "Reply", fn: () => { const msg = activeMsgs.find(m => m.id === msgMenu.id); if (msg) setReplyTo(msg); setMsgMenu(null); } },
            { icon: "📋", label: "Copy", fn: () => { navigator.clipboard?.writeText(activeMsgs.find(m => m.id === msgMenu.id)?.body || ""); setMsgMenu(null); toast("Copied"); } },
            ...(msgMenu.isMe ? [{ icon: "🗑", label: "Delete", danger: true, fn: () => deleteMsg(msgMenu.id) }] : []),
          ].map(item => <button key={item.label} onClick={item.fn}
            style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", background: "none", border: "none", borderRadius: 8, cursor: "pointer", color: item.danger ? "var(--red)" : "var(--text2)", fontSize: 13, fontWeight: 500, textAlign: "left", transition: "background .1s" }}
            onMouseEnter={e => e.currentTarget.style.background = "var(--glass2)"}
            onMouseLeave={e => e.currentTarget.style.background = "none"}>
            <span style={{ fontSize: 15 }}>{item.icon}</span>{item.label}
          </button>)}
        </div>}

        {/* ══ NEW GROUP MODAL ══ */}
        {showNewGroup && <Modal title="👥 Create Group" onClose={() => { setShowNewGroup(false); setNewGroupName(""); setNewGroupMembers([]); }} width={440}>
          <Field label="Group Name" value={newGroupName} onChange={e => setNewGroupName(e.target.value)} placeholder="e.g. GST Team, Legal, Accounts" autoFocus />
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 8 }}>Select Members</label>
            <div style={{ display: "grid", gap: 6, maxHeight: 220, overflowY: "auto" }}>
              {others.map(u2 => <div key={u2.id} onClick={() => setNewGroupMembers(m => m.includes(u2.id) ? m.filter(x => x !== u2.id) : [...m, u2.id])}
                style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", borderRadius: 9, cursor: "pointer", border: "1px solid " + (newGroupMembers.includes(u2.id) ? "var(--gold)" : "var(--border)"), background: newGroupMembers.includes(u2.id) ? "var(--gold3)" : "var(--glass)", transition: "all .12s" }}>
                <Avatar name={u2.name} size={32} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>{u2.name}</div>
                </div>
                {newGroupMembers.includes(u2.id) && <span style={{ color: "var(--gold)", fontSize: 16, fontWeight: 700 }}>✓</span>}
              </div>)}
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
            <Btn onClick={() => { setShowNewGroup(false); setNewGroupName(""); setNewGroupMembers([]); }} v="ghost">Cancel</Btn>
            <Btn onClick={createGroup} disabled={!newGroupName.trim() || !newGroupMembers.length}>✅ Create</Btn>
          </div>
        </Modal>}
      </div>;
    }

    function ActivityPage({ S, setS, user }) {
      const [q, setQ] = useState(""); const [typeF, setTypeF] = useState("");
      const ACTION_ICONS = { "Client Added": "👥", "Client Updated": "✏️", "Client Deleted": "🗑", "Service Added": "⚙️", "Service Updated": "✏️", "Service Deleted": "🗑", "Task Created": "✅", "Task Updated": "✏️", "Task Deleted": "🗑", "Invoice Created": "🧾", "Invoice Deleted": "🗑", "Document Added": "📁", "Document Deleted": "🗑", "Expense Added": "💸", "Expense Updated": "✏️", "Expense Deleted": "🗑", "Login": "🔐", "Logout": "🔓", "User Added": "👤", "User Updated": "✏️", "Password Changed": "🔑", "Note Added": "📝", "Note Deleted": "🗑", "Restored": "↩", "Bulk Delete": "⚠️" };
      const TYPE_COLORS = { "Added": "var(--green)", "Created": "var(--green)", "Updated": "var(--blue)", "Deleted": "var(--red)", "Login": "var(--teal)", "Logout": "var(--orange)", "Changed": "var(--purple)", "Restored": "var(--green)" };
      const getColor = action => { const key = Object.keys(TYPE_COLORS).find(k => action?.includes(k)); return key ? TYPE_COLORS[key] : "var(--text3)"; };
      const ACTION_TYPES = ["Added", "Created", "Updated", "Deleted", "Login", "Logout", "Restored", "Changed"];
      const entries = (S.activity || []).filter(a => {
        if (q && !(a.action?.toLowerCase().includes(q.toLowerCase()) || a.userName?.toLowerCase().includes(q.toLowerCase()) || a.detail?.toLowerCase().includes(q.toLowerCase()))) return false;
        if (typeF && !a.action?.includes(typeF)) return false;
        return true;
      }).sort((a, b) => new Date(b.at) - new Date(a.at));
      const counts = { total: (S.activity || []).length, today: (S.activity || []).filter(a => { const d = new Date(a.at); const n = new Date(); return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate(); }).length };
      return <Page title="Activity Log" subtitle={counts.total + " entries · " + counts.today + " today"}
        action={<div style={{ display: "flex", gap: 8 }}>{user.role === "admin" && <Btn v="danger" size="sm" onClick={() => { if (!confirm("Clear all logs?")) return; setS(p => ({ ...p, activity: [] })); }}>🗑 Clear</Btn>}</div>}>
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
          <SearchBar value={q} onChange={e => setQ(e.target.value)} placeholder="Search by action, user, detail…" style={{ flex: 1, minWidth: 200 }} />
          <select value={typeF} onChange={e => setTypeF(e.target.value)} style={{ padding: "9px 12px", borderRadius: 8, border: "1px solid var(--border)", background: "rgba(255,255,255,0.03)", color: "var(--text2)", fontSize: 13, fontFamily: "var(--font)" }}>
            <option value="">All Types</option>
            {ACTION_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(140px,1fr))", gap: 10, marginBottom: 16 }}>
          {[{ label: "Total Events", val: counts.total, color: "var(--blue)" }, { label: "Today", val: counts.today, color: "var(--green)" }, { label: "Deletions", val: (S.activity || []).filter(a => a.action?.includes("Deleted")).length, color: "var(--red)" }, { label: "Logins", val: (S.activity || []).filter(a => a.action === "Login").length, color: "var(--teal)" }].map(({ label, val, color }) => (
            <div key={label} style={{ background: "var(--glass)", border: "1px solid var(--border)", borderRadius: 10, padding: "12px 14px" }}>
              <div style={{ fontSize: 22, fontWeight: 800, color, fontFamily: "var(--font-mono)" }}>{val}</div>
              <div style={{ fontSize: 11, color: "var(--text3)", fontWeight: 600, marginTop: 2 }}>{label}</div>
            </div>
          ))}
        </div>
        {entries.length === 0 ? <Empty icon="📋" text="No activity recorded." /> :
          <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, overflow: "hidden" }}>
            {entries.map((a, i) => {
              const icon = ACTION_ICONS[a.action] || "📌";
              const color = getColor(a.action);
              return <div key={a.id || i} style={{ display: "flex", gap: 12, padding: "11px 16px", borderBottom: i < entries.length - 1 ? "1px solid var(--border)" : "none", alignItems: "flex-start", transition: "background .1s" }} onMouseEnter={e => e.currentTarget.style.background = "var(--glass)"} onMouseLeave={e => e.currentTarget.style.background = ""}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: color + "18", border: "1px solid " + color + "30", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>{icon}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>{a.action}</span>
                    <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 4, background: color + "18", color, fontWeight: 700 }}>{a.action?.split(" ").slice(-1)[0]}</span>
                  </div>
                  {a.detail && <div style={{ fontSize: 12, color: "var(--text2)", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{a.detail}</div>}
                  <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 3, display: "flex", gap: 10 }}>
                    <span>👤 {a.userName || "System"}</span>
                    <span>🕐 {fmtTime(a.at)}</span>
                  </div>
                </div>
              </div>;
            })}
          </div>}
      </Page>;
    }

    /* ══ CLIENT 360 ══ */
    /* ══ CLIENT360 DOCUMENTS SUB-COMPONENT ══ */
    function Client360Docs({ documents, S, setS, user, clientId }) {
      const toast = useToast();
      const [viewDoc, setViewDoc] = useState(null);
      const [loadingId, setLoadingId] = useState(null);
      const [addModal, setAddModal] = useState(false);
      const [uploading, setUploading] = useState(false);
      const [docForm, setDocForm] = useState({ name: "", category: "", serviceId: "", date: today(), notes: "", fileName: "", fileData: "", fileType: "" });
      const handleDocFile = e => {
        const f = e.target.files[0]; if (!f) return;
        if (f.size > 7 * 1024 * 1024) { toast("Max 7MB", "error"); return; }
        const r = new FileReader();
        r.onload = ev => setDocForm(p => ({ ...p, fileName: f.name, fileData: ev.target.result, fileType: f.type, name: p.name || f.name.replace(/\.[^.]+$/, "") }));
        r.readAsDataURL(f);
      };
      const saveDoc = async () => {
        if (!docForm.name.trim()) { toast("Document name required", "error"); return; }
        if (!clientId) { toast("Client ID missing", "error"); return; }
        const docId = uid("DOC");
        setUploading(true);
        let cloudSaved = false;
        if (docForm.fileData && _inited && _db) {
          cloudSaved = await saveFileToRTDB(docId, docForm.fileData, docForm.fileType, docForm.fileName).catch(() => false);
        }
        const nd = { id: docId, name: docForm.name, clientId, category: docForm.category, serviceId: docForm.serviceId, date: docForm.date, notes: docForm.notes, fileName: docForm.fileName, fileType: docForm.fileType, hasCloudFile: cloudSaved, fileData: docForm.fileData || null, uploadedBy: user.id, uploadedByName: user.name, createdAt: now() };
        setS(p => ({ ...p, documents: [...(p.documents || []), nd] }));
        audit(setS, user, "Document Added", docForm.name);
        setUploading(false); setAddModal(false);
        setDocForm({ name: "", category: "", serviceId: "", date: today(), notes: "", fileName: "", fileData: "", fileType: "" });
        toast("Document saved!");
      };

      const fileIcon = d => {
        const t = d.fileType || ""; const n = (d.fileName || "").toLowerCase();
        if (t.startsWith("image/") || /\.(jpg|jpeg|png|gif|webp)$/.test(n)) return "🖼️";
        if (t === "application/pdf" || n.endsWith(".pdf")) return "📕";
        if (/\.(doc|docx)$/.test(n)) return "📝";
        if (/\.(xls|xlsx|csv)$/.test(n)) return "📊";
        return "📄";
      };

      const fetchAndDo = async (d, action) => {
        // Already have data locally
        if (d.fileData) { action(d); return; }
        // Try to fetch from RTDB
        if (d.hasCloudFile && _inited && _db) {
          setLoadingId(d.id);
          const f = await loadFileFromRTDB(d.id);
          setLoadingId(null);
          if (f?.data) {
            const updated = { ...d, fileData: f.data, fileType: f.type || d.fileType, fileName: f.name || d.fileName };
            setS(p => ({ ...p, documents: p.documents.map(x => x.id === d.id ? updated : x) }));
            action(updated);
          } else { toast("File not found in cloud", "error"); }
        } else if (d.hasCloudFile && !_inited) {
          toast("Cloud not connected. Go to Settings → Cloud Sync.", "warn");
        } else {
          toast("No file attached", "warn");
        }
      };

      const doView = d => setViewDoc(d);

      const doDownload = d => {
        const a = document.createElement("a");
        a.href = d.fileData; a.download = d.fileName || d.name;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      };

      const hasFile = d => !!(d.fileData || d.hasCloudFile);

      const clientServices = (S.services || []).filter(s => s.clientId === clientId && !s._deleted);

      return <>
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 10 }}>
          <Btn onClick={() => setAddModal(true)}>＋ Add Document</Btn>
        </div>
        {documents.length === 0 && <Empty icon="📁" text="No documents for this client." action={<Btn onClick={() => setAddModal(true)}>Upload Document</Btn>} />}
        {documents.length > 0 && <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(220px,1fr))", gap: 10 }}>
          {documents.map(d => {
            const loading = loadingId === d.id;
            return <div key={d.id} style={{ background: "var(--glass)", backdropFilter: "blur(20px)", border: "1px solid var(--border)", borderRadius: 12, padding: 14, display: "flex", flexDirection: "column", gap: 8, transition: "border .15s" }}
              onMouseEnter={e => e.currentTarget.style.borderColor = "var(--border2)"}
              onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}>
              {/* Icon + name */}
              <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                <span style={{ fontSize: 26, lineHeight: 1, flexShrink: 0 }}>{fileIcon(d)}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.name}</div>
                  {d.category && <Badge label={d.category} color="var(--purple)" size="sm" />}
                </div>
                {d.hasCloudFile
                  ? <span style={{ fontSize: 10, color: "var(--green)", fontWeight: 700, background: "rgba(52,211,153,.12)", padding: "2px 5px", borderRadius: 4, flexShrink: 0 }}>☁</span>
                  : d.fileData
                    ? <span style={{ fontSize: 10, color: "var(--orange)", background: "rgba(251,146,60,.1)", padding: "2px 5px", borderRadius: 4, flexShrink: 0 }}>💾</span>
                    : null}
              </div>
              {/* Meta */}
              <div style={{ fontSize: 11, color: "var(--text3)" }}>
                📅 {fmtDate(d.date || d.createdAt)}
                {d.fileName && <div style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginTop: 2 }}>📎 {d.fileName}</div>}
              </div>
              {/* Actions */}
              <div style={{ display: "flex", gap: 6, marginTop: "auto" }}>
                {hasFile(d) && <Btn v="blue" size="sm" onClick={() => fetchAndDo(d, doView)} disabled={loading}>
                  {loading ? "⏳" : "👁 View"}
                </Btn>}
                {hasFile(d) && <Btn v="glass" size="sm" onClick={() => fetchAndDo(d, doDownload)} disabled={loading}>
                  {loading ? "⏳" : "⬇"}
                </Btn>}
                {!hasFile(d) && <span style={{ fontSize: 11, color: "var(--text4)", fontStyle: "italic" }}>No file</span>}
              </div>
            </div>;
          })}
        </div>}

        {/* View modal */}
        {viewDoc && <Modal title={viewDoc.name} subtitle={viewDoc.fileName || ""} onClose={() => setViewDoc(null)} width={900}>
          <div style={{ background: "var(--bg3)", borderRadius: 10, overflow: "hidden", maxHeight: "70vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
            {(() => {
              const src = viewDoc.fileData;
              const t = viewDoc.fileType || "";
              const n = (viewDoc.fileName || "").toLowerCase();
              if (t.startsWith("image/") || /\.(jpg|jpeg|png|gif|webp)$/.test(n))
                return <img src={src} alt={viewDoc.name} style={{ maxWidth: "100%", maxHeight: "68vh", objectFit: "contain", padding: 8 }} />;
              if (t === "application/pdf" || n.endsWith(".pdf"))
                return <iframe src={src} style={{ width: "100%", height: "68vh", border: "none" }} title={viewDoc.name} />;
              return <div style={{ padding: 60, textAlign: "center", color: "var(--text3)" }}>
                <div style={{ fontSize: 52, marginBottom: 14 }}>{fileIcon(viewDoc)}</div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text)", marginBottom: 16 }}>{viewDoc.fileName || viewDoc.name}</div>

              </div>;

          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", alignItems: "center", marginTop: 12, paddingTop: 12, borderTop: "1px solid var(--border)" }}>

    /* ══ SERVICE DOC MODAL — proper component (no hooks in IIFE) ══ */
    function SvcDocModal({ svcId, services, clientId, user, setS, onClose }) {
      const toast = useToast();
      const [dn, setDn] = useState("");
      const [df, setDf] = useState({ fileName: "", fileData: "", fileType: "" });
      const [uploading, setUploading] = useState(false);
      const svc = services.find(s => s.id === svcId);

      const handleF = e => {
        const f = e.target.files[0]; if (!f) return;
        if (f.size > 7 * 1024 * 1024) { toast("Max 7MB", "error"); return; }
        const r = new FileReader();
        r.onload = ev => setDf({ fileName: f.name, fileData: ev.target.result, fileType: f.type });
        r.readAsDataURL(f);
      };

      const saveD = async () => {
        if (!dn.trim()) { toast("Document name required", "error"); return; }
        setUploading(true);
        const docId = uid("DOC");
        let cloudSaved = false;
        if (df.fileData && _inited && _db) {
          cloudSaved = await saveFileToRTDB(docId, df.fileData, df.fileType, df.fileName).catch(() => false);
        }
        const nd = {
          id: docId, name: dn, clientId, serviceId: svcId,
          category: "Service Document", date: today(),
          fileName: df.fileName, fileType: df.fileType,
          fileData: df.fileData || null, hasCloudFile: cloudSaved,
          uploadedBy: user.id, uploadedByName: user.name, createdAt: now()
        };
        setS(p => ({ ...p, documents: [...(p.documents || []), nd] }));
        audit(setS, user, "Document Added", dn + (svc ? " (" + svc.serviceType + ")" : ""));
        setUploading(false);
        toast("Document saved! 📁");
        onClose();
      };

      return <Modal title={"📎 Add Document" + (svc ? " — " + svc.serviceType : "")} onClose={onClose} width={460}>
        <Field label="Document Name" value={dn} onChange={e => setDn(e.target.value)} required placeholder="e.g. PAN Card, GST Certificate…" />
        <div style={{ marginBottom: 14 }}>
          <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 5 }}>Upload File <span style={{ color: "var(--text4)", fontWeight: 400, textTransform: "none" }}>(max 7MB)</span></label>
          <input type="file" onChange={handleF} accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.gif,.webp"
            style={{ fontSize: 13, color: "var(--text2)", width: "100%", padding: "8px 0" }} />
          {df.fileName && <div style={{ fontSize: 12, color: "var(--green)", marginTop: 4, display: "flex", alignItems: "center", gap: 6 }}>
            <span>📎</span><span>{df.fileName}</span>
          </div>}
        </div>
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <Btn onClick={onClose} v="ghost">Cancel</Btn>
          <Btn onClick={saveD} disabled={uploading}>{uploading ? "Saving…" : "Add Document"}</Btn>
        </div>
      </Modal>;
    }

    function Client360({ clientId, S, setS, user, setPage }) {
      const toast = useToast(); const [tab, setTab] = useState("overview"); const [addSvcModal, setAddSvcModal] = useState(false); const [addTaskModal, setAddTaskModal] = useState(false);
      const [addBillModal, setAddBillModal] = useState(false);
      const [noteForm, setNoteForm] = useState({ category: "general", title: "", content: "" });
      const [addNoteModal, setAddNoteModal] = useState(false);
      const [bForm, setBForm] = useState({ serviceId: "", description: "", total: "", status: "Unpaid", dueDate: "", paymentMethod: "Cash", notes: "" });
      const client = S.clients.find(c => c.id === clientId);
      const [sf, setSf] = useState({ serviceType: "", year: new Date().getFullYear().toString(), dueDate: "", assignedTo: user.id, notes: "" });

      const documents = S.documents.filter(d => d.clientId === clientId && !d._deleted); const bills = S.bills.filter(b => b.clientId === clientId && !b._deleted);
      const asgn = S.users.find(u => u.id === client.assignedTo);
      const [reqDocs, setReqDocs] = useState([]);

      const saveBill = () => {
        if (!bForm.total || isNaN(Number(bForm.total))) { toast("Enter amount", "error"); return; }
        const billsN = (S.bills || []).filter(b => b.clientId === clientId && !b._deleted).length;
        const invNo = client.clientNo + "-INV-" + String(billsN + 1).padStart(3, "0");
        const nb = { ...bForm, id: uid("BILL"), invoiceNo: invNo, total: Number(bForm.total), paid: 0, clientId, createdAt: now(), date: today(), createdBy: user.id };
        setS(p => ({ ...p, bills: [...(p.bills || []), nb] }));

        toast("Invoice " + invNo + " created!"); setAddBillModal(false);
        setBForm({ serviceId: "", description: "", total: "", status: "Unpaid", dueDate: "", paymentMethod: "Cash", notes: "" });
      };
      const saveNote = () => {
        if (!noteForm.content.trim()) { toast("Enter note content", "error"); return; }

        setS(p => ({ ...p, notes: [...(p.notes || []), nn] }));

            clientNotes.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).map(n => <div key={n.id} style={{ background: "var(--glass)", border: "1px solid var(--border)", borderRadius: 12, padding: "14px 16px" }}>

                <div>
                  <span style={{ fontSize: 11, fontWeight: 700, color: "var(--gold)", background: "var(--gold3)", padding: "2px 8px", borderRadius: 4, textTransform: "capitalize" }}>{n.category}</span>

            </div>)}
        </div>}

          <Sel label="Service Type" value={sf.serviceType} onChange={e => setSf(f => ({ ...f, serviceType: e.target.value }))} required options={[{ v: "", l: "— Select Service Type —" }, ...getSvcTypes()]} />

            <Sel label="Assign To" value={sf.assignedTo} onChange={e => setSf(f => ({ ...f, assignedTo: e.target.value }))} options={[{ v: "", l: "— Select —" }, ...S.users.filter(u => u.status === "active" && !u._deleted).map(u => ({ v: u.id, l: u.name + " (" + (ROLES[u.role]?.l || u.role) + ")" }))]} style={{ gridColumn: "1/-1" }} />
          </div>
          <Field label="Notes" value={sf.notes} onChange={e => setSf(f => ({ ...f, notes: e.target.value }))} rows={2} />
          {sf.serviceType && <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span>📋 Required Documents Checklist</span>
              <span style={{ color: reqDocs.filter(d => d.received).length === reqDocs.length && reqDocs.length > 0 ? "var(--green)" : "var(--orange)", fontSize: 11.5, fontWeight: 600, textTransform: "none" }}>{reqDocs.filter(d => d.received).length}/{reqDocs.length} received</span>
            </div>
            {reqDocs.length === 0 && <p style={{ fontSize: 12, color: "var(--text3)", marginBottom: 8 }}>No default checklist for this service type. Add documents below.</p>}
            <div style={{ display: "grid", gap: 4, maxHeight: 170, overflowY: "auto", marginBottom: 8 }}>
              {reqDocs.map((d, i) => (
                <div key={i} onClick={() => setReqDocs(r => r.map((x, j) => j === i ? { ...x, received: !x.received } : x))}
                  style={{ display: "flex", alignItems: "center", gap: 9, padding: "7px 11px", borderRadius: 7, border: "1px solid " + (d.received ? "rgba(52,211,153,.25)" : "var(--border)"), background: d.received ? "var(--green2)" : "var(--glass)", cursor: "pointer", transition: "all .12s" }}>
                  <div style={{ width: 15, height: 15, borderRadius: 4, border: "2px solid " + (d.received ? "var(--green)" : "var(--border2)"), background: d.received ? "var(--green)" : "transparent", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {d.received && <span style={{ color: "#fff", fontSize: 9, fontWeight: 800, lineHeight: 1 }}>✓</span>}
                  </div>
                  <span style={{ fontSize: 12.5, flex: 1, color: d.received ? "var(--green)" : "var(--text2)", textDecoration: d.received ? "line-through" : undefined }}>{d.name}</span>
                  <button onClick={e => { e.stopPropagation(); setReqDocs(r => r.filter((_, j) => j !== i)); }} style={{ background: "none", border: "none", color: "var(--text4)", cursor: "pointer", fontSize: 11, lineHeight: 1 }} onMouseEnter={e => e.currentTarget.style.color = "var(--red)"} onMouseLeave={e => e.currentTarget.style.color = "var(--text4)"}>✕</button>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <Field value={extraDoc} onChange={e => setExtraDoc(e.target.value)} placeholder="Add custom document…" style={{ flex: 1, marginBottom: 0 }}
                onKeyDown={e => { if (e.key === "Enter" && extraDoc.trim()) { setReqDocs(r => [...r, { name: extraDoc.trim(), received: false }]); setExtraDoc(""); } }} />
              <Btn v="glass" size="sm" onClick={() => { if (!extraDoc.trim()) return; setReqDocs(r => [...r, { name: extraDoc.trim(), received: false }]); setExtraDoc(""); }}>+ Add</Btn>
            </div>
          </div>}
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}><Btn onClick={() => { setAddSvcModal(false); setReqDocs([]); setExtraDoc(""); }} v="ghost">Cancel</Btn><Btn onClick={saveSvc}>Add Service</Btn></div>
        </Modal>}
        {addTaskModal && <Modal title="Add Task" onClose={() => setAddTaskModal(false)} width={500}>
          <Field label="Task Title" value={tf.title} onChange={e => setTf(f => ({ ...f, title: e.target.value }))} required autoFocus />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 14px" }}>
            <Sel label="Priority" value={tf.priority} onChange={e => setTf(f => ({ ...f, priority: e.target.value }))} options={Object.entries(TASK_PRI).map(([k, v]) => ({ v: k, l: v.l }))} />
            <Field label="Due Date" type="date" value={tf.dueDate} onChange={e => setTf(f => ({ ...f, dueDate: e.target.value }))} />
            <Sel label="Assign To" value={tf.assignedTo} onChange={e => setTf(f => ({ ...f, assignedTo: e.target.value }))} options={[{ v: "", l: "— Select —" }, ...S.users.filter(u => u.status === "active" && !u._deleted).map(u => ({ v: u.id, l: u.name }))]} />
          </div>
          <Field label="Notes" value={tf.notes} onChange={e => setTf(f => ({ ...f, notes: e.target.value }))} rows={2} />
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}><Btn onClick={() => setAddTaskModal(false)} v="ghost">Cancel</Btn><Btn onClick={saveTask}>Add Task</Btn></div>
        </Modal>}
        {addBillModal && <Modal title={"New Invoice — " + client.name} onClose={() => setAddBillModal(false)} width={500}>
          {<Sel label="Service" value={bForm.serviceId} onChange={e => { const svc = S.services.find(s => s.id === e.target.value); setBForm(f => ({ ...f, serviceId: e.target.value, description: svc?.serviceType || f.description })); }} options={[{ v: "", l: "— Optional Service —" }, ...services.filter(s => !s._deleted).map(s => ({ v: s.id, l: s.serviceType + " (" + s.svcNo + ")" }))]} />}
          <Field label="Description" value={bForm.description} onChange={e => setBForm(f => ({ ...f, description: e.target.value }))} placeholder="Service description" required />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 14px" }}>
            <Field label="Amount (₹)" type="number" value={bForm.total} onChange={e => setBForm(f => ({ ...f, total: e.target.value }))} required />
            <Sel label="Status" value={bForm.status} onChange={e => setBForm(f => ({ ...f, status: e.target.value }))} options={Object.keys(BILL_STATUS)} />
            <Field label="Due Date" type="date" value={bForm.dueDate} onChange={e => setBForm(f => ({ ...f, dueDate: e.target.value }))} />
            <Sel label="Payment Method" value={bForm.paymentMethod} onChange={e => setBForm(f => ({ ...f, paymentMethod: e.target.value }))} options={PAYMENT_METHODS} />
          </div>
          <Field label="Notes" value={bForm.notes} onChange={e => setBForm(f => ({ ...f, notes: e.target.value }))} rows={2} />
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}><Btn onClick={() => setAddBillModal(false)} v="ghost">Cancel</Btn><Btn onClick={saveBill}>Create Invoice</Btn></div>
        </Modal>}
        {typeof addSvcModal === "string" && addSvcModal.startsWith("doc_") && <SvcDocModal
          svcId={addSvcModal.slice(4)}
          services={services}
          clientId={clientId}
          user={user}
          setS={setS}
          onClose={() => setAddSvcModal(false)}
        />}
        {addNoteModal && <Modal title={"Add Note — " + client.name} onClose={() => setAddNoteModal(false)} width={480}>
          <Sel label="Category" value={noteForm.category} onChange={e => setNoteForm(f => ({ ...f, category: e.target.value }))} options={["general", "login credentials", "account info", "important", "legal", "financial", "reminder", "other"]} />
          <Field label="Title (optional)" value={noteForm.title} onChange={e => setNoteForm(f => ({ ...f, title: e.target.value }))} placeholder="Short title…" />
          <Field label="Note Content" value={noteForm.content} onChange={e => setNoteForm(f => ({ ...f, content: e.target.value }))} rows={5} required placeholder="Enter notes, credentials, info…" />
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}><Btn onClick={() => setAddNoteModal(false)} v="ghost">Cancel</Btn><Btn onClick={saveNote}>Save Note</Btn></div>
        </Modal>}
      </Page>;
    }

    /* ══════════════════════════════════════
       ATTENDANCE PAGE
    ══════════════════════════════════════ */
    function AttendancePage({ S, setS, user }) {
      const toast = useToast();
      const today2 = new Date().toISOString().slice(0, 10);
      const [dateF, setDateF] = useState(today2);
      const [userF, setUserF] = useState("");
      const [modal, setModal] = useState(false);
      const [editRec, setEditRec] = useState(null);
      const [form, setForm] = useState({ userId: "", date: today2, loginTime: "09:00", logoutTime: "18:00" });
      const records = useMemo(() => {
        let list = [...(S.attendance || [])];
        if (dateF) list = list.filter(a => a.date === dateF);
        if (userF) list = list.filter(a => a.userId === userF);
        return list.sort((a, b) => new Date(b.loginAt) - new Date(a.loginAt));
      }, [S.attendance, dateF, userF]);
      const dur = a => {
        if (!a.logoutAt) return "🟢 Active";
        const ms = new Date(a.logoutAt) - new Date(a.loginAt);
        if (ms < 0) return "—";
        const h = Math.floor(ms / 3600000); const m = Math.floor((ms % 3600000) / 60000);
        return h > 0 ? h + "h " + m + "m" : m + " min";
      };
      const openAdd = () => { setForm({ userId: "", date: today2, loginTime: "09:00", logoutTime: "18:00" }); setEditRec(null); setModal(true); };
      const openEdit = rec => {
        const li = rec.loginAt ? new Date(rec.loginAt).toTimeString().slice(0, 5) : "09:00";
        const lo = rec.logoutAt ? new Date(rec.logoutAt).toTimeString().slice(0, 5) : "18:00";
        setForm({ userId: rec.userId, date: rec.date, loginTime: li, logoutTime: lo });
        setEditRec(rec); setModal(true);
      };
      const saveManual = () => {
        if (!form.userId) { toast("Select employee", "error"); return; }
        const emp = S.users.find(u => u.id === form.userId);
        if (!emp) { toast("Employee not found", "error"); return; }
        const loginAt = new Date(form.date + "T" + form.loginTime).toISOString();
        const logoutAt = new Date(form.date + "T" + form.logoutTime).toISOString();
        if (editRec) {
          setS(p => ({ ...p, attendance: (p.attendance || []).map(a => a.id === editRec.id ? { ...a, loginAt, logoutAt, _manual: true, _editBy: user.name } : a) }));
          toast("Record updated!");
        } else {
          const rec = { id: uid("ATT"), userId: form.userId, userName: emp.name, role: emp.role, date: form.date, loginAt, logoutAt, _manual: true, _addedBy: user.name };
          setS(p => ({ ...p, attendance: [...(p.attendance || []), rec] }));
          toast("Attendance added!");
        }
        setModal(false);
      };
      const delRec = id => {
        if (!confirm("Delete this record?")) return;
        setS(p => ({ ...p, attendance: (p.attendance || []).filter(a => a.id !== id) }));
        toast("Deleted", "warn");
      };
      return <Page title="Attendance Log" subtitle={records.length + " records"} action={["admin", "manager"].includes(user.role) && <Btn onClick={openAdd}>＋ Manual Entry</Btn>}>
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
          <input type="date" value={dateF} onChange={e => setDateF(e.target.value)} style={{ padding: "9px 12px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--glass)", color: "var(--text)", fontSize: 13, fontFamily: "var(--font)" }} />
          <select value={userF} onChange={e => setUserF(e.target.value)} style={{ padding: "9px 12px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--glass)", color: "var(--text2)", fontSize: 13, fontFamily: "var(--font)" }}>
            <option value="">All Employees</option>
            {S.users.filter(u => u.status === "active" && !u._deleted).map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
          <button onClick={() => { setDateF(""); setUserF(""); }} style={{ padding: "9px 14px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--glass)", color: "var(--text2)", cursor: "pointer", fontSize: 13 }}>Clear</button>
        </div>
        {records.length === 0 ? <Empty icon="📋" text="No attendance records found." /> :
          <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
              <thead>
                <tr style={{ background: "var(--glass)", borderBottom: "1px solid var(--border)" }}>
                  {["Employee", "Role", "Date", "Login", "Logout", "Duration", "Status", ""].map(h => <th key={h} style={{ padding: "10px 14px", textAlign: "left", color: "var(--text3)", fontWeight: 600, fontSize: 11, textTransform: "uppercase", letterSpacing: ".06em", whiteSpace: "nowrap" }}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {records.map((a, i) => <tr key={a.id} style={{ borderBottom: i < records.length - 1 ? "1px solid var(--border)" : "none", transition: "background .1s" }}
                  onMouseEnter={e => e.currentTarget.style.background = "var(--glass)"}
                  onMouseLeave={e => e.currentTarget.style.background = ""}>
                  <td style={{ padding: "10px 14px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <Avatar name={a.userName} size={28} />
                      <span style={{ fontWeight: 600, color: "var(--text)" }}>{a.userName}</span>
                    </div>
                  </td>
                  <td style={{ padding: "10px 14px" }}><RoleBadge role={a.role} /></td>
                  <td style={{ padding: "10px 14px", color: "var(--text2)" }}>{fmtDate(a.date)}</td>
                  <td style={{ padding: "10px 14px", color: "var(--green)", fontWeight: 600 }}>{a.loginAt ? new Date(a.loginAt).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }) : "—"}</td>
                  <td style={{ padding: "10px 14px", color: a.logoutAt ? "var(--red)" : "var(--orange)", fontWeight: 600 }}>{a.logoutAt ? new Date(a.logoutAt).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }) : "—"}</td>
                  <td style={{ padding: "10px 14px", color: "var(--gold)", fontWeight: 600 }}>{dur(a)}</td>
                  <td style={{ padding: "10px 14px" }}><span style={{ fontSize: 11, padding: "3px 8px", borderRadius: 5, fontWeight: 700, background: a.logoutAt ? "rgba(52,211,153,.1)" : "rgba(251,146,60,.1)", color: a.logoutAt ? "var(--green)" : "var(--orange)" }}>{a.logoutAt ? "Completed" : "Active"}</span></td>
                  {["admin", "manager"].includes(user.role) && <td style={{ padding: "10px 14px" }}><div style={{ display: "flex", gap: 4 }}><Btn v="glass" size="sm" onClick={() => openEdit(a)}>✏️</Btn><Btn v="danger" size="sm" onClick={() => delRec(a.id)}>🗑</Btn></div></td>}
                </tr>)}
              </tbody>
            </table>
          </div>}
      </Page>;
      {
        modal && <Modal title={editRec ? "Edit Attendance" : "Manual Attendance Entry"} onClose={() => setModal(false)} width={460}>
          <Sel label="Employee" value={form.userId} onChange={e => setForm(f => ({ ...f, userId: e.target.value }))} required options={[{ v: "", l: "— Select Employee —" }, ...S.users.filter(u => u.status === "active" && !u._deleted).map(u => ({ v: u.id, l: u.name + " (" + u.role + ")" }))]} />
          <Field label="Date" type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} required />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 14px" }}>
            <Field label="Login Time" type="time" value={form.loginTime} onChange={e => setForm(f => ({ ...f, loginTime: e.target.value }))} required />
            <Field label="Logout Time" type="time" value={form.logoutTime} onChange={e => setForm(f => ({ ...f, logoutTime: e.target.value }))} required />
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 4 }}><Btn onClick={() => setModal(false)} v="ghost">Cancel</Btn><Btn onClick={saveManual}>{editRec ? "Update" : "Add Record"}</Btn></div>
        </Modal>
      }
    }

    /* ══════════════════════════════════════
       TASKS PAGE (full replace — all members assign)
    ══════════════════════════════════════ */
    function TasksPageNew({ S, setS, user, setPage, setClientId }) {
      const toast = useToast();
      const [q, setQ] = useState(""); const [statusF, setStatusF] = useState(""); const [prioF, setPrioF] = useState(""); const [assigneeF, setAssigneeF] = useState(""); const [overdueOnly, setOverdueOnly] = useState(false);
      const [modal, setModal] = useState(false); const [editTask, setEditTask] = useState(null);
      const emptyForm = { title: "", clientId: "", assignedTo: user.id, priority: "medium", dueDate: "", notes: "", reminderPhone: "" };
      const [form, setForm] = useState(emptyForm);

      const tasks = useMemo(() => {
        let list = S.tasks;
        // All roles can see tasks assigned to them; admin/manager see all
        if (!["admin", "manager"].includes(user.role)) list = list.filter(t => t.assignedTo === user.id || t.createdBy === user.id);
        const sq = q.toLowerCase();
        if (sq) list = list.filter(t => { const c = S.clients.find(c => c.id === t.clientId); return t.title?.toLowerCase().includes(sq) || c?.name?.toLowerCase().includes(sq); });
        if (statusF) list = list.filter(t => t.status === statusF);
        if (prioF) list = list.filter(t => t.priority === prioF);
        if (assigneeF) list = list.filter(t => t.assignedTo === assigneeF);
        if (overdueOnly) list = list.filter(t => isOverdue(t.dueDate) && t.status !== "completed");
        return list.sort((a, b) => { if (a.status === "completed" && b.status !== "completed") return 1; if (a.status !== "completed" && b.status === "completed") return -1; return new Date(a.dueDate || "9999") - new Date(b.dueDate || "9999"); });
      }, [S.tasks, S.clients, q, statusF, prioF, assigneeF, overdueOnly, user]);

      const openAdd = () => { setForm(emptyForm); setEditTask(null); setModal(true); };
      const openEdit = t => { setForm({ title: t.title, clientId: t.clientId || "", assignedTo: t.assignedTo || user.id, priority: t.priority || "medium", dueDate: t.dueDate || "", notes: t.notes || "", reminderPhone: t.reminderPhone || "" }); setEditTask(t); setModal(true); };

      const saveTask = () => {
        if (!form.title.trim()) { toast("Task title required", "error"); return; }
        if (editTask) {
          setS(p => ({ ...p, tasks: p.tasks.map(x => x.id === editTask.id ? { ...x, ...form } : x) }));
          audit(setS, user, "Task Updated", form.title); toast("Task updated!");
        } else {
          const nt = { id: uid("TSK"), createdBy: user.id, ...form, status: "pending", createdAt: now() };
          setS(p => ({ ...p, tasks: [...p.tasks, nt] }));
          audit(setS, user, "Task Created", form.title); toast("Task added!");
        }
        setModal(false);
      };

      const sendWhatsApp = (t) => {
        const phone = (t.reminderPhone || "").replace(/\D/g, "");
        if (!phone || phone.length < 10) { toast("Valid phone number required on task", "warn"); return; }
        const asgn = S.users.find(u => u.id === t.assignedTo);
        const cl = S.clients.find(c => c.id === t.clientId);
        const msg = encodeURIComponent(`🔔 *Task Reminder — OM Associates*\n\nHello ${asgn?.name || "Team"},\n\nTask: *${t.title}*\nClient: ${cl?.name || "—"}\nPriority: ${t.priority?.toUpperCase()}\nDue: ${fmtDate(t.dueDate)}\nStatus: ${t.status}\n\nPlease complete on time.\n— OM Associates`);
        window.open(`https://wa.me/91${phone.slice(-10)}?text=${msg}`, "_blank");
        toast("Opening WhatsApp…", "success");
      };

      const completedCount = tasks.filter(t => t.status === "completed").length;
      const overdueCount = tasks.filter(t => isOverdue(t.dueDate) && t.status !== "completed").length;

      return <Page title="Tasks" subtitle={tasks.filter(t => t.status !== "completed").length + " active · " + completedCount + " done"}
        action={<Btn onClick={openAdd}>＋ Add Task</Btn>}>
        {/* Filters */}
        <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
          <SearchBar value={q} onChange={e => setQ(e.target.value)} placeholder="Search tasks, client…" style={{ flex: 1, minWidth: 180 }} />
          <select value={statusF} onChange={e => setStatusF(e.target.value)} style={{ padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--glass)", color: "var(--text2)", fontSize: 12.5, fontFamily: "var(--font)" }}>
            <option value="">All Status</option>
            {["pending", "in progress", "completed", "cancelled"].map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <select value={prioF} onChange={e => setPrioF(e.target.value)} style={{ padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--glass)", color: "var(--text2)", fontSize: 12.5, fontFamily: "var(--font)" }}>
            <option value="">All Priority</option>
            {Object.entries(TASK_PRI).map(([k, v]) => <option key={k} value={k}>{v.l}</option>)}
          </select>
          <select value={assigneeF} onChange={e => setAssigneeF(e.target.value)} style={{ padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--glass)", color: "var(--text2)", fontSize: 12.5, fontFamily: "var(--font)" }}>
            <option value="">All Members</option>
            {S.users.filter(u => u.status === "active" && !u._deleted).map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
          <button onClick={() => setOverdueOnly(o => !o)} style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid " + (overdueOnly ? "rgba(248,113,113,.4)" : "var(--border)"), background: overdueOnly ? "var(--red2)" : "var(--glass)", color: overdueOnly ? "var(--red)" : "var(--text2)", cursor: "pointer", fontSize: 12.5, fontWeight: overdueOnly ? 700 : 400 }}>
            🔴 Overdue {overdueCount > 0 && "(" + overdueCount + ")"}
          </button>
        </div>

        {tasks.length === 0 ? <Empty icon="✅" text="No tasks found." action={<Btn onClick={openAdd}>Add First Task</Btn>} /> :
          <div style={{ display: "grid", gap: 8 }}>
            {tasks.map(t => {
              const cl = S.clients.find(c => c.id === t.clientId);
              const asgn = S.users.find(u => u.id === t.assignedTo);
              const ov = isOverdue(t.dueDate) && t.status !== "completed";
              const canEdit = ["admin", "manager"].includes(user.role) || t.assignedTo === user.id || t.createdBy === user.id;
              return <div key={t.id} style={{ background: "var(--card)", border: "1px solid " + (ov ? "rgba(248,113,113,.3)" : "var(--border)"), borderRadius: 12, padding: "12px 16px", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", transition: "border .15s" }}
                onMouseEnter={e => e.currentTarget.style.borderColor = ov ? "rgba(248,113,113,.5)" : "var(--border2)"}
                onMouseLeave={e => e.currentTarget.style.borderColor = ov ? "rgba(248,113,113,.3)" : "var(--border)"}>
                {/* Status dropdown — everyone can change their own tasks */}
                <select value={t.status}
                  onChange={e => setS(p => ({ ...p, tasks: p.tasks.map(x => x.id === t.id ? { ...x, status: e.target.value } : x) }))}
                  disabled={!canEdit}

          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>

    /* ══════════════════════════════════════════════════════

    function ExcelSheetsPage({ S, setS, user }) {
      const toast = useToast();
