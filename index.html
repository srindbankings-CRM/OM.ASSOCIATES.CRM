<script>
  /* ══ SINGLE INSTANCE GUARD ══
     File already open in another tab?
     → Signal that tab to come to foreground
     → This duplicate tab shows a "switch" screen
     Works via BroadcastChannel + localStorage heartbeat
  */
  (function () {
    var CH = '_omcrm_instance';   // BroadcastChannel name
    var LKEY = '_omcrm_lock_id';    // localStorage: active tab id
    var LTSK = '_omcrm_lock_ts';    // localStorage: last heartbeat
    var STALE = 5000;               // 5s without heartbeat = stale
    var HB_MS = 1500;               // heartbeat every 1.5s
    var myId = Math.random().toString(36).slice(2) + '_' + Date.now();
    var _master = false;
    var _bc = null;

    /* ── helpers ── */
    function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
    function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) { } }
    function lsDel(k) { try { localStorage.removeItem(k); } catch (e) { } }

    function lockStale() {
      var ts = parseInt(lsGet(LTSK) || '0');
      return !lsGet(LKEY) || !ts || (Date.now() - ts > STALE);
    }

    /* ── become the ONE master tab ── */
    function becomeMaster() {
      _master = true;
      lsSet(LKEY, myId);
      lsSet(LTSK, Date.now());

      /* heartbeat */
      setInterval(function () {
        if (_master) { lsSet(LTSK, Date.now()); }
      }, HB_MS);

      /* BroadcastChannel: listen for "focus me" from duplicate tabs */
      try {
        _bc = new BroadcastChannel(CH);
        _bc.onmessage = function (e) {
          if (e.data === 'FOCUS_MASTER') {
            /* bring this tab to front */
            window.focus();
            /* flash title to alert user */
            var orig = document.title;
            document.title = '👆 Switch here — OM CRM';
            setTimeout(function () { document.title = orig; }, 2500);
          }
        };
      } catch (ex) { }

      /* storage event fallback for older browsers */
      window.addEventListener('storage', function (e) {
        if (e.key === '_omcrm_ping') { window.focus(); }
      });

      /* release lock on close */
      window.addEventListener('beforeunload', function () {
        _master = false;
        var id = lsGet(LKEY);
        if (id === myId) { lsDel(LKEY); lsDel(LTSK); }
      });
    }

    /* ── show "already open" page ── */
        function showDuplicatePage() {
      document.addEventListener('DOMContentLoaded', function () {
        document.body.innerHTML = '';
        document.body.style.cssText = 'margin:0;padding:0;background:#0d1117;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;';
        document.body.innerHTML = '<div style="text-align:center;padding:40px;max-width:400px"><div style="font-size:56px;margin-bottom:16px">🔒</div><h2 style="color:#c9a84c;font-size:20px;margin-bottom:10px">CRM Already Open</h2><p style="color:#a0afc0;font-size:13px;margin-bottom:24px;line-height:1.6">OM Associates CRM is already running in another tab.</p><button onclick="window.focusExisting&&window.focusExisting();window.close()" style="background:linear-gradient(135deg,#c9a84c,#8b6010);color:#000;border:none;border-radius:9px;padding:11px 28px;font-size:14px;font-weight:800;cursor:pointer;margin-right:8px">→ Go to CRM</button><button onclick="window.close()" style="background:rgba(255,255,255,0.06);color:#a0afc0;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 18px;font-size:13px;cursor:pointer">Close</button></div>';
      });
    }
    window.focusExisting = function () {
      try {
        var bc3 = new BroadcastChannel(CH);
        bc3.postMessage('FOCUS_MASTER');
        bc3.close();
      } catch (ex) { }
      lsSet('_omcrm_ping', Date.now());
      try { window.close(); } catch (ex) { }
    };
  })();
</script>

    /* ══ CLIENT PORTAL ══ */
    // v29: Client Portal Login — phone + name (no OTP needed)
    function ClientPortalLogin({ onClientLogin, onBack, S }) {
      const toast = useToast();
      const [phone, setPhone] = useState(""); const [name, setName] = useState("");
      const [err, setErr] = useState(""); const [loading, setLoading] = useState(false);

      const doLogin = async () => {
        setErr(""); setLoading(true);
        const ph = phone.replace(/\D/g, "").slice(-10);
        const nm = name.trim().toLowerCase();
        if (ph.length < 10) { setErr("Valid 10-digit mobile number enter చేయండి"); setLoading(false); return; }
        if (!nm) { setErr("మీ పేరు enter చేయండి"); setLoading(false); return; }
        // Try local first, then Firebase
        const tryMatch = (clients) => {
          const found = (clients || []).find(c =>
            !c._deleted &&
            c.phone && c.phone.replace(/\D/g, "").slice(-10) === ph &&
            c.name.trim().toLowerCase().includes(nm.split(" ")[0])
          );
          return found || null;
        };
        let clients = ensureArray(ls("clients", []));
        let found = tryMatch(clients);
        if (!found) {
          try {
            const db = (_inited && _db) || window._preDb;
            if (db) {
              const snap = await Promise.race([
                db.ref("omcrm/" + SYNC_KEY + "/data/clients").get(),
                new Promise((_,r) => setTimeout(() => r(new Error("timeout")), 5000))
              ]);
              if (snap && snap.exists()) {
                const raw = snap.val();
                clients = raw.__empty ? [] : Array.isArray(raw) ? raw.filter(Boolean) : Object.values(raw).filter(Boolean);
                found = tryMatch(clients);
              }
            }
          } catch(e) { console.warn("[ClientPortal]", e.message); }
        }
        if (!found) {
          setErr("Client not found. Mobile: " + ph + " · Check spelling of name or contact admin: 9581880088");
          setLoading(false); return;
        }
        const cu = { id: found.id, name: found.name, role: "client", phone: found.phone, email: found.email || "", clientId: found.id, status: "active", isClient: true };
        ss("session", { userId: "CLIENT_" + found.id, loginAt: now(), isClient: true, clientId: found.id });
        onClientLogin(cu, found);
        setLoading(false);
      };

      return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--bg)", padding: 20 }}>
        <div style={{ width: "min(92vw,420px)" }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ fontSize: 48, marginBottom: 8 }}>🌸</div>
            <h1 style={{ fontFamily: "var(--font-serif)", fontSize: 24, color: "var(--text)", fontWeight: 600 }}>Client Portal</h1>
            <p style={{ fontSize: 12.5, color: "var(--text3)", marginTop: 6 }}>OM Associates · Secure Access</p>
          </div>
          <div style={{ background: "var(--card2)", border: "1px solid var(--border2)", borderRadius: 18, padding: 28, boxShadow: "var(--shadow2)" }}>
            <p style={{ fontSize: 13.5, color: "var(--text2)", marginBottom: 20, lineHeight: 1.6 }}>
              మీ registered mobile number మరియు పేరు enter చేయండి — instant access!
            </p>
            <Field label="📱 Mobile Number" value={phone} onChange={e => setPhone(e.target.value)} placeholder="10-digit number" onKeyDown={e => e.key === "Enter" && doLogin()} autoFocus />
            <Field label="👤 Your Name" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Rajesh (first name sufficient)" onKeyDown={e => e.key === "Enter" && doLogin()} />
            {err && <div style={{ color: "var(--red)", fontSize: 12.5, marginBottom: 12, padding: "8px 12px", background: "var(--red2)", borderRadius: 8, lineHeight: 1.5 }}>⚠️ {err}</div>}
            <Btn onClick={doLogin} disabled={loading} style={{ width: "100%", justifyContent: "center", padding: "12px", fontSize: 14, marginBottom: 12 }}>
              {loading ? "⏳ Verifying…" : "🌸 Login to Portal →"}
            </Btn>
            <button onClick={onBack} style={{ background: "none", border: "none", color: "var(--text3)", cursor: "pointer", fontSize: 12.5, width: "100%", textAlign: "center", padding: "6px", textDecoration: "underline", fontFamily: "var(--font)" }}>
              ← Staff Login
            </button>
          </div>
        </div>
      </div>;
    }

    function LoginPage({ onLogin }) {
      const [u, setU] = useState(""); const [p, setP] = useState(""); const [err, setErr] = useState(""); const [loading, setLoading] = useState(false); const [showForgot, setShowForgot] = useState(false);
      const { theme, toggle } = useTheme();
      const doLogin = async () => {
        setErr(""); setLoading(true);
        const q = u.toLowerCase().trim(); const pw = p;
        // 1. Try localStorage users first (fast path - works after first load)
        const tryLocal = () => {
          const users = ls("users", SEED_USERS) || [];
          const found = users.find(x => x.status === "active" && (x.email?.toLowerCase() === q || x.username?.toLowerCase() === q));
          if (!found) return null;
          if (found.passwordHash !== hashPw(pw)) { return "wrong"; }
          return found;
        };
        const localResult = tryLocal();
        if (localResult === "wrong") { setErr("Incorrect password."); setLoading(false); return; }
        if (localResult) { ss("session", { userId: localResult.id, loginAt: now() }); onLogin(localResult); setLoading(false); return; }
        // 2. Not found locally → try Firebase (for new members)
        try {
          const db = (_inited && _db) || (window._preDb);
          if (db) {
            const snap = await Promise.race([db.ref("omcrm/" + SYNC_KEY + "/data/users").get(), new Promise((_, r) => setTimeout(() => r(new Error("timeout")), 6000))]);
            if (snap && snap.exists()) {
              const raw = snap.val();
              const fbUsers = raw.__empty ? [] : Array.isArray(raw) ? raw.filter(Boolean) : Object.values(raw).filter(Boolean);
              try { localStorage.setItem("oma6_users", JSON.stringify(fbUsers)); } catch (e) { }// cache for next login
              const found = fbUsers.find(x => x.status === "active" && (x.email?.toLowerCase() === q || x.username?.toLowerCase() === q));
              if (found && found.passwordHash === hashPw(pw)) { ss("session", { userId: found.id, loginAt: now() }); onLogin(found); setLoading(false); return; }
              if (found) { setErr("Incorrect password."); setLoading(false); return; }
            }
          }
        } catch (e) { console.warn("[Login] Firebase:", e.message); }
        setErr("Account not found. Ask admin to check your account."); setLoading(false);
      };

        <div style={{ width: "min(92vw,400px)", position: "relative", zIndex: 1, animation: "fadeIn .4s ease" }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            {(() => { const logo = window._FIRM_LOGO; return logo ? <img src={logo} alt="" style={{ width: 72, height: 72, borderRadius: 18, objectFit: "contain", margin: "0 auto 16px", display: "block", border: "1px solid rgba(212,168,67,.2)" }} /> : <div style={{ width: 64, height: 64, borderRadius: 18, background: "linear-gradient(135deg,rgba(15,25,50,.9),rgba(8,13,26,.9))", border: "1px solid rgba(212,168,67,.3)", backdropFilter: "blur(20px)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: 28, boxShadow: "var(--shadow2),var(--glow-gold)" }}>⚖️</div>; })()}

            <p style={{ fontSize: 12.5, color: "var(--text3)", marginTop: 4, letterSpacing: ".04em", textTransform: "uppercase" }}>Finance & Legal CRM</p>
          </div>
          <div style={{ background: "var(--card2)", backdropFilter: "blur(24px)", border: "1px solid var(--border2)", borderRadius: 18, padding: 28, boxShadow: "var(--shadow2)" }}>
            <h2 style={{ fontFamily: "var(--font-serif)", fontSize: 18, color: "var(--text)", marginBottom: 22, fontWeight: 500 }}>Welcome back</h2>

      }, []);

      const doInstall = () => {

        window._pwaInstallPrompt.prompt();
        window._pwaInstallPrompt.userChoice.then(function (r) {
          if (r.outcome === 'accepted') window._pwaInstallPrompt = null;
          setReady(false);
        });
      };

  var t=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  if(!n)return"Zero";
  function h(x){if(x<20)return o[x];if(x<100)return t[Math.floor(x/10)]+(x%10?" "+o[x%10]:"");if(x<1000)return o[Math.floor(x/100)]+" Hundred"+(x%100?" "+h(x%100):"");if(x<100000)return h(Math.floor(x/1000))+" Thousand"+(x%1000?" "+h(x%1000):"");if(x<10000000)return h(Math.floor(x/100000))+" Lakh"+(x%100000?" "+h(x%100000):"");return h(Math.floor(x/10000000))+" Crore"+(x%10000000?" "+h(x%10000000):"");}
  return h(Math.floor(n));
}

                  <td style={{ padding: "10px 14px", textAlign: "right", color: "var(--red)", fontFamily: "var(--font-mono)", fontSize: 13 }}>{fmtMoney(monthlyFlow.reduce((s, m) => s + m.outflow, 0))}</td>
                  <td style={{ padding: "10px 14px", textAlign: "right", fontFamily: "var(--font-mono)", fontSize: 13, color: monthlyFlow.reduce((s, m) => s + m.net, 0) >= 0 ? "var(--green)" : "var(--red)" }}>{fmtMoney(monthlyFlow.reduce((s, m) => s + m.net, 0))}</td>
                </tr></tfoot>
              </table>
            </div>
          </div>}

          {tab === "trial" && <div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "var(--text)", marginBottom: 16, fontFamily: "var(--font-serif)" }}>Trial Balance — {fyLabel}</div>
            <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 12, overflow: "hidden" }}>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead><tr style={{ background: "var(--glass)" }}>{["Account", "Debit (Dr)", "Credit (Cr)"].map(h => <th key={h} style={{ padding: "10px 14px", textAlign: h === "Account" ? "left" : "right", fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase" }}>{h}</th>)}</tr></thead>
                <tbody>
                  <tr style={{ borderBottom: "1px solid var(--border)" }}><td style={{ padding: "9px 14px", fontWeight: 600, color: "var(--blue)" }}>Professional Fee Income</td><td style={{ padding: "9px 14px", textAlign: "right", fontFamily: "var(--font-mono)" }}>—</td><td style={{ padding: "9px 14px", textAlign: "right", fontFamily: "var(--font-mono)", color: "var(--green)" }}>{fmtMoney(totalRevenue)}</td></tr>
                  {expCatArr.map(([cat, amt]) => <tr key={cat} style={{ borderBottom: "1px solid var(--border)" }}><td style={{ padding: "9px 14px", color: "var(--text2)" }}>{cat}</td><td style={{ padding: "9px 14px", textAlign: "right", fontFamily: "var(--font-mono)", color: "var(--red)" }}>{fmtMoney(amt)}</td><td style={{ padding: "9px 14px", textAlign: "right", fontFamily: "var(--font-mono)" }}>—</td></tr>)}
                  <tr style={{ borderBottom: "1px solid var(--border)" }}><td style={{ padding: "9px 14px", color: "var(--text2)" }}>Accounts Receivable (Outstanding)</td><td style={{ padding: "9px 14px", textAlign: "right", fontFamily: "var(--font-mono)", color: "var(--orange)" }}>{fmtMoney(totalOutstanding)}</td><td style={{ padding: "9px 14px", textAlign: "right", fontFamily: "var(--font-mono)" }}>—</td></tr>
                </tbody>
                <tfoot><tr style={{ background: "var(--glass)", fontWeight: 700 }}><td style={{ padding: "10px 14px", fontSize: 13 }}>TOTALS</td><td style={{ padding: "10px 14px", textAlign: "right", fontFamily: "var(--font-mono)", fontSize: 13, color: "var(--red)" }}>{fmtMoney(totalExpenses + totalOutstanding)}</td><td style={{ padding: "10px 14px", textAlign: "right", fontFamily: "var(--font-mono)", fontSize: 13, color: "var(--green)" }}>{fmtMoney(totalRevenue)}</td></tr></tfoot>
              </table>
            </div>
          </div>}

          {tab === "summary" && <div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "var(--text)", marginBottom: 16, fontFamily: "var(--font-serif)" }}>Executive Summary — {fyLabel}</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 12, marginBottom: 20 }}>
              {[
                { label: "Total Invoiced", val: totalRevenue, col: "var(--blue)", icon: "📄" },
                { label: "Revenue Collected", val: totalCollected, col: "var(--green)", icon: "✅" },
                { label: "Outstanding", val: totalOutstanding, col: "var(--orange)", icon: "⏳" },
                { label: "Total Expenses", val: totalExpenses, col: "var(--red)", icon: "💸" },
                { label: "Net Profit", val: netProfit, col: netProfit >= 0 ? "var(--green)" : "var(--red)", icon: "💰" },
                { label: "Profit Margin", val: null, pct: fmtPct(netProfit), col: netProfit >= 0 ? "var(--green)" : "var(--red)", icon: "📊" },
                { label: "Active Clients", val: null, num: (S.clients || []).filter(c => c.status === "active" && !c._deleted).length, col: "var(--purple)", icon: "👥" },
                { label: "Total Invoices", val: null, num: invoices.length, col: "var(--teal)", icon: "🧾" },
              ].map(({ label, val, col, icon, pct, num }) => (
                <div key={label} style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 12, padding: "14px 16px" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text3)", marginBottom: 6 }}>{icon} {label}</div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: col, fontFamily: "var(--font-mono)" }}>{val !== null ? fmtMoney(val) : pct || String(num || 0)}</div>
                </div>
              ))}
            </div>
            <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 12, padding: "16px 18px" }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text)", marginBottom: 10 }}>Expense Breakdown</div>
              {expCatArr.map(([cat, amt], i) => { const pct2 = totalExpenses > 0 ? Math.round(amt / totalExpenses * 100) : 0; const grads = ["linear-gradient(90deg,#e11d48,#fb7185)", "linear-gradient(90deg,#d97706,#fcd34d)", "linear-gradient(90deg,#7c3aed,#a78bfa)", "linear-gradient(90deg,#2563eb,#60a5fa)", "linear-gradient(90deg,#0891b2,#38bdf8)"]; return <div key={cat} style={{ marginBottom: 10 }}><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}><span style={{ fontSize: 12.5, color: "var(--text2)" }}>{cat}</span><span style={{ fontSize: 12, fontWeight: 700, fontFamily: "var(--font-mono)" }}>{fmtMoney(amt)} <span style={{ color: "var(--text3)", fontWeight: 400 }}>({pct2}%)</span></span></div><div style={{ height: 6, borderRadius: 3, background: "var(--glass3)", overflow: "hidden" }}><div style={{ height: "100%", width: pct2 + "%", background: grads[i % grads.length], borderRadius: 3 }} /></div></div>; })}
            </div>
          </div>}
        </div>
      </Page>;
    }

    function Dashboard({ S, setS, user, setPage, setClientId }) {
      const toast = useToast();
      const _delCIds = new Set((S.clients || []).filter(c => c._deleted).map(c => c.id));
      const tasks = (S.tasks || []).filter(t => !t._deleted && !_permDel.has(t.id) && !(t.clientId && _delCIds.has(t.clientId)));
      const bills = (S.bills || []).filter(b => !b._deleted && !_permDel.has(b.id) && !(b.clientId && _delCIds.has(b.clientId)));
      const totalClients = S.clients.filter(c => !c._deleted).length;
      const activeClients = S.clients.filter(c => c.status === "active" && !c._deleted).length;
      const doneTasks = tasks.filter(t => t.status === "completed").length;
      const totalTasks = tasks.length;
      const overdueTasks = tasks.filter(t => isOverdue(t.dueDate) && t.status !== "completed").length;
      const totalBilled = bills.reduce((s, b) => s + (b.total || 0), 0);
      const totalPaid = bills.filter(b => b.status === "Paid").reduce((s, b) => s + (b.total || 0), 0);
      const totalOut = bills.filter(b => b.status !== "Paid").reduce((s, b) => s + (b.total || 0), 0);
      const activeServices = (S.services || []).filter(s => !s._deleted && (s.status === "in progress" || s.status === "active")).length;
      const greeting = () => { const h = new Date().getHours(); return h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening"; };

      const monthlyData = useMemo(() => {
        const mn = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const dn = new Date();
        return Array.from({ length: 6 }, (_, i) => {
          const d = new Date(dn); d.setMonth(d.getMonth() - (5 - i));
          const y = d.getFullYear(), m = d.getMonth();
          const billed = bills.filter(b => { const bd = new Date(b.date || b.createdAt); return bd.getFullYear() === y && bd.getMonth() === m; }).reduce((s, b) => s + (b.total || 0), 0);
          const paid = bills.filter(b => { const bd = new Date(b.date || b.createdAt); return bd.getFullYear() === y && bd.getMonth() === m && b.status === "Paid"; }).reduce((s, b) => s + (b.total || 0), 0);
          const clients = S.clients.filter(c => !c._deleted && new Date(c.createdAt).getFullYear() === y && new Date(c.createdAt).getMonth() === m).length;
          return { label: mn[m], billed, paid, clients };
        });
      }, [bills, S.clients]);
      const maxRev = Math.max(...monthlyData.map(m => m.billed), 1);

      const taskStatus = useMemo(() => {
        const m = { pending: 0, "in progress": 0, completed: 0, cancelled: 0 };
        tasks.forEach(t => { if (m[t.status] !== undefined) m[t.status]++; });
        return m;
      }, [tasks]);

      const topServices = useMemo(() => {
        const m = {}; (S.services || []).filter(s => !s._deleted).forEach(s => { if (s.serviceType) { m[s.serviceType] = (m[s.serviceType] || 0) + 1; } });
        return Object.entries(m).sort((a, b) => b[1] - a[1]).slice(0, 5);
      }, [S.services]);

      const recentActivity = [...tasks].sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0)).slice(0, 5);
      const pendingBills = bills.filter(b => b.status !== "Paid").sort((a, b) => new Date(a.dueDate || "9999") - new Date(b.dueDate || "9999")).slice(0, 5);
      const maxSvc = Math.max(...topServices.map(s => s[1]), 1);

      // Gradient helpers
      const G = {
        purple: "linear-gradient(135deg,#7c3aed,#5b21b6)",
        blue: "linear-gradient(135deg,#2563eb,#1d4ed8)",
        teal: "linear-gradient(135deg,#0891b2,#0e7490)",
        green: "linear-gradient(135deg,#059669,#047857)",
        amber: "linear-gradient(135deg,#d97706,#b45309)",
        rose: "linear-gradient(135deg,#e11d48,#be123c)",
        indigo: "linear-gradient(135deg,#4f46e5,#4338ca)",
        // Soft card backgrounds
        softPurple: "linear-gradient(135deg,rgba(124,58,237,0.08),rgba(91,33,182,0.04))",
        softBlue: "linear-gradient(135deg,rgba(37,99,235,0.08),rgba(29,78,216,0.04))",
        softTeal: "linear-gradient(135deg,rgba(8,145,178,0.08),rgba(14,116,144,0.04))",
        softGreen: "linear-gradient(135deg,rgba(5,150,105,0.08),rgba(4,120,87,0.04))",
        softAmber: "linear-gradient(135deg,rgba(217,119,6,0.08),rgba(180,83,9,0.04))",
        softRose: "linear-gradient(135deg,rgba(225,29,72,0.08),rgba(190,18,60,0.04))",
      };

      const KPICard = ({ label, value, sub, icon, grad, softGrad, onClick, trend }) => (
        <div onClick={onClick}
          style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 18, padding: "22px 24px", cursor: onClick ? "pointer" : "default", transition: "all .25s cubic-bezier(.4,0,.2,1)", position: "relative", overflow: "hidden", boxShadow: "0 2px 12px rgba(0,0,0,0.12)" }}
          onMouseEnter={e => { if (onClick) { e.currentTarget.style.transform = "translateY(-4px)"; e.currentTarget.style.boxShadow = "0 16px 48px rgba(0,0,0,0.28)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.12)"; } }}
          onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = "0 2px 12px rgba(0,0,0,0.12)"; e.currentTarget.style.borderColor = ""; }}>
          {/* Animated top accent */}
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: grad, borderRadius: "18px 18px 0 0" }} />
          {/* Background glow */}
          <div style={{ position: "absolute", top: -20, right: -20, width: 100, height: 100, background: softGrad || "rgba(255,255,255,0.02)", borderRadius: "50%", pointerEvents: "none" }} />
          {/* Icon + value row */}
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 14 }}>
            <div style={{ width: 48, height: 48, borderRadius: 14, background: softGrad || "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.07)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>
              {icon}
            </div>
            {trend !== undefined && trend !== null && <span style={{ fontSize: 11, fontWeight: 700, color: trend > 0 ? "#34d399" : trend < 0 ? "#f87171" : "var(--text3)", background: trend > 0 ? "rgba(52,211,153,0.12)" : trend < 0 ? "rgba(248,113,113,0.12)" : "var(--glass2)", padding: "3px 8px", borderRadius: 20, border: "1px solid " + (trend > 0 ? "rgba(52,211,153,0.2)" : trend < 0 ? "rgba(248,113,113,0.2)" : "var(--border)") }}>
              {trend > 0 ? "↑" : trend < 0 ? "↓" : "—"} {Math.abs(trend)}%
            </span>}
          </div>
          <div style={{ fontSize: 30, fontWeight: 800, color: "var(--text)", letterSpacing: "-0.03em", lineHeight: 1, marginBottom: 6, fontFamily: "var(--font)" }}>{value}</div>
          <div style={{ fontSize: 11.5, fontWeight: 600, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: sub ? 4 : 0 }}>{label}</div>
          {sub && <div style={{ fontSize: 11.5, color: "var(--text3)", marginTop: 4 }}>{sub}</div>}
        </div>
      );

      return <div style={{ height: "100%", overflowY: "auto", background: "var(--bg)", padding: "0 0 32px" }}>
        {/* ── Page Header ── */}
        <div style={{ padding: "24px 24px 0", marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
            <div>
              <h1 style={{ fontSize: 22, fontWeight: 700, color: "var(--text)", letterSpacing: "-0.02em", marginBottom: 4, fontFamily: "var(--font)" }}>{greeting()}, {user.name.split(" ")[0]} 👋</h1>
              <p style={{ fontSize: 13, color: "var(--text3)", fontWeight: 400 }}>{new Date().toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</p>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {overdueTasks > 0 && <div onClick={() => setPage("tasks")} style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 14px", borderRadius: 10, background: "rgba(225,29,72,0.1)", border: "1px solid rgba(225,29,72,0.2)", cursor: "pointer", fontSize: 12.5, fontWeight: 600, color: "#e11d48", transition: "all .15s" }} onMouseEnter={e => e.currentTarget.style.background = "rgba(225,29,72,0.18)"} onMouseLeave={e => e.currentTarget.style.background = "rgba(225,29,72,0.1)"}>
                <span style={{ fontSize: 16 }}>⚠️</span> {overdueTasks} Overdue
              </div>}
              {user.role === "admin" && <a href="/backend" target="_blank" onClick={() => { try { const sess = { user: user.username || user.name.toLowerCase(), name: user.name, role: user.role }; sessionStorage.setItem("_be_sess", JSON.stringify(sess)); window.open("/backend", "_blank"); } catch (e) { }; return false; }} style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 14px", borderRadius: 10, background: "rgba(45,212,191,0.12)", border: "1px solid rgba(45,212,191,0.25)", cursor: "pointer", fontSize: 12, fontWeight: 700, color: "var(--teal)", textDecoration: "none", transition: "all .2s" }} onMouseEnter={e => e.currentTarget.style.background = "rgba(45,212,191,0.2)"} onMouseLeave={e => e.currentTarget.style.background = "rgba(45,212,191,0.12)"}>
                <span style={{ fontSize: 14 }}>🔧</span> Backend
              </a>}
              <button onClick={() => setPage("clients")} style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 16px", borderRadius: 10, background: G.purple, border: "none", cursor: "pointer", fontSize: 12.5, fontWeight: 600, color: "#fff", boxShadow: "0 4px 14px rgba(124,58,237,0.3)", transition: "all .2s" }} onMouseEnter={e => e.currentTarget.style.filter = "brightness(1.1)"} onMouseLeave={e => e.currentTarget.style.filter = ""}>
                🧑‍💼 New Client
              </button>
              <button onClick={() => setPage("billing")} style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 16px", borderRadius: 10, background: G.amber, border: "none", cursor: "pointer", fontSize: 12.5, fontWeight: 600, color: "#fff", boxShadow: "0 4px 14px rgba(201,168,76,0.3)", transition: "all .2s" }} onMouseEnter={e => e.currentTarget.style.filter = "brightness(1.1)"} onMouseLeave={e => e.currentTarget.style.filter = ""}>
                💳 New Invoice
              </button>
            </div>
          </div>
        </div>

        <div style={{ padding: "0 24px" }}>
          {/* ── KPI Cards Row ── */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(min(175px,calc(50% - 7px)),1fr))", gap: 14, marginBottom: 24 }}>
            <KPICard label="Total Clients" value={totalClients} sub={activeClients + " active"} icon="👥" grad={G.purple} softGrad={G.softPurple} onClick={() => setPage("clients")} />
            <KPICard label="Revenue Collected" value={fmtMoney(totalPaid)} sub={"of " + fmtMoney(totalBilled) + " billed"} icon="💰" grad={G.green} softGrad={G.softGreen} onClick={() => setPage("billing")} />
            <KPICard label="Outstanding" value={fmtMoney(totalOut)} sub={bills.filter(b => b.status !== "Paid").length + " invoices"} icon="⚠️" grad={G.amber} softGrad={G.softAmber} onClick={() => setPage("billing")} />
            <KPICard label="Active Services" value={activeServices} sub={S.services.length + " total"} icon="⚙️" grad={G.teal} softGrad={G.softTeal} onClick={() => setPage("services")} />
            <KPICard label="Tasks Done" value={`${doneTasks}/${totalTasks}`} sub="All on track" icon="✅" grad={G.indigo} softGrad={G.softBlue} onClick={() => setPage("tasks")} />
            <KPICard label="Overdue Tasks" value={overdueTasks} sub="Need attention" icon="🔴" grad={G.rose} softGrad={G.softRose} onClick={() => setPage("tasks")} />
          </div>

          {/* ── Main Charts Row ── */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(min(380px,100%),1fr))", gap: 16, marginBottom: 20 }}>

            {/* Revenue Bar Chart */}
            <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 16, padding: "20px 22px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "var(--text)", letterSpacing: "-0.01em" }}>Monthly Revenue</div>
                  <div style={{ fontSize: 11.5, color: "var(--text3)", marginTop: 2 }}>Last 6 months</div>
                </div>
                <button onClick={() => setPage("reports")} style={{ fontSize: 11.5, color: "#7c3aed", background: "rgba(124,58,237,0.08)", border: "1px solid rgba(124,58,237,0.18)", borderRadius: 7, padding: "4px 10px", cursor: "pointer", fontWeight: 600 }}>Full Report →</button>
              </div>
              {/* Bar chart */}
              <div style={{ display: "flex", gap: 6, alignItems: "flex-end", height: 110, marginBottom: 10 }}>
                {monthlyData.map((m, i) => {
                  const bh = Math.max(4, Math.round(m.billed / maxRev * 100));
                  const ph = Math.max(0, Math.round(m.paid / maxRev * 100));
                  return <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                    <div style={{ width: "100%", position: "relative", display: "flex", flexDirection: "column", justifyContent: "flex-end", height: 100, gap: 1 }}>
                      <div title={"Billed: " + fmtMoney(m.billed)} style={{ width: "100%", height: bh + "%", background: "linear-gradient(180deg,#7c3aed,#5b21b6)", borderRadius: "4px 4px 0 0", opacity: .85, transition: "height .4s", minHeight: 4 }} />
                      <div title={"Collected: " + fmtMoney(m.paid)} style={{ position: "absolute", bottom: 0, width: "50%", left: "25%", height: ph + "%", background: "linear-gradient(180deg,#2563eb,#1d4ed8)", borderRadius: "3px 3px 0 0", transition: "height .4s", minHeight: m.paid > 0 ? 3 : 0 }} />
                    </div>
                    <div style={{ fontSize: 9.5, color: "var(--text3)", fontWeight: 500, textAlign: "center" }}>{m.label}</div>
                  </div>;
                })}
              </div>
              <div style={{ display: "flex", gap: 16, fontSize: 11, color: "var(--text3)" }}>
                <span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 10, height: 10, borderRadius: 2, background: "#7c3aed", display: "inline-block" }} /> Invoiced: {fmtMoney(monthlyData.reduce((s, m) => s + m.billed, 0))}</span>
                <span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 10, height: 10, borderRadius: 2, background: "#2563eb", display: "inline-block" }} /> Collected: {fmtMoney(monthlyData.reduce((s, m) => s + m.paid, 0))}</span>
              </div>
            </div>

            {/* Task Status Donut */}
            <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 16, padding: "20px 22px" }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: "var(--text)", letterSpacing: "-0.01em", marginBottom: 4 }}>Task Status</div>
              <div style={{ fontSize: 11.5, color: "var(--text3)", marginBottom: 18 }}>Distribution overview</div>
              {/* Visual donut-style bars */}
              {[
                { k: "pending", label: "Pending", color: "#f97316", grad: "linear-gradient(90deg,#f97316,#fb923c)" },
                { k: "in progress", label: "In Progress", color: "#2563eb", grad: "linear-gradient(90deg,#2563eb,#60a5fa)" },
                { k: "completed", label: "Completed", color: "#059669", grad: "linear-gradient(90deg,#059669,#34d399)" },
                { k: "cancelled", label: "Cancelled", color: "#6b7280", grad: "linear-gradient(90deg,#6b7280,#9ca3af)" },
              ].map(({ k, label, color, grad }) => {
                const v = taskStatus[k] || 0; const pct = totalTasks > 0 ? Math.round(v / totalTasks * 100) : 0;
                return <div key={k} style={{ marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                    <span style={{ fontSize: 12.5, fontWeight: 500, color: "var(--text2)" }}>{label}</span>
                    <span style={{ fontSize: 12, fontWeight: 700, color: "var(--text)" }}>{v} <span style={{ color: "var(--text3)", fontWeight: 400 }}>({pct}%)</span></span>
                  </div>
                  <div style={{ height: 7, borderRadius: 4, background: "var(--glass3)", overflow: "hidden" }}>
                    <div style={{ height: "100%", width: pct + "%", background: grad, borderRadius: 4, transition: "width .6s cubic-bezier(.4,0,.2,1)" }} />
                  </div>
                </div>;
              })}

                <div>

              </div>

                      <div style={{ fontSize: 12.5, fontWeight: 600, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{cl?.name || "—"}</div>
                      <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 1 }}>{fmtDate(b.dueDate)}</div>

                    <div style={{ fontSize: 12.5, fontWeight: 700, color: overdue ? "#e11d48" : "var(--text)", flexShrink: 0 }}>{fmtMoney(b.total)}</div>

                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 12.5, fontWeight: 600, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.title}</div>
                      <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 1, display: "flex", gap: 8 }}>
                        <span>{cl?.name || "—"}</span>

                      </div>

                    <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 4, fontWeight: 600, background: (sc[t.status] || "#999") + "18", color: sc[t.status] || "#999", flexShrink: 0, whiteSpace: "nowrap" }}>{t.status}</span>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: 12 }}>
              {S.users.filter(u => u.status === "active" && u.role !== "admin").map(emp => {
                const empTasks = S.tasks.filter(t => t.assignedTo === emp.id);
                const done = empTasks.filter(t => t.status === "completed").length;
                const pending = empTasks.filter(t => t.status === "pending" || t.status === "in progress").length;
                const overdue = empTasks.filter(t => isOverdue(t.dueDate) && t.status !== "completed").length;
                const pct = empTasks.length > 0 ? Math.round(done / empTasks.length * 100) : 0;
                const empSvcs = S.services.filter(s => s.assignedTo === emp.id && !s._deleted).length;
                const roleCols = { manager: "#2563eb", advocate: "#a78bfa", ca: "#2dd4bf", employee: "#34d399" };
                const col = roleCols[emp.role] || "#6b7280";
                return <div key={emp.id} style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, padding: "16px 16px 14px", position: "relative", overflow: "hidden" }}>

                    <Avatar name={emp.name} size={38} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{emp.name}</div>
                      <RoleBadge role={emp.role} />
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 10 }}>
                    {[{ label: "Done", val: done, col: "var(--green)" }, { label: "Active", val: pending, col: "var(--blue)" }, { label: "Overdue", val: overdue, col: "var(--red)" }].map(({ label, val, col: vc }) => (
                      <div key={label} style={{ textAlign: "center", background: "var(--glass)", borderRadius: 8, padding: "6px 4px" }}>
                        <div style={{ fontSize: 18, fontWeight: 800, color: vc, fontFamily: "var(--font-mono)" }}>{val}</div>
                        <div style={{ fontSize: 10, color: "var(--text3)", fontWeight: 600, textTransform: "uppercase" }}>{label}</div>

                    </div>
                    <div style={{ height: 5, borderRadius: 3, background: "var(--glass3)", overflow: "hidden" }}>
                      <div style={{ height: "100%", width: pct + "%", background: "linear-gradient(90deg," + col + "," + col + "bb)", borderRadius: 3, transition: "width .5s" }} />
                    </div>
                  </div>
                  <div style={{ fontSize: 11, color: "var(--text3)" }}>⚙️ {empSvcs} services assigned</div>
                </div>;
              })}
            </div>
          </div>}

          {/* ── Admin Ideas & Quotes Panel ── */}
          {<AdminIdeasPanel S={S} setS={setS} user={user} />}

        </div>
      </div>;
    }
    /* ══ CLIENTS PAGE ══ */
    function ClientsPage({ S, setS, user, setPage, setClientId }) {
      const toast = useToast();
      const [q, setQ] = useState(""); const [modal, setModal] = useState(false);
      const [editCl, setEditCl] = useState(null); // v29: edit state
      const [form, setForm] = useState({ name: "", type: "individual", phone: "", email: "", address: "", gstin: "", pan: "", dob: "", assignedTo: "", notes: "" });
      const [err, setErr] = useState({});

      const clients = useMemo(() => {
        const all = (["admin", "manager"].includes(user.role) ? S.clients : S.clients.filter(c => c.assignedTo === user.id)).filter(c => !c._deleted && !_permDel.has(c.id));
        const sq = q.toLowerCase();
        return all.filter(c => !sq || c.name.toLowerCase().includes(sq) || c.phone?.includes(sq) || c.email?.toLowerCase().includes(sq) || (c.clientNo || "").includes(sq));
      }, [S.clients, q, user]);

      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name = "Required";
        if (form.phone && !/^[0-9]{10}$/.test(form.phone)) e.phone = "10-digit number";
        if (form.email && !/\S+@\S+\.\S+/.test(form.email)) e.email = "Invalid email";
        setErr(e); return !Object.keys(e).length;
      };

      const save = () => {
        if (!validate()) return;
        if (editCl) {
          // v29: Update existing client
          setS(p => ({ ...p, clients: p.clients.map(c => c.id === editCl.id ? { ...c, ...form, updatedAt: now(), updatedBy: user.name } : c) }));
          audit(setS, user, "Client Updated", form.name);
          toast("Client updated!"); setModal(false); setEditCl(null);
          setForm({ name: "", type: "individual", phone: "", email: "", address: "", gstin: "", pan: "", dob: "", assignedTo: "", notes: "" });
          return;
        }
        const num = String((S.clients || []).filter(c => !c._deleted).length + 1).padStart(4, "0");
        const assignTo = S.settings?.autoTaskAssignTo || form.assignedTo || user.id;
        const nc = { id: uid("CLT"), clientNo: "OMA" + num, ...form, assignedTo: assignTo, status: "active", createdAt: now(), createdBy: user.id };
        setS(p => ({ ...p, clients: [...p.clients, nc] }));
        audit(setS, user, "Client Added", nc.name + " (" + nc.clientNo + ")");
        toast("Client " + nc.name + " added!"); setModal(false);
        setForm({ name: "", type: "individual", phone: "", email: "", address: "", gstin: "", pan: "", dob: "", assignedTo: "", notes: "" });
      };

      const deleteClient = c => {
        if (!["admin", "manager"].includes(user.role)) { toast("No permission", "error"); return }
        const svcN = S.services.filter(x => x.clientId === c.id).length;
        const billN = S.bills.filter(x => x.clientId === c.id).length;
        const msg = "Delete client \"" + c.name + "\"?\n" + (svcN + billN > 0 ? "This will also remove:\n• " + svcN + " services\n• " + billN + " invoices\n" : "") + "This cannot be undone.";
        if (!confirm(msg)) return;
        const delTs = new Date().toISOString();
        const delMark = (arr) => (arr || []).map(x => x.clientId === c.id ? { ...x, _deleted: true, _deletedAt: delTs, _deletedBy: user.name } : x);
        setS(p => {
          const delIds = [c.id, ...(p.tasks || []).filter(x => x.clientId === c.id).map(x => x.id), ...(p.bills || []).filter(x => x.clientId === c.id).map(x => x.id), ...(p.services || []).filter(x => x.clientId === c.id).map(x => x.id), ...(p.documents || []).filter(x => x.clientId === c.id).map(x => x.id)];
          _permDel.addMany(delIds);
          const ns = {
            ...p,
            clients: softDel(p.clients, c.id, user.name),
            services: delMark(p.services),
            tasks: delMark(p.tasks),
            bills: delMark(p.bills),
            documents: delMark(p.documents || []),
          };
          // Immediately push to Firebase to prevent sync echo
          setTimeout(() => window._crmPushNow && window._crmPushNow(ns), 0);
          return ns;
        });
        audit(setS, user, "Client Deleted", c.name);
        toast("Client deleted", "warn");
      };

      return <Page title="Clients" subtitle={clients.length + " client" + (clients.length !== 1 ? "s" : "")} action={<Btn onClick={() => setModal(true)}>＋ New Client</Btn>}>
        <SearchBar value={q} onChange={e => setQ(e.target.value)} placeholder="Search by name, phone, email, ID…" style={{ marginBottom: 16 }} />
        {clients.length === 0 ? <Empty icon="👥" text="No clients found." action={<Btn onClick={() => setModal(true)}>Add First Client</Btn>} /> :
          <div style={{ background: "var(--glass)", backdropFilter: "blur(20px)", border: "1px solid var(--border)", borderRadius: 14, overflow: "hidden" }}>
            <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 600 }}>
                <thead><tr style={{ background: "rgba(255,255,255,0.02)", borderBottom: "1px solid var(--border)" }}>
                  {["Client ID", "Name", "Type", "Mobile", "Email", "Status", "Actions"].map(h => <th key={h} style={{ padding: "11px 14px", textAlign: "left", fontSize: 10.5, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".07em", whiteSpace: "nowrap" }}>{h}</th>)}
                </tr></thead>
                <tbody>{clients.map((c, i) => <tr key={c.id} style={{ borderBottom: i < clients.length - 1 ? "1px solid var(--border)" : "none", transition: "background .1s" }}
                  onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.02)"} onMouseLeave={e => e.currentTarget.style.background = ""}>
                  <td style={{ padding: "12px 14px" }}><ClientTag no={c.clientNo} /></td>
                  <td style={{ padding: "12px 14px" }}><div style={{ display: "flex", alignItems: "center", gap: 9 }}><Avatar name={c.name} size={30} />
                    <div><div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--text)" }}>{c.name}</div>
                      {c.gstin && <div style={{ fontSize: 10.5, color: "var(--text3)" }}>GST: {c.gstin}</div>}</div></div></td>
                  <td style={{ padding: "12px 14px", fontSize: 12.5, color: "var(--text2)", textTransform: "capitalize" }}>{c.type}</td>
                  <td style={{ padding: "12px 14px", fontSize: 13, fontFamily: "var(--font-mono)", color: "var(--text2)" }}>{c.phone || "—"}</td>
                  <td style={{ padding: "12px 14px", fontSize: 12.5, color: "var(--text2)" }}>{c.email || "—"}</td>
                  <td style={{ padding: "12px 14px" }}><StatusBadge status={c.status} /></td>
                  <td style={{ padding: "12px 14px" }}>
                    <div style={{ display: "flex", gap: 6 }}>
                      <Btn onClick={() => { setClientId(c.id); setPage("client360") }} v="ghost" size="sm">View →</Btn>
                      {["admin", "manager"].includes(user.role) && <Btn onClick={() => { setForm({ name: c.name, type: c.type||"individual", phone: c.phone||"", email: c.email||"", address: c.address||"", gstin: c.gstin||"", pan: c.pan||"", dob: c.dob||"", assignedTo: c.assignedTo||"", notes: c.notes||"" }); setEditCl(c); setErr({}); setModal(true); }} v="ghost" size="sm" title="Edit Client">✏️</Btn>}
                      {["admin", "manager"].includes(user.role) && <Btn onClick={() => deleteClient(c)} v="danger" size="sm" title="Delete">🗑</Btn>}
                    </div>
                  </td>
                </tr>)}</tbody>
              </table>
            </div>
          </div>}
        {modal && <Modal title={editCl ? "✏️ Edit Client — " + editCl.name : "➕ Add New Client"} onClose={() => { setModal(false); setErr({}); setEditCl(null); setForm({ name: "", type: "individual", phone: "", email: "", address: "", gstin: "", pan: "", dob: "", assignedTo: "", notes: "" }); }} width={600}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
            <Field label="Full Name" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} required error={err.name} style={{ gridColumn: "1/-1" }} autoFocus />
            <Sel label="Client Type" value={form.type} onChange={e => setForm(f => ({ ...f, type: e.target.value }))} options={["individual", "company", "partnership", "trust", "llp", "huf", "other"]} />
            <Field label="Mobile" value={form.phone} onChange={e => setForm(f => ({ ...f, phone: e.target.value }))} placeholder="10-digit" error={err.phone} />
            <Field label="Email" type="email" value={form.email} onChange={e => setForm(f => ({ ...f, email: e.target.value }))} error={err.email} />
            <Field label="GSTIN" value={form.gstin} onChange={e => setForm(f => ({ ...f, gstin: e.target.value }))} placeholder="Optional" />
            <Field label="PAN" value={form.pan} onChange={e => setForm(f => ({ ...f, pan: e.target.value }))} placeholder="Optional" />
            <Field label="Date of Birth / Incorp." type="date" value={form.dob} onChange={e => setForm(f => ({ ...f, dob: e.target.value }))} />
            <Sel label="Assign To" value={form.assignedTo} onChange={e => setForm(f => ({ ...f, assignedTo: e.target.value }))} options={[{ v: "", l: "— Self —" }, ...S.users.filter(u => u.status === "active" && !u._deleted).map(u => ({ v: u.id, l: u.name + " (" + (ROLES[u.role]?.l || u.role) + ")" }))]} />
            <Field label="Address" value={form.address} onChange={e => setForm(f => ({ ...f, address: e.target.value }))} rows={2} style={{ gridColumn: "1/-1" }} />
            <Field label="Notes" value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} rows={2} style={{ gridColumn: "1/-1" }} />
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
            <Btn onClick={() => { setModal(false); setErr({}); setEditCl(null); setForm({ name: "", type: "individual", phone: "", email: "", address: "", gstin: "", pan: "", dob: "", assignedTo: "", notes: "" }); }} v="ghost">Cancel</Btn>
            <Btn onClick={save}>{editCl ? "💾 Save Changes" : "➕ Add Client"}</Btn>
          </div>
        </Modal>}
      </Page>;
    }


    /* ══ SERVICES PAGE ══ */
    function ServicesPage({ S, setS, user, setPage, setClientId }) {
      const deletedClientIds = new Set((S.clients || []).filter(cl => cl._deleted).map(cl => cl.id));
      const toast = useToast();
      const [q, setQ] = useState(""); const [statusF, setStatusF] = useState(""); const [typeF, setTypeF] = useState("");
      const [mgr, setMgr] = useState(false); const [newType, setNewType] = useState("");

      const addType = () => { const t = newType.trim(); if (!t) { toast("Enter name", "error"); return } const cur = getSvcTypes(); if (cur.includes(t)) { toast("Already exists", "warn"); return } ss("svcTypes", [...cur, t]); setNewType(""); toast("Added!") };
      const removeType = t => { ss("svcTypes", getSvcTypes().filter(x => x !== t)); toast("Removed: " + t, "warn"); };

      const deleteService = s => {
        const cl = S.clients.find(c => c.id === s.clientId);
        const msg = "Delete service \"" + s.serviceType + "\" (" + s.svcNo + ")?\nClient: " + (cl ? cl.name : "Unknown") + "\nCannot be undone!";
        if (!confirm(msg)) return;
        setS(p => ({ ...p, services: p.services.filter(x => x.id !== s.id) }));
        audit(setS, user, "Service Deleted", s.serviceType + " (" + s.svcNo + ")");
        toast("Deleted", "warn");
      };

      const svcs = useMemo(() => {
        const _delCIds_s = new Set((S.clients || []).filter(c => c._deleted).map(c => c.id));
        let list = (["admin", "manager"].includes(user.role) ? S.services : S.services.filter(s => s.assignedTo === user.id || S.clients.find(c => c.id === s.clientId)?.assignedTo === user.id))
          .filter(s => !s._deleted && !_permDel.has(s.id) && !(s.clientId && _delCIds_s.has(s.clientId)));
        const sq = q.toLowerCase();
        if (sq) list = list.filter(s => { const c = S.clients.find(c => c.id === s.clientId); return s.serviceType?.toLowerCase().includes(sq) || c?.name?.toLowerCase().includes(sq) || s.svcNo?.toLowerCase().includes(sq) });
        if (statusF) list = list.filter(s => s.status === statusF);
        if (typeF) list = list.filter(s => s.serviceType === typeF);
        return list;
      }, [S.services, S.clients, q, statusF, typeF, user]);

      return <Page title="Services" subtitle={svcs.length + " service" + (svcs.length !== 1 ? "s" : "")}
        action={<Btn onClick={() => setMgr(true)} v="gold" size="sm">⚙ Manage Types</Btn>}>
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
          <SearchBar value={q} onChange={e => setQ(e.target.value)} placeholder="Search service, client…" style={{ flex: 1, minWidth: 200 }} />
          {[["statusF", setStatusF, ["", "all status", "active", "in progress", "completed", "on hold", "cancelled"]], ["typeF", setTypeF, [{ v: "", l: "All Types" }, ...getSvcTypes().map(t => ({ v: t, l: t }))]]].map(([k, set, opts], i) => <select key={i} onChange={e => set(e.target.value)} style={{ padding: "9px 12px", borderRadius: 8, border: "1px solid var(--border)", background: "rgba(255,255,255,0.03)", color: "var(--text2)", fontSize: 13, fontFamily: "var(--font)" }}>
            {opts.map(o => typeof o === "string" ? <option key={o} value={o === "all status" ? "" : o}>{o}</option> : <option key={o.v} value={o.v}>{o.l}</option>)}
          </select>)}
        </div>
        {svcs.length === 0 ? <Empty icon="⚙️" text="No services found." /> :
          <div style={{ display: "grid", gap: 8 }}>
            {svcs.map(s => {
              const cl = S.clients.find(c => c.id === s.clientId); const asgn = S.users.find(u => u.id === s.assignedTo);
              return <div key={s.id} style={{ background: "var(--glass)", backdropFilter: "blur(20px)", border: "1px solid var(--border)", borderRadius: 12, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap", transition: "border .15s" }}
                onMouseEnter={e => e.currentTarget.style.borderColor = "var(--border2)"} onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}>
                <div style={{ flex: 1, minWidth: 200 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontSize: 13.5, fontWeight: 600, color: "var(--text)", fontFamily: "var(--font-serif)" }}>{s.serviceType}</span>
                    <span style={{ fontFamily: "var(--font-mono)", fontSize: 10.5, color: "var(--gold)", background: "var(--gold3)", padding: "1px 7px", borderRadius: 4 }}>{s.svcNo}</span>
                  </div>
                  <div style={{ fontSize: 12, color: "var(--text3)", display: "flex", gap: 10, flexWrap: "wrap" }}>
                    {cl && <span onClick={() => { setClientId(cl.id); setPage("client360") }} style={{ color: "var(--blue)", cursor: "pointer", fontWeight: 600 }}>{cl.name}</span>}
                    {s.dueDate && <span style={{ color: isOverdue(s.dueDate) ? "var(--red)" : undefined }}>Due: {fmtDate(s.dueDate)}</span>}
                    {asgn && <span>→ {asgn.name}</span>}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <StatusBadge status={s.status} />
                  <select value={s.status} onChange={e => { setS(p => ({ ...p, services: p.services.map(x => x.id === s.id ? { ...x, status: e.target.value } : x) })); toast("Updated") }}
                    style={{ padding: "4px 9px", borderRadius: 6, border: "1px solid var(--border)", background: "rgba(255,255,255,0.03)", color: "var(--text2)", fontSize: 12, cursor: "pointer", fontFamily: "var(--font)" }}>
                    {["active", "in progress", "completed", "on hold", "cancelled"].map(st => <option key={st} value={st}>{st}</option>)}
                  </select>
                  <Btn v="ghost" size="sm" onClick={() => { setClientId(s.clientId); setPage("client360") }}>Open →</Btn>
                  {["admin", "manager"].includes(user.role) && <Btn v="danger" size="sm" onClick={() => deleteService(s)}>🗑</Btn>}
                </div>
              </div>;
            })}
          </div>}
        {mgr && <Modal title="Manage Service Types" subtitle={getSvcTypes().length + " types total"} onClose={() => setMgr(false)} width={520}>
          <div style={{ display: "flex", gap: 8, marginBottom: 4 }}>
            <Field value={newType} onChange={e => setNewType(e.target.value)} placeholder="Add new service type…" style={{ flex: 1, marginBottom: 0 }} onKeyDown={e => e.key === "Enter" && addType()} autoFocus />
            <Btn onClick={addType}>+ Add</Btn>
          </div>
          <p style={{ fontSize: 11.5, color: "var(--text3)", marginBottom: 12 }}>Custom types are synced across all devices. Click 🗑 to remove any type.</p>
          <div style={{ maxHeight: 380, overflowY: "auto", display: "grid", gap: 4 }}>
            {getSvcTypes().map(t => {
              const isBuiltin = DEFAULT_SVC_TYPES.includes(t);
              return <div key={t} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 12px", background: "var(--glass)", border: "1px solid var(--border)", borderRadius: 8 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 13, color: "var(--text)", fontWeight: 500 }}>{t}</span>
                  {isBuiltin && <span style={{ fontSize: 9.5, color: "var(--text3)", padding: "1px 6px", border: "1px solid var(--border)", borderRadius: 4 }}>DEFAULT</span>}
                </div>
                <Btn v="danger" size="sm" onClick={() => {
                  if (isBuiltin && !confirm('Remove built-in type "' + t + '"? You can reset later.')) return;
                  removeType(t);
                }}>🗑</Btn>
              </div>;
            })}
          </div>
          <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <button onClick={() => { if (!confirm("Reset to all default service types?")) return; ss("svcTypes", DEFAULT_SVC_TYPES); toast("Reset to defaults!"); setMgr(false); }} style={{ background: "none", border: "none", color: "var(--text3)", cursor: "pointer", fontSize: 12, textDecoration: "underline" }}>↺ Reset to defaults</button>
            <span style={{ fontSize: 11.5, color: "var(--text3)" }}>{getSvcTypes().length} types</span>
          </div>
        </Modal>}
      </Page>;
    }

    /* ══ TASKS PAGE ══ */
    function TasksPage({ S, setS, user, setPage, setClientId }) {
      const toast = useToast();
      const [q, setQ] = useState(""); const [statusF, setStatusF] = useState(""); const [prioF, setPrioF] = useState(""); const [overdueOnly, setOverdueOnly] = useState(false);

      const tasks = useMemo(() => {
        const _delCIds_t = new Set((S.clients || []).filter(c => c._deleted).map(c => c.id));
        let list = (["admin", "manager"].includes(user.role) ? S.tasks : S.tasks.filter(t => t.assignedTo === user.id || t.createdBy === user.id))
          .filter(t => !t._deleted && !_permDel.has(t.id) && !(t.clientId && _delCIds_t.has(t.clientId)));
        const sq = q.toLowerCase();
        if (sq) list = list.filter(t => { const c = S.clients.find(c => c.id === t.clientId); return t.title?.toLowerCase().includes(sq) || c?.name?.toLowerCase().includes(sq) });
        if (statusF) list = list.filter(t => t.status === statusF);
        if (prioF) list = list.filter(t => t.priority === prioF);
        if (overdueOnly) list = list.filter(t => isOverdue(t.dueDate) && t.status !== "completed");
        return list.sort((a, b) => { if (a.status === "completed" && b.status !== "completed") return 1; if (a.status !== "completed" && b.status === "completed") return -1; return new Date(a.dueDate || "9999") - new Date(b.dueDate || "9999") });
      }, [S.tasks, S.clients, q, statusF, prioF, overdueOnly, user]);

      return <Page title="Tasks" subtitle={tasks.filter(t => t.status !== "completed").length + " active tasks"}>
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
          <SearchBar value={q} onChange={e => setQ(e.target.value)} placeholder="Search tasks…" style={{ flex: 1, minWidth: 200 }} />
          <select onChange={e => setStatusF(e.target.value)} style={{ padding: "9px 12px", borderRadius: 8, border: "1px solid var(--border)", background: "rgba(255,255,255,0.03)", color: "var(--text2)", fontSize: 13, fontFamily: "var(--font)" }}>
            <option value="">All Status</option>
            {["pending", "in progress", "completed", "cancelled"].map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <select onChange={e => setPrioF(e.target.value)} style={{ padding: "9px 12px", borderRadius: 8, border: "1px solid var(--border)", background: "rgba(255,255,255,0.03)", color: "var(--text2)", fontSize: 13, fontFamily: "var(--font)" }}>
            <option value="">All Priority</option>
            {Object.entries(TASK_PRI).map(([k, v]) => <option key={k} value={k}>{v.l}</option>)}
          </select>
          <button onClick={() => setOverdueOnly(o => !o)} style={{ padding: "9px 12px", borderRadius: 8, border: "1px solid " + (overdueOnly ? "rgba(248,113,113,.4)" : "var(--border)"), background: overdueOnly ? "var(--red2)" : "rgba(255,255,255,0.03)", color: overdueOnly ? "var(--red)" : "var(--text2)", cursor: "pointer", fontSize: 13, fontFamily: "var(--font)" }}>
            🔴 Overdue Only
          </button>
        </div>
        {tasks.length === 0 ? <Empty icon="✅" text="No tasks found." /> :
          <div style={{ display: "grid", gap: 8 }}>
            {tasks.map(t => {
              const cl = S.clients.find(c => c.id === t.clientId); const asgn = S.users.find(u => u.id === t.assignedTo);
              const ov = isOverdue(t.dueDate) && t.status !== "completed";
              return <div key={t.id} style={{ background: "var(--glass)", backdropFilter: "blur(20px)", border: "1px solid " + (ov ? "rgba(248,113,113,.2)" : "var(--border)"), borderRadius: 12, padding: "12px 16px", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                <select value={t.status} onChange={e => setS(p => ({ ...p, tasks: p.tasks.map(x => x.id === t.id ? { ...x, status: e.target.value } : x) }))}
                  style={{ padding: "4px 8px", borderRadius: 6, border: "1px solid var(--border)", background: "rgba(255,255,255,0.03)", color: "var(--text2)", fontSize: 11.5, cursor: "pointer", fontFamily: "var(--font)", flexShrink: 0 }}>
                  {["pending", "in progress", "completed", "cancelled"].map(st => <option key={st} value={st}>{st}</option>)}
                </select>
                <div style={{ flex: 1, minWidth: 150 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 600, color: t.status === "completed" ? "var(--text3)" : "var(--text)", textDecoration: t.status === "completed" ? "line-through" : undefined }}>{t.title}</div>
                  <div style={{ fontSize: 11.5, color: "var(--text3)", marginTop: 2, display: "flex", gap: 10, flexWrap: "wrap" }}>
                    {cl && <span onClick={() => { setClientId(cl.id); setPage("client360") }} style={{ color: "var(--blue)", cursor: "pointer", fontWeight: 600 }}>{cl.name}</span>}
                    {t.dueDate && <span style={{ color: ov ? "var(--red)" : "var(--text3)", fontWeight: ov ? 700 : 400 }}>{ov ? "⚠ Overdue · " : "Due: "}{fmtDate(t.dueDate)}</span>}
                    {asgn && <span>→ {asgn.name}</span>}
                  </div>
                </div>
                <PriBadge priority={t.priority} />
                {["admin", "manager"].includes(user.role) && <button onClick={() => { if (!confirm("Move task to Recycle Bin?\nTask will be permanently removed from view.")) return; _permDel.add(t.id); setS(p => { const ns = { ...p, tasks: softDel(p.tasks || [], t.id, user.name) }; setTimeout(() => window._crmPushNow && window._crmPushNow(ns), 0); return ns; }) }} style={{ background: "none", border: "none", color: "var(--text3)", cursor: "pointer", fontSize: 14, padding: 4, borderRadius: 5, transition: "color .15s", flexShrink: 0 }}
                  onMouseEnter={e => e.currentTarget.style.color = "var(--red)"} onMouseLeave={e => e.currentTarget.style.color = "var(--text3)"}>🗑</button>}
              </div>;
            })}
          </div>}
      </Page>;
    }

    /* ══ DOCUMENTS PAGE ══ */
    function DocumentsPage({ S, setS, user, setPage, setClientId }) {
      const toast = useToast();
      const [q, setQ] = useState(""); const [catF, setCatF] = useState("");
      const [modal, setModal] = useState(false); const [viewDoc, setViewDoc] = useState(null);
      const [uploading, setUploading] = useState(false);
      const [loadingFile, setLoadingFile] = useState(null);// docId being fetched
      const [form, setForm] = useState({ name: "", clientId: "", category: "", serviceId: "", date: today(), notes: "", fileName: "", fileData: "", fileType: "" });

      // Read file from input
      const handleFile = e => {
        const f = e.target.files[0]; if (!f) return;
        if (f.size > 7 * 1024 * 1024) { toast("Max file size is 7MB (RTDB limit)", "error"); return; }
        const r = new FileReader();
        r.onload = ev => setForm(p => ({ ...p, fileName: f.name, fileData: ev.target.result, fileType: f.type, name: p.name || f.name.replace(/\.[^.]+$/, "") }));
        r.readAsDataURL(f);
      };

      // Save document — metadata in app state (→ RTDB via sync), file separately in RTDB /files
      const save = async () => {
        if (!form.name.trim()) { toast("Document name required", "error"); return; }
        if (!form.clientId) { toast("Select a client", "error"); return; }
        const docId = uid("DOC");
        setUploading(true);
        let cloudSaved = false;
        if (form.fileData) {
          if (_inited && _db) {
            toast("☁ Saving file to cloud…", "info");
            cloudSaved = await saveFileToRTDB(docId, form.fileData, form.fileType, form.fileName);
            if (cloudSaved) toast("✅ File saved to cloud — visible on all devices", "success");
            else toast("File saved locally only (too large or RTDB unavailable)", "warn");
          }
        }
        const nd = {
          id: docId, name: form.name, clientId: form.clientId, category: form.category,
          serviceId: form.serviceId, date: form.date, notes: form.notes,
          fileName: form.fileName, fileType: form.fileType,
          hasCloudFile: cloudSaved,// flag: file is in RTDB
          fileData: form.fileData || null,// local base64 (stripped before cloud push)
          uploadedBy: user.id, uploadedByName: user.name, createdAt: now()
        };
        setS(p => ({ ...p, documents: [...p.documents, nd] }));
        audit(setS, user, "Document Added", form.name);
        setUploading(false); setModal(false);
        setForm({ name: "", clientId: "", category: "", serviceId: "", date: today(), notes: "", fileName: "", fileData: "", fileType: "" });
      };

      const deleteDoc = async (d) => {
        if (!confirm("Delete this document?")) return;
        if (d.hasCloudFile) deleteFileFromRTDB(d.id).catch(() => { });
        setS(p => ({ ...p, documents: p.documents.filter(x => x.id !== d.id) }));
        audit(setS, user, "Document Deleted", d.name);
        toast("Deleted", "warn");
      };

      // Open file for viewing — fetch from RTDB if not local
      const openForView = async (d) => {
        if (d.fileData) { setViewDoc(d); return; }
        if (d.hasCloudFile && _inited && _db) {
          setLoadingFile(d.id);
          toast("☁ Loading file from cloud…", "info");
          const f = await loadFileFromRTDB(d.id);
          setLoadingFile(null);
          if (f?.data) {
            // Cache locally for this session
            const updated = { ...d, fileData: f.data, fileType: f.type || d.fileType, fileName: f.name || d.fileName };
            setS(p => ({ ...p, documents: p.documents.map(x => x.id === d.id ? updated : x) }));
            setViewDoc(updated);
          } else toast("File not found in cloud", "error");
        } else if (d.hasCloudFile && !_inited) {
          toast("Cloud sync not connected. Go to Settings → Cloud Sync.", "warn");
        } else {
          toast("No file attached to this document", "warn");
        }
      };

      // Download file
      const downloadFile = async (d) => {
        let data = d.fileData;
        if (!data && d.hasCloudFile && _inited && _db) {
          setLoadingFile(d.id);
          toast("☁ Fetching file…", "info");
          const f = await loadFileFromRTDB(d.id);
          setLoadingFile(null);
          if (f?.data) { data = f.data; } else { toast("File not found", "error"); return; }
        }
        if (!data) { toast("No file available", "warn"); return; }
        const a = document.createElement("a");
        a.href = data; a.download = d.fileName || d.name;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      };

      const docs = useMemo(() => {
        const _delCIds_d = new Set((S.clients || []).filter(c => c._deleted).map(c => c.id));
        let list = (["admin", "manager"].includes(user.role) ? S.documents : S.documents.filter(d => { const c = S.clients.find(c => c.id === d.clientId); return c?.assignedTo === user.id; }))
          .filter(d => !d._deleted && !_permDel.has(d.id) && !(d.clientId && _delCIds_d.has(d.clientId)));
        const sq = q.toLowerCase();
        if (sq) list = list.filter(d => { const c = S.clients.find(c => c.id === d.clientId); return d.name?.toLowerCase().includes(sq) || c?.name?.toLowerCase().includes(sq) || d.category?.toLowerCase().includes(sq) || d.fileName?.toLowerCase().includes(sq); });
        if (catF) list = list.filter(d => d.category === catF);
        return list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      }, [S.documents, S.clients, q, catF, user]);

      const fileIcon = d => {
        const t = d.fileType || ""; const n = (d.fileName || "").toLowerCase();
        if (t.startsWith("image/") || /\.(jpg|jpeg|png|gif|webp)$/.test(n)) return "🖼️";
        if (t === "application/pdf" || n.endsWith(".pdf")) return "📕";
        if (/\.(doc|docx)$/.test(n)) return "📝";
        if (/\.(xls|xlsx|csv)$/.test(n)) return "📊";
        if (/\.(zip|rar)$/.test(n)) return "🗜️";
        return "📄";
      };

      return <Page title="Documents" subtitle={docs.length + " document" + (docs.length !== 1 ? "s" : "")} action={<Btn onClick={() => setModal(true)}>+ Upload</Btn>}>
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
          <SearchBar value={q} onChange={e => setQ(e.target.value)} placeholder="Search name, client, category…" style={{ flex: 1, minWidth: 200 }} />
          <select value={catF} onChange={e => setCatF(e.target.value)} style={{ padding: "9px 12px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--glass)", color: "var(--text2)", fontSize: 13, fontFamily: "var(--font)" }}>
            <option value="">All Categories</option>
            {DOC_CATS.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>

        {docs.length === 0
          ? <Empty icon="📁" text="No documents yet." action={<Btn onClick={() => setModal(true)}>Upload First Document</Btn>} />
          : <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(260px,1fr))", gap: 12 }}>
            {docs.map(d => {
              const cl = S.clients.find(c => c.id === d.clientId);
              const isLoading = loadingFile === d.id;
              const hasFile = !!(d.fileData || d.hasCloudFile);
              return <div key={d.id} style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 13, padding: 16, display: "flex", flexDirection: "column", gap: 10, transition: "border .15s" }}
                onMouseEnter={e => e.currentTarget.style.borderColor = "var(--border2)"}
                onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}>
                {/* Top row */}
                <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                  <div style={{ fontSize: 28, lineHeight: 1, flexShrink: 0 }}>{fileIcon(d)}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13.5, fontWeight: 700, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 3 }}>{d.name}</div>
                    {d.category && <Badge label={d.category} color="var(--purple)" size="sm" />}
                  </div>
                  {/* Cloud/local indicator */}
                  {d.hasCloudFile
                    ? <span title="Saved in cloud — viewable/downloadable on all devices" style={{ fontSize: 11.5, color: "var(--green)", fontWeight: 700, flexShrink: 0, background: "rgba(52,211,153,.1)", padding: "2px 6px", borderRadius: 5 }}>☁ Cloud</span>
                    : d.fileData
                      ? <span title="Local only — open CRM on this device to view" style={{ fontSize: 11.5, color: "var(--orange)", fontWeight: 600, flexShrink: 0, background: "rgba(251,146,60,.1)", padding: "2px 6px", borderRadius: 5 }}>💾 Local</span>
                      : <span style={{ fontSize: 11, color: "var(--text4)", flexShrink: 0 }}>No file</span>
                  }
                </div>
                {/* Meta */}
                <div style={{ fontSize: 11.5, color: "var(--text3)", display: "flex", flexDirection: "column", gap: 4 }}>
                  {cl && <div onClick={() => { setClientId(d.clientId); setPage("client360"); }} style={{ color: "var(--blue)", cursor: "pointer", fontWeight: 600, display: "flex", alignItems: "center", gap: 5 }}>
                    👤 {cl.name}
                  </div>}
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <span>📅 {fmtDate(d.date || d.createdAt)}</span>
                    {d.uploadedByName && <span>by {d.uploadedByName}</span>}
                  </div>
                  {d.fileName && <div style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>📎 {d.fileName}</div>}
                  {d.notes && <div style={{ fontStyle: "italic", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>💬 {d.notes}</div>}
                </div>
                {/* Actions */}
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: "auto", paddingTop: 6, borderTop: "1px solid var(--border)" }}>
                  {hasFile && <Btn v="blue" size="sm" onClick={() => openForView(d)} disabled={isLoading}>
                    {isLoading ? "⏳…" : "👁 View"}
                  </Btn>}
                  {hasFile && <Btn v="glass" size="sm" onClick={() => downloadFile(d)} disabled={isLoading}>
                    {isLoading ? "⏳…" : "⬇ Download"}
                  </Btn>}
                  {!hasFile && <span style={{ fontSize: 11, color: "var(--text4)", fontStyle: "italic", alignSelf: "center", flex: 1 }}>No file attached</span>}
                  {["admin", "manager"].includes(user.role) && <Btn v="danger" size="sm" onClick={() => deleteDoc(d)}>🗑</Btn>}
                </div>
              </div>;
            })}
          </div>
        }

        {/* ── View Modal ── */}
        {viewDoc && <Modal title={viewDoc.name} subtitle={viewDoc.fileName || ""} onClose={() => setViewDoc(null)} width={920}>
          <div style={{ background: "var(--bg3)", borderRadius: 10, overflow: "hidden", maxHeight: "72vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
            {(() => {
              const src = viewDoc.fileData;
              const t = viewDoc.fileType || "";
              const n = (viewDoc.fileName || "").toLowerCase();
              if (!src) return <div style={{ padding: 60, color: "var(--text3)", textAlign: "center" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>⚠️</div>
                <div>File data not loaded</div>
              </div>;
              if (t.startsWith("image/") || /\.(jpg|jpeg|png|gif|webp|svg)$/.test(n))
                return <img src={src} alt={viewDoc.name} style={{ maxWidth: "100%", maxHeight: "70vh", objectFit: "contain", borderRadius: 8, padding: 8 }} />;
              if (t === "application/pdf" || n.endsWith(".pdf"))
                return <iframe src={src} style={{ width: "100%", height: "70vh", border: "none" }} title={viewDoc.name} />;
              return <div style={{ padding: 60, textAlign: "center", color: "var(--text3)" }}>
                <div style={{ fontSize: 56, marginBottom: 14 }}>{fileIcon(viewDoc)}</div>
                <div style={{ fontSize: 15, fontWeight: 600, color: "var(--text)", marginBottom: 6 }}>{viewDoc.fileName || viewDoc.name}</div>

          {form.clientId && <Sel label="Link to Service (optional)" value={form.serviceId} onChange={e => setForm(f => ({ ...f, serviceId: e.target.value }))} options={[{ v: "", l: "— None —" }, ...S.services.filter(s => s.clientId === form.clientId && !s._deleted).map(s => ({ v: s.id, l: s.serviceType }))]} />}

          <Field label="Document Date" type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 6 }}>Attach File <span style={{ color: "var(--text3)", fontWeight: 400, textTransform: "none" }}>(max 7MB — PDF, Image, Word, Excel)</span></label>

            {form.fileName && <div style={{ fontSize: 11.5, color: "var(--green)", marginTop: 5, display: "flex", alignItems: "center", gap: 6 }}>
              <span>✓</span>
              <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{form.fileName}</span>
              <span style={{ color: "var(--text3)", flexShrink: 0, fontSize: 11 }}>({(form.fileData.length * 0.75 / 1024 / 1024).toFixed(1)}MB)</span>
            </div>}
            <div style={{ fontSize: 10.5, color: _inited ? "var(--green)" : "var(--orange)", marginTop: 4 }}>

          </div>
          <Field label="Notes" value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} rows={2} placeholder="Optional notes…" />
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", paddingTop: 4 }}>
            <Btn onClick={() => setModal(false)} v="ghost" disabled={uploading}>Cancel</Btn>

          </div>
        </Modal>}
      </Page>;

    /* ══ BILLING PAGE ══ */
    function BillingPage({ S, setS, user, setPage, setClientId }) {
