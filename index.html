      const [sheetModal, setSheetModal] = useState(false);
      const [newName, setNewName] = useState("");
      const [editCell, setEditCell] = useState(null);// {row,col}

      const [cellVal, setCellVal] = useState("");
      const [renaming, setRenaming] = useState(null);
      const [renameVal, setRenameVal] = useState("");
      const [cellFmts, setCellFmts] = useState({});// key:"id_r_c" val:{bold,italic,under,align,bg,color,wrap}
      const [colW, setColW] = useState({});// key:"id_c" val:px
      const [showChart, setShowChart] = useState(false);
      const [frozenCols, setFrozenCols] = useState(1);// freeze col A as row numbers
      const [search, setSearch] = useState(""); const [searchRes, setSearchRes] = useState([]);
      const [clipboard, setClipboard] = useState(null);// {rows:[]}
      const [undo, setUndo] = useState([]); const [redo, setRedo] = useState([]);

      const sheets = S.excelSheets || [];
      const cur = sheets.find(s => s.id === activeId) || (sheets[0] || null);
      if (!activeId && sheets.length) setTimeout(() => setActiveId(sheets[0].id), 0);

      const fk = (r, c) => cur?.id + "_" + r + "_" + c;
      const cf = (r, c) => cellFmts[fk(r, c)] || {};
      const cw = (c) => colW[cur?.id + "_" + c] || 100;

      /* ─── Formula Engine ─── */
      const evalF = (val, sheet) => {
        if (!val || typeof val !== "string" || !val.startsWith("=")) return val;
        try {
          const expr = val.slice(1).toUpperCase().trim();
          const rGet = (ref) => { const m = ref.match(/^([A-Z]+)(\d+)$/); if (!m) return 0; const c = m[1].split("").reduce((a, ch) => a * 26 + ch.charCodeAt(0) - 64, 0) - 1; const r = parseInt(m[2]) - 1; return parseFloat(sheet.rows[r]?.[c]) || 0; };
          const rng = (range) => { const [a, b] = range.split(":"); const am = a.match(/([A-Z]+)(\d+)/); const bm = b.match(/([A-Z]+)(\d+)/); if (!am || !bm) return []; const c1 = am[1].charCodeAt(0) - 65, r1 = parseInt(am[2]) - 1, c2 = bm[1].charCodeAt(0) - 65, r2 = parseInt(bm[2]) - 1; const vs = []; for (let r = r1; r <= r2; r++)for (let c = c1; c <= c2; c++) { const v = parseFloat(sheet.rows[r]?.[c]); if (!isNaN(v)) vs.push(v); } return vs; };
          if (/^SUM\((.+)\)/.test(expr)) { const vs = rng(expr.match(/SUM\((.+)\)/)[1]); return vs.reduce((a, b) => a + b, 0); }
          if (/^AVERAGE\((.+)\)/.test(expr)) { const vs = rng(expr.match(/AVERAGE\((.+)\)/)[1]); return vs.length ? +(vs.reduce((a, b) => a + b, 0) / vs.length).toFixed(4) : 0; }
          if (/^AVG\((.+)\)/.test(expr)) { const vs = rng(expr.match(/AVG\((.+)\)/)[1]); return vs.length ? +(vs.reduce((a, b) => a + b, 0) / vs.length).toFixed(4) : 0; }
          if (/^COUNT\((.+)\)/.test(expr)) { return rng(expr.match(/COUNT\((.+)\)/)[1]).length; }
          if (/^MAX\((.+)\)/.test(expr)) { const vs = rng(expr.match(/MAX\((.+)\)/)[1]); return vs.length ? Math.max(...vs) : 0; }
          if (/^MIN\((.+)\)/.test(expr)) { const vs = rng(expr.match(/MIN\((.+)\)/)[1]); return vs.length ? Math.min(...vs) : 0; }
          if (/^ROUND\((.+),(\d+)\)/.test(expr)) { const m = expr.match(/ROUND\((.+),(\d+)\)/); return +parseFloat(rGet(m[1])).toFixed(+m[2]); }
          if (/^IF\((.+),(.+),(.+)\)/.test(expr)) { const m = expr.match(/IF\((.+),(.+),(.+)\)/); const cond = m[1].trim(); const tv = m[2].trim().replace(/"/g, ""); const fv = m[3].trim().replace(/"/g, ""); try { return Function('"use strict";return ' + cond.replace(/([A-Z]+\d+)/g, s => rGet(s)))() ? (isNaN(tv) ? tv : +tv) : (isNaN(fv) ? fv : +fv); } catch (e) { return fv; } }
          if (/^([A-Z]+\d+)$/.test(expr)) return rGet(expr);
          if (/^([A-Z]+\d+)\*([A-Z]+\d+)$/.test(expr)) { const m = expr.match(/^([A-Z]+\d+)\*([A-Z]+\d+)$/); return rGet(m[1]) * rGet(m[2]); }
          if (/^([A-Z]+\d+)\+([A-Z]+\d+)$/.test(expr)) { const m = expr.match(/^([A-Z]+\d+)\+([A-Z]+\d+)$/); return rGet(m[1]) + rGet(m[2]); }
          if (/^([A-Z]+\d+)-([A-Z]+\d+)$/.test(expr)) { const m = expr.match(/^([A-Z]+\d+)-([A-Z]+\d+)$/); return rGet(m[1]) - rGet(m[2]); }
          if (/^([A-Z]+\d+)\/([A-Z]+\d+)$/.test(expr)) { const m = expr.match(/^([A-Z]+\d+)\/([A-Z]+\d+)$/); const d = rGet(m[2]); return d ? rGet(m[1]) / d : "#DIV/0!"; }
          return val;
        } catch (e) { return "#ERR"; }
      };

      /* ─── Sheet Operations ─── */
      const saveState = () => setUndo(u => [...u.slice(-20), { sheets: JSON.parse(JSON.stringify(S.excelSheets || [])) }]);

      const createSheet = () => {
        const name = newName.trim() || "Sheet " + (sheets.length + 1);
        const ns = { id: uid("XLS"), name, rows: Array.from({ length: 50 }, () => Array(12).fill("")), headers: Array.from({ length: 12 }, (_, i) => i < 26 ? String.fromCharCode(65 + i) : String.fromCharCode(64 + Math.floor(i / 26)) + String.fromCharCode(65 + (i % 26))), createdBy: user.id, createdAt: now() };
        setS(p => ({ ...p, excelSheets: [...(p.excelSheets || []), ns] }));
        setActiveId(ns.id); setNewName(""); setSheetModal(false); toast("✅ " + name + " created!");
      };

      const delSheet = id => {
        if (sheets.length <= 1) { toast("At least 1 sheet required", "warn"); return; }
        if (!confirm("Delete sheet?")) return;
        saveState();
        setS(p => ({ ...p, excelSheets: p.excelSheets.filter(s => s.id !== id) }));
        setActiveId(sheets.find(s => s.id !== id)?.id || null);
        toast("Deleted", "warn");
      };

      const setCell = (row, col, val) => {
        if (!cur) return;
        saveState();
        setS(p => ({
          ...p, excelSheets: p.excelSheets.map(s => {
            if (s.id !== cur.id) return s;
            const rows = s.rows.map((r, ri) => ri === row ? r.map((c, ci) => ci === col ? val : c) : r);
            return { ...s, rows };
          })
        }));
      };

      const addRow = () => { if (!cur) return; saveState(); setS(p => ({ ...p, excelSheets: p.excelSheets.map(s => s.id !== cur.id ? s : { ...s, rows: [...s.rows, Array(s.headers.length).fill("")] }) })); };
      const addCol = () => { if (!cur) return; saveState(); const nx = cur.headers.length; const h = nx < 26 ? String.fromCharCode(65 + nx) : String.fromCharCode(64 + Math.floor(nx / 26)) + String.fromCharCode(65 + (nx % 26)); setS(p => ({ ...p, excelSheets: p.excelSheets.map(s => s.id !== cur.id ? s : { ...s, headers: [...s.headers, h], rows: s.rows.map(r => [...r, ""]) }) })); };
      const delRow = ri => { if (!cur || cur.rows.length <= 1) return; saveState(); setS(p => ({ ...p, excelSheets: p.excelSheets.map(s => s.id !== cur.id ? s : { ...s, rows: s.rows.filter((_, i) => i !== ri) }) })); };
      const delCol = ci => { if (!cur || cur.headers.length <= 1) return; saveState(); setS(p => ({ ...p, excelSheets: p.excelSheets.map(s => s.id !== cur.id ? s : { ...s, headers: s.headers.filter((_, i) => i !== ci), rows: s.rows.map(r => r.filter((_, i) => i !== ci)) }) })); };

      const doUndo = () => { if (!undo.length) return; const prev = undo[undo.length - 1]; setRedo(r => [...r, { sheets: S.excelSheets }]); setS(p => ({ ...p, excelSheets: prev.sheets })); setUndo(u => u.slice(0, -1)); };
      const doRedo = () => { if (!redo.length) return; const nx = redo[redo.length - 1]; setUndo(u => [...u, { sheets: S.excelSheets }]); setS(p => ({ ...p, excelSheets: nx.sheets })); setRedo(r => r.slice(0, -1)); };

      const copyRange = () => { if (!cur) return; const rows = []; for (let r = selRange.r1; r <= selRange.r2; r++) { const row = []; for (let c = selRange.c1; c <= selRange.c2; c++)row.push(cur.rows[r]?.[c] || ""); rows.push(row); } setClipboard({ rows }); toast("Copied"); };
      const pasteRange = () => { if (!cur || !clipboard) return; saveState(); setS(p => ({ ...p, excelSheets: p.excelSheets.map(s => { if (s.id !== cur.id) return s; const rows = s.rows.map(r => [...r]); clipboard.rows.forEach((cr, ri) => { cr.forEach((cv, ci) => { const tr = selRange.r1 + ri, tc = selRange.c1 + ci; if (tr < rows.length && tc < (rows[tr]?.length || 0)) rows[tr][tc] = cv; }); }); return { ...s, rows }; }) })); toast("Pasted"); };

      const findSearch = () => { if (!cur || !search.trim()) return; const res = []; cur.rows.forEach((row, ri) => row.forEach((v, ci) => { if (String(v).toLowerCase().includes(search.toLowerCase())) res.push({ r: ri, c: ci, v }); })); setSearchRes(res); if (res.length) { setSelRange({ r1: res[0].r, c1: res[0].c, r2: res[0].r, c2: res[0].c }); toast(res.length + " results found"); } else toast("Not found", "warn"); };

      const download = sheet => {
        const rows = [sheet.headers, ...sheet.rows];
        if (typeof XLSX !== "undefined") { const wb = XLSX.utils.book_new(); const ws = XLSX.utils.aoa_to_sheet(rows); XLSX.utils.book_append_sheet(wb, ws, sheet.name.slice(0, 31)); XLSX.writeFile(wb, sheet.name + ".xlsx"); toast("✅ Downloaded as .xlsx!"); }
        else { const csv = rows.map(r => r.map(c => '"' + (c || "").replace(/"/g, '""') + '"').join(",")).join("\n"); const a = document.createElement("a"); a.href = "data:text/csv," + encodeURIComponent(csv); a.download = sheet.name + ".csv"; a.click(); toast("Downloaded as CSV"); }
      };

      const importFile = e => {
        const f = e.target.files[0]; if (!f) return;
        if (typeof XLSX === "undefined") { toast("XLSX not loaded", "error"); return; }
        const r = new FileReader();
        r.onload = ev => { try { const wb = XLSX.read(ev.target.result, { type: "array" }); wb.SheetNames.forEach((sn, si) => { const ws = wb.Sheets[sn]; const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" }); if (!data.length) return; const headers = data[0].map(String); const rows = data.slice(1).map(r => Array.from({ length: headers.length }, (_, i) => String(r[i] || ""))); const ns = { id: uid("XLS"), name: f.name.replace(/\.[^.]+$/, "") + (si > 0 ? " (" + sn + ")" : ""), headers, rows: rows.length ? rows : [Array(headers.length).fill("")], createdBy: user.id, createdAt: now() }; setS(p => ({ ...p, excelSheets: [...(p.excelSheets || []), ns] })); if (si === 0) setActiveId(ns.id); }); toast("✅ Imported!"); } catch (e) { toast("Import failed", "error"); } };
        r.readAsArrayBuffer(f); e.target.value = "";
      };

      const downloadPDF = sheet => {
        if (typeof jspdf === "undefined" && typeof window.jspdf === "undefined") { toast("jsPDF not loaded", "warn"); download(sheet); return; }
        try { const { jsPDF } = window.jspdf || jspdf; const doc = new jsPDF("l", "mm", "a4"); doc.setFontSize(14); doc.text(sheet.name + " — OM Associates", 14, 15); const head = [sheet.headers]; const body = sheet.rows.map(r => r.map(c => String(evalF(c, sheet) || c || ""))); doc.autoTable({ head, body, startY: 22, styles: { fontSize: 8 }, headStyles: { fillColor: [33, 115, 70] } }); doc.save(sheet.name + ".pdf"); toast("✅ Downloaded as PDF!"); } catch (e) { download(sheet); }
      };

      const setCFmt = (r, c, upd) => setCellFmts(f => ({ ...f, [fk(r, c)]: { ...f[fk(r, c)], ...upd } }));
      const applyFmt = (prop, val) => { for (let r = selRange.r1; r <= selRange.r2; r++)for (let c = selRange.c1; c <= selRange.c2; c++)setCFmt(r, c, { [prop]: val }); };
      const toggleFmt = (prop) => { const cur_ = cf(selRange.r1, selRange.c1); applyFmt(prop, !cur_[prop]); };

      const colName = idx => cur?.headers[idx] || String.fromCharCode(65 + idx);

      const XL = { green: "#217347", greenDark: "#1a5c38", header: "#f3f3f3", border: "#d0d7de", active: "rgba(33,115,70,0.08)", actBorder: "#217347" };

      const TBtn = ({ ch, tt, fn, active }) => <button onMouseDown={e => { e.preventDefault(); fn(); }} title={tt} style={{ background: active ? "rgba(255,255,255,0.3)" : "none", border: "none", color: "#fff", cursor: "pointer", padding: "3px 6px", borderRadius: 3, fontSize: 13, fontWeight: 600, minWidth: 24, transition: "background .1s" }} onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.2)"} onMouseLeave={e => e.currentTarget.style.background = active ? "rgba(255,255,255,0.3)" : "none"}>{ch}</button>;

      const isSelected = (r, c) => r >= selRange.r1 && r <= selRange.r2 && c >= selRange.c1 && c <= selRange.c2;
      const isEditing = (r, c) => editCell?.row === r && editCell?.col === c;

      // Keyboard navigation
      const handleKeyDown = (e) => {
        if (!cur) return;
        const { r1, c1 } = selRange;
        const maxR = cur.rows.length - 1, maxC = cur.headers.length - 1;
        if (e.key === "ArrowDown") { e.preventDefault(); const nr = Math.min(r1 + 1, maxR); setSelRange({ r1: nr, c1, r2: nr, c2: c1 }); }
        else if (e.key === "ArrowUp") { e.preventDefault(); const nr = Math.max(r1 - 1, 0); setSelRange({ r1: nr, c1, r2: nr, c2: c1 }); }
        else if (e.key === "ArrowRight") { e.preventDefault(); const nc = Math.min(c1 + 1, maxC); setSelRange({ r1, c1: nc, r2: r1, c2: nc }); }
        else if (e.key === "ArrowLeft") { e.preventDefault(); const nc = Math.max(c1 - 1, 0); setSelRange({ r1, c1: nc, r2: r1, c2: nc }); }
        else if (e.key === "Tab") { e.preventDefault(); const nc = Math.min(c1 + 1, maxC); setSelRange({ r1, c1: nc, r2: r1, c2: nc }); }
        else if (e.key === "Enter" && !editCell) { e.preventDefault(); setEditCell({ row: r1, col: c1 }); setCellVal(cur.rows[r1]?.[c1] || ""); }
        else if (e.key === "Delete" || e.key === "Backspace") { if (!editCell) { for (let r = selRange.r1; r <= selRange.r2; r++)for (let c = selRange.c1; c <= selRange.c2; c++)setCell(r, c, ""); } }
        else if ((e.ctrlKey || e.metaKey) && e.key === "z") { e.preventDefault(); doUndo(); }
        else if ((e.ctrlKey || e.metaKey) && e.key === "y") { e.preventDefault(); doRedo(); }
        else if ((e.ctrlKey || e.metaKey) && e.key === "c") { e.preventDefault(); copyRange(); }
        else if ((e.ctrlKey || e.metaKey) && e.key === "v") { e.preventDefault(); pasteRange(); }
        else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !editCell) { setEditCell({ row: r1, col: c1 }); setCellVal(e.key); }
      };

      return <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "#fff", fontFamily: "'Calibri','Segoe UI',sans-serif", color: "#000" }} tabIndex={0} onKeyDown={handleKeyDown}>
        {/* Title bar */}
        <div style={{ background: XL.green, color: "#fff", padding: "5px 14px", display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
          <span style={{ fontSize: 16 }}>📊</span>
          <span style={{ fontSize: 13.5, fontWeight: 700, flex: 1 }}>{cur?.name || "Excel Sheets"} — OM Associates CRM</span>
          <span style={{ fontSize: 10.5, opacity: .8 }}>Auto-saved ✓ · LZ Compressed</span>
        </div>

        {/* Ribbon */}
        <div style={{ background: XL.green, borderBottom: "2px solid " + XL.greenDark, padding: "3px 8px", display: "flex", gap: 2, flexWrap: "nowrap", overflowX: "auto", alignItems: "center", flexShrink: 0 }}>
          {/* Undo/Redo */}
          <TBtn ch="↩" tt="Undo (Ctrl+Z)" fn={doUndo} active={undo.length > 0} />
          <TBtn ch="↪" tt="Redo (Ctrl+Y)" fn={doRedo} active={redo.length > 0} />
          <div style={{ width: 1, height: 18, background: "rgba(255,255,255,.3)", margin: "0 3px" }} />
          {/* Formatting */}
          <TBtn ch={<b>B</b>} tt="Bold" fn={() => toggleFmt("bold")} active={cf(selRange.r1, selRange.c1).bold} />
          <TBtn ch={<i>I</i>} tt="Italic" fn={() => toggleFmt("italic")} active={cf(selRange.r1, selRange.c1).italic} />
          <TBtn ch={<u>U</u>} tt="Underline" fn={() => toggleFmt("under")} active={cf(selRange.r1, selRange.c1).under} />
          <div style={{ width: 1, height: 18, background: "rgba(255,255,255,.3)", margin: "0 3px" }} />
          <TBtn ch="⬅" tt="Align Left" fn={() => applyFmt("align", "left")} />
          <TBtn ch="⬛" tt="Center" fn={() => applyFmt("align", "center")} />
          <TBtn ch="➡" tt="Align Right" fn={() => applyFmt("align", "right")} />
          <div style={{ width: 1, height: 18, background: "rgba(255,255,255,.3)", margin: "0 3px" }} />
          {/* BG color */}
          <label title="Fill Color" style={{ display: "flex", alignItems: "center", gap: 2, cursor: "pointer", background: "rgba(255,255,255,.15)", borderRadius: 3, padding: "2px 5px" }}>
            <span style={{ fontSize: 11, color: "#fff" }}>🎨</span>
            <input type="color" defaultValue="#ffff00" onChange={e => applyFmt("bg", e.target.value)} style={{ width: 14, height: 14, border: "none", cursor: "pointer", padding: 0, background: "none" }} />
          </label>
          <label title="Text Color" style={{ display: "flex", alignItems: "center", gap: 2, cursor: "pointer", background: "rgba(255,255,255,.15)", borderRadius: 3, padding: "2px 5px" }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: "#fff" }}>A</span>
            <input type="color" defaultValue="#000000" onChange={e => applyFmt("color", e.target.value)} style={{ width: 14, height: 14, border: "none", cursor: "pointer", padding: 0, background: "none" }} />
          </label>
          <div style={{ width: 1, height: 18, background: "rgba(255,255,255,.3)", margin: "0 3px" }} />
          <TBtn ch="＋R" tt="Add Row" fn={addRow} />
          <TBtn ch="＋C" tt="Add Column" fn={addCol} />
          <TBtn ch="−R" tt="Delete Last Row" fn={() => delRow(cur?.rows.length - 1)} />
          <TBtn ch="−C" tt="Delete Last Column" fn={() => delCol(cur?.headers.length - 1)} />
          <div style={{ width: 1, height: 18, background: "rgba(255,255,255,.3)", margin: "0 3px" }} />
          {/* Search */}
          <input value={search} onChange={e => setSearch(e.target.value)} onKeyDown={e => e.key === "Enter" && findSearch()}
            placeholder="🔍 Find (Enter)"
            style={{ background: "rgba(255,255,255,.15)", border: "1px solid rgba(255,255,255,.3)", borderRadius: 3, padding: "2px 7px", fontSize: 12, color: "#fff", outline: "none", width: 120, "::placeholder": { color: "rgba(255,255,255,.6)" } }} />
          <div style={{ flex: 1 }} />
          {/* File ops */}
          {cur && <TBtn ch="⬇ XLSX" tt="Download Excel" fn={() => download(cur)} />}
          {cur && <TBtn ch="⬇ PDF" tt="Download PDF" fn={() => downloadPDF(cur)} />}
          <label title="Import Excel/CSV">
            <TBtn ch="⬆ Import" tt="Import file" fn={() => { }} />
            <input type="file" accept=".xlsx,.xls,.csv" onChange={importFile} style={{ display: "none" }} />
          </label>
          <button onClick={() => setSheetModal(true)} style={{ background: "rgba(255,255,255,.18)", border: "1px solid rgba(255,255,255,.4)", color: "#fff", cursor: "pointer", padding: "3px 10px", borderRadius: 3, fontSize: 12.5, fontWeight: 700, whiteSpace: "nowrap" }}>＋ New Sheet</button>
        </div>

        {/* Formula bar */}
        {cur && <div style={{ background: "#f8f8f8", borderBottom: "1px solid " + XL.border, padding: "2px 10px", display: "flex", alignItems: "center", gap: 8, flexShrink: 0, minHeight: 28 }}>
          <div style={{ background: "#fff", border: "1px solid " + XL.border, borderRadius: 2, padding: "1px 8px", fontSize: 12, fontWeight: 700, minWidth: 52, textAlign: "center", color: XL.green }}>
            {colName(editCell?.col ?? selRange.c1)}{(editCell?.row ?? selRange.r1) + 1}
          </div>
          <span style={{ color: "#999", fontSize: 13, fontStyle: "italic" }}>fx</span>
          <input
            value={editCell ? cellVal : (cur.rows[selRange.r1]?.[selRange.c1] || "")}
            onChange={e => { if (editCell) setCellVal(e.target.value); else { setEditCell({ row: selRange.r1, col: selRange.c1 }); setCellVal(e.target.value); } }}
            onKeyDown={e => { if (e.key === "Enter" && editCell) { setCell(editCell.row, editCell.col, cellVal); setSelRange({ r1: Math.min(editCell.row + 1, cur.rows.length - 1), c1: editCell.col, r2: Math.min(editCell.row + 1, cur.rows.length - 1), c2: editCell.col }); setEditCell(null); e.preventDefault(); } if (e.key === "Escape" && editCell) { setEditCell(null); } }}
            placeholder="Value or formula: =SUM(A1:A10), =IF(A1>0,&quot;Yes&quot;,&quot;No&quot;), =A1*B1"
            style={{ flex: 1, border: "1px solid " + XL.border, borderRadius: 2, padding: "2px 8px", fontSize: 12.5, outline: "none", fontFamily: "'Consolas','Courier New',monospace", background: "#fff" }} />
        </div>}

        {/* Spreadsheet */}
        <div style={{ flex: 1, overflow: "auto", position: "relative" }}>
          {!cur
            ? <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", gap: 14 }}>
              <div style={{ fontSize: 56 }}>📊</div>
              <div style={{ fontSize: 17, fontWeight: 700, color: XL.green }}>No Sheets</div>
              <button onClick={() => setSheetModal(true)} style={{ background: XL.green, color: "#fff", border: "none", borderRadius: 4, padding: "9px 22px", fontSize: 13.5, fontWeight: 700, cursor: "pointer" }}>＋ Create First Sheet</button>
            </div>
            : <table style={{ borderCollapse: "collapse", tableLayout: "fixed", fontSize: 12.5, minWidth: "100%" }}>
              <thead style={{ position: "sticky", top: 0, zIndex: 10 }}>
                <tr>
                  <th style={{ width: 44, background: XL.header, border: "1px solid " + XL.border, padding: "4px", fontSize: 10.5, color: "#666", textAlign: "center", position: "sticky", left: 0, zIndex: 11, userSelect: "none" }} />
                  {cur.headers.map((h, ci) => <th key={ci}
                    style={{ width: cw(ci), minWidth: 60, maxWidth: 300, background: isSelected(-1, ci) && false ? XL.active : XL.header, border: "1px solid " + XL.border, padding: "4px 8px", fontSize: 11.5, fontWeight: 700, color: "#555", textAlign: "center", userSelect: "none", cursor: "default", whiteSpace: "nowrap", overflow: "hidden" }}
                    onDoubleClick={() => { const w = prompt("Column width px:", cw(ci)); if (w && +w > 20) setColW(cw2 => ({ ...cw2, [cur.id + "_" + ci]: +w })); }}>
                    {h}
                  </th>)}
                </tr>
              </thead>
              <tbody>
                {cur.rows.map((row, ri) => <tr key={ri}>
                  <td style={{ background: XL.header, border: "1px solid " + XL.border, padding: "2px 5px", fontSize: 11, color: "#777", textAlign: "center", fontWeight: 500, position: "sticky", left: 0, zIndex: 5, userSelect: "none", width: 44 }}>{ri + 1}</td>
                  {Array.from({ length: cur.headers.length }, (_, ci) => {
                    const val = row[ci] || "";
                    const isEd = isEditing(ri, ci);
                    const isSel = isSelected(ri, ci);
                    const f = cf(ri, ci);
                    const displayed = isEd ? cellVal : String(evalF(val, cur) || val || "");
                    const isErr = displayed.startsWith("#");
                    return <td key={ci}
                      style={{
                        padding: 0, width: cw(ci), minWidth: 60, maxWidth: 300,
                        border: "1px solid " + (isEd ? XL.green : XL.border),
                        background: isEd ? "#fffff0" : isSel ? XL.active : f.bg || "#fff",
                        outline: isEd ? "2px solid " + XL.green : isSel ? "1.5px solid " + XL.green : "none",
                        outlineOffset: "-2px", position: "relative",
                        boxSizing: "border-box",
                      }}
                      onClick={e => {
                        if (!e.shiftKey) setSelRange({ r1: ri, c1: ci, r2: ri, c2: ci });
                        else setSelRange(s => ({ r1: Math.min(s.r1, ri), c1: Math.min(s.c1, ci), r2: Math.max(s.r2, ri), c2: Math.max(s.c2, ci) }));
                        if (editCell && !(editCell.row === ri && editCell.col === ci)) { setCell(editCell.row, editCell.col, cellVal); setEditCell(null); }
                      }}
                      onDoubleClick={() => { setEditCell({ row: ri, col: ci }); setCellVal(val); }}>
                      {isEd
                        ? <input autoFocus value={cellVal} onChange={e => setCellVal(e.target.value)}
                          onBlur={() => { setCell(ri, ci, cellVal); setEditCell(null); }}
                          onKeyDown={e => {
                            if (e.key === "Enter") { setCell(ri, ci, cellVal); const nr = ri + 1 < cur.rows.length ? ri + 1 : ri; setSelRange({ r1: nr, c1: ci, r2: nr, c2: ci }); setEditCell(null); e.preventDefault(); }
                            if (e.key === "Tab") { setCell(ri, ci, cellVal); const nc = ci + 1 < cur.headers.length ? ci + 1 : ci; setSelRange({ r1: ri, c1: nc, r2: ri, c2: nc }); setEditCell(null); e.preventDefault(); }
                            if (e.key === "Escape") { setEditCell(null); }
                            e.stopPropagation();
                          }}
                          style={{ width: "100%", height: "100%", minHeight: 26, padding: "2px 7px", border: "none", background: "#fffff0", fontSize: 12.5, outline: "none", fontFamily: "'Calibri',sans-serif", boxSizing: "border-box", fontWeight: f.bold ? "700" : "400", fontStyle: f.italic ? "italic" : "normal", textAlign: f.align || "left", color: f.color || "#000" }} />
                        : <div style={{ padding: "2px 7px", minHeight: 26, lineHeight: "22px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: f.wrap ? "normal" : "nowrap", fontWeight: f.bold ? "700" : "400", fontStyle: f.italic ? "italic" : "normal", textDecoration: f.under ? "underline" : "none", textAlign: f.align || (isNaN(parseFloat(displayed)) ? "left" : "right"), color: isErr ? "#c00" : f.color || "#000", fontSize: 12.5 }}>
                          {displayed}
                        </div>
                      }
                    </td>;
                  })}
                </tr>)}
              </tbody>
            </table>
          }
        </div>

        {/* Sheet tabs */}
        <div style={{ background: "#f3f3f3", borderTop: "1px solid " + XL.border, display: "flex", alignItems: "stretch", overflowX: "auto", flexShrink: 0, minHeight: 30 }}>
          {sheets.map(s => <div key={s.id} style={{ display: "flex", alignItems: "stretch", flexShrink: 0 }}>
            {renaming === s.id
              ? <input autoFocus value={renameVal} onChange={e => setRenameVal(e.target.value)}
                onBlur={() => { if (renameVal.trim()) setS(p => ({ ...p, excelSheets: p.excelSheets.map(x => x.id === s.id ? { ...x, name: renameVal.trim() } : x) })); setRenaming(null); }}
                onKeyDown={e => { if (e.key === "Enter") e.currentTarget.blur(); if (e.key === "Escape") setRenaming(null); }}
                style={{ border: "2px solid " + XL.green, padding: "2px 8px", fontSize: 12.5, outline: "none", minWidth: 60, maxWidth: 120, fontFamily: "'Calibri',sans-serif" }} />
              : <button onClick={() => setActiveId(s.id)} onDoubleClick={() => { setRenaming(s.id); setRenameVal(s.name); }}
                title="Click: select | Double-click: rename"
                style={{ padding: "4px 13px", border: "none", borderTop: s.id === activeId ? "3px solid " + XL.green : "3px solid transparent", borderRight: "1px solid " + XL.border, background: s.id === activeId ? "#fff" : "#e8e8e8", cursor: "pointer", fontSize: 12.5, fontWeight: s.id === activeId ? 700 : 400, color: s.id === activeId ? XL.green : "#555", whiteSpace: "nowrap", transition: "all .1s", minHeight: 30 }}>
                📊 {s.name}
              </button>
            }

      const getDeleted = key => (S[key] || []).filter(x => x._deleted);
      const allDeleted = Object.entries(RECYCLE_BINS).flatMap(([type, cfg]) => getDeleted(cfg.key).map(x => ({ ...x, _type: type, _typeLabel: cfg.label, _typeIcon: cfg.icon })));
      const shown = tab === "all" ? allDeleted : allDeleted.filter(x => x._type === tab);
      shown.sort((a, b) => new Date(b._deletedAt || 0) - new Date(a._deletedAt || 0));

      const restore = (item) => {
        const key = RECYCLE_BINS[item._type].key;
        _permDel.remove(item.id); // Remove from permanent delete registry
        setS(p => ({ ...p, [key]: unDel(p[key] || [], item.id) }));
        toast((item.name || item.title || item.description || "Item") + " restored! ✓");
      };
      const permDelete = (item) => {
        if (!confirm("Permanently delete? This CANNOT be undone.")) return;
        const key = RECYCLE_BINS[item._type].key;
        _permDel.add(item.id);
        setS(p => { const ns = { ...p, [key]: (p[key] || []).filter(x => x.id !== item.id) }; setTimeout(() => window._crmPushNow && window._crmPushNow(ns), 0); return ns; });
        toast("Permanently deleted", "warn");
      };
      const emptyBin = () => {
        if (!confirm("Empty entire Recycle Bin? ALL items will be permanently deleted!")) return;
        const updates = {};
        Object.values(RECYCLE_BINS).forEach(cfg => { updates[cfg.key] = (S[cfg.key] || []).filter(x => !x._deleted); });
        setS(p => ({ ...p, ...updates }));

    /* ══════════════════════════════════════════════

    const sendAutoWhatsApp = async (phone, message, apiKey) => {
      if (!apiKey || !phone || !message) return false;
      const p = (phone + "").replace(/\D/g, "");
      const num = p.length === 10 ? "91" + p : p.length === 12 ? p : p.length > 10 ? "91" + p.slice(-10) : "91" + p;
      const url = "https://api.callmebot.com/whatsapp.php?phone=" + num + "&text=" + encodeURIComponent(message) + "&apikey=" + encodeURIComponent(apiKey);
      // Method 1: no-cors fetch (works in most browsers)
      try { fetch(url, { method: "GET", mode: "no-cors", cache: "no-cache" }); return true; } catch (e) { }
      // Method 2: iframe trick (no popup, silent send)
      try {
        const ifr = document.createElement("iframe");
        ifr.style.cssText = "position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;top:-9999px";
        ifr.src = url;
        document.body.appendChild(ifr);
        setTimeout(() => { try { document.body.removeChild(ifr); } catch (e) { } }, 5000);
        return true;
      } catch (e) { }
      // Method 3: Image beacon fallback
      try { new Image().src = url; return true; } catch (e) { }
      return false;
    };

    // Intelligent queue: rate-limit to 1 per 4s (CallMeBot limit)
    let _waQueue = []; let _waSending = false; let _waSentCount = 0;
    const queueWhatsApp = (phone, msg, apiKey) => {

      const dedup = phone + "_" + msg.slice(0, 30);
      if (_waQueue.some(x => x.dedup === dedup)) return;
      _waQueue.push({ phone, msg, apiKey, dedup });
      if (!_waSending) processWAQueue();
    };
    const processWAQueue = async () => {
      if (_waQueue.length === 0) { _waSending = false; return; }
      _waSending = true;
      const item = _waQueue.shift();
      await sendAutoWhatsApp(item.phone, item.msg, item.apiKey);

    function ReminderEngine({ S, setPage, user }) {
      const fired = useRef(new Set());

      const check = useCallback(() => {
        const cfg = S.settings || {};
        if (!cfg.autoReminderEnabled) return;
        const now2 = new Date();
        const todayStr = now2.toISOString().slice(0, 10);
        const daysBefore = (cfg.reminderDaysBefore && cfg.reminderDaysBefore.length) ? cfg.reminderDaysBefore : [1, 3, 7];
        const waKey = cfg.callMeBotApiKey || "";
        const waPhone = cfg.firmPhone || "9581880088";
        const daysUntil = d => { if (!d) return null; const diff = new Date(d) - now2; return Math.floor(diff / 86400000); };
        const firm = cfg.firmName || "OM Associates";

        const fire = (id, icon, title, body, pg, waMsg) => {
          if (fired.current.has(id + todayStr)) return;
          fired.current.add(id + todayStr);
          pushAlert({ id: id + todayStr + Date.now(), icon, title, body, pg, at: new Date().toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }) });
          sendBrowserNotif(title, body);
          if (waKey && waPhone && cfg.autoWAEnabled !== false && waMsg) {
            queueWhatsApp(waPhone, waMsg, waKey);
          }
        };

        if (cfg.reminderTasks !== false) {
          const myTasks = ["admin", "manager"].includes(user.role) ? S.tasks : S.tasks.filter(t => t.assignedTo === user.id || t.createdBy === user.id);
          myTasks.filter(t => t.status !== "completed" && t.status !== "cancelled" && t.dueDate).forEach(t => {
            const d = daysUntil(t.dueDate);
            const cl = S.clients.find(c => c.id === t.clientId);
            const asgn = S.users.find(u => u.id === t.assignedTo);
            const base = `📋 Task — ${firm}\n\nTask: ${t.title}\nClient: ${cl?.name || "—"}\nAssigned: ${asgn?.name || "—"}\nDue: ${fmtDate(t.dueDate)}\nPriority: ${(t.priority || "").toUpperCase()}`;
            if (d === 0) fire("task_today_" + t.id, "🔴", "Task Due TODAY", `${t.title}${cl ? " — " + cl.name : ""}. Due today!`, "tasks", "🔴 " + base + "\nSTATUS: DUE TODAY — Complete ASAP!");
            else if (d < 0) fire("task_overdue_" + t.id, "⚠️", "Task OVERDUE", `${t.title}${cl ? " — " + cl.name : ""} overdue by ${Math.abs(d)} day(s).`, "tasks", "⚠️ " + base + `\nSTATUS: OVERDUE by ${Math.abs(d)} day(s)!`);
            else if (daysBefore.includes(d)) fire("task_" + d + "d_" + t.id, "📋", "Task Due in " + d + " Day" + (d > 1 ? "s" : ""), `${t.title}${cl ? " — " + cl.name : ""}. Due: ${fmtDate(t.dueDate)}`, "tasks", d <= 3 ? "⏰ " + base + `\nStatus: Due in ${d} day${d > 1 ? "s" : ""}` : null);
          });
        }

        if (cfg.reminderServices !== false) {
          const mySvc = ["admin", "manager"].includes(user.role) ? S.services : S.services.filter(s => s.assignedTo === user.id);
          mySvc.filter(s => s.status !== "completed" && s.status !== "cancelled" && s.dueDate).forEach(s => {
            const d = daysUntil(s.dueDate);
            const cl = S.clients.find(c => c.id === s.clientId);
            const asgn = S.users.find(u => u.id === s.assignedTo);
            const base = `⚙️ Service — ${firm}\n\nService: ${s.serviceType || "Service"}\nClient: ${cl?.name || "—"}\nAssigned: ${asgn?.name || "—"}\nDue: ${fmtDate(s.dueDate)}`;
            if (d === 0) fire("svc_today_" + s.id, "🔴", "Service Due TODAY", `${s.serviceType || "Service"}${cl ? " — " + cl.name : ""}. Due today!`, "services", "🔴 " + base + "\nSTATUS: DUE TODAY!");
            else if (d < 0) fire("svc_overdue_" + s.id, "⚠️", "Service OVERDUE", `${s.serviceType || "Service"}${cl ? " — " + cl.name : ""} overdue by ${Math.abs(d)} day(s).`, "services", "⚠️ " + base + `\nSTATUS: OVERDUE by ${Math.abs(d)} day(s)!`);
            else if (daysBefore.includes(d)) fire("svc_" + d + "d_" + s.id, "⚙️", "Service Due in " + d + " Day" + (d > 1 ? "s" : ""), `${s.serviceType || "Service"}${cl ? " — " + cl.name : ""}. Due: ${fmtDate(s.dueDate)}`, "services", d <= 3 ? "⏰ " + base + `\nStatus: Due in ${d} day${d > 1 ? "s" : ""}` : null);
          });
        }

        if (cfg.reminderGST !== false) {
          (S.gstReminders || []).filter(r => r.status !== "completed" && r.dueDate).forEach(r => {
            const d = daysUntil(r.dueDate);
            const cl = S.clients.find(c => c.id === r.clientId);
            const base = `🧾 GST Filing — ${firm}\n\nFiling: ${r.type}\nClient: ${cl?.name || "—"}\nGSTIN: ${r.gstin || cl?.gstin || "—"}\nPeriod: ${r.month || ""} ${r.year || ""}\nDue: ${fmtDate(r.dueDate)}`;
            if (d === 0) fire("gst_today_" + r.id, "🧾", "GST Filing Due TODAY", `${r.type}${cl ? " — " + cl.name : ""}. File today!`, "gst", "🔴 " + base + "\n⚠️ FILE TODAY — Late penalty applies!");
            else if (d < 0) fire("gst_overdue_" + r.id, "🚨", "GST Filing OVERDUE", `${r.type}${cl ? " — " + cl.name : ""} overdue by ${Math.abs(d)} day(s).`, "gst", "🚨 " + base + `\nOVERDUE by ${Math.abs(d)} day(s) — Late fees applicable!`);
            else if (daysBefore.includes(d)) fire("gst_" + d + "d_" + r.id, "🧾", "GST Filing in " + d + " Day" + (d > 1 ? "s" : ""), `${r.type}${cl ? " — " + cl.name : ""}. Due: ${fmtDate(r.dueDate)}`, "gst", "⏰ " + base + `\nStatus: Due in ${d} day${d > 1 ? "s" : ""}. Collect documents now.`);
          });
        }

        if (cfg.reminderBilling !== false) {
          S.bills.filter(b => b.status !== "Paid" && b.dueDate).forEach(b => {
            const d = daysUntil(b.dueDate);
            const cl = S.clients.find(c => c.id === b.clientId);
            const base = `💰 Invoice — ${firm}\n\nInvoice: ${b.invoiceNo || "—"}\nClient: ${cl?.name || "—"}\nAmount: ₹${(b.total || 0).toLocaleString("en-IN")}\nDue: ${fmtDate(b.dueDate)}`;
            if (d === 0) fire("bill_today_" + b.id, "💰", "Invoice Due TODAY", `${b.invoiceNo || "Invoice"}${cl ? " — " + cl.name : ""}. ₹${(b.total || 0).toLocaleString("en-IN")} pending.`, "billing", "🔴 " + base + "\nPAYMENT DUE TODAY!");
            else if (d < 0) fire("bill_overdue_" + b.id, "⚠️", "Invoice OVERDUE", `${b.invoiceNo || "Invoice"}${cl ? " — " + cl.name : ""} overdue by ${Math.abs(d)} day(s).`, "billing", "⚠️ " + base + `\nOVERDUE by ${Math.abs(d)} day(s)!`);

          });
        }
      }, [S, user]);

      useEffect(() => {
        check();
        const interval = setInterval(() => {
          const cfg = S.settings || {};
          const now2 = new Date();
          const [rh, rm] = (cfg.reminderTime || "09:00").split(":").map(Number);
          if (now2.getHours() === rh && now2.getMinutes() === rm) check();
          check();
        }, 60000);
        return () => clearInterval(interval);
      }, [S, check]);

      return null;
    }

    /* ══ NOTIFICATION BELL (in Topbar) ══ */
    function NotificationBell({ setPage }) {
      const alerts = useAlerts();
      const [open, setOpen] = useState(false);
      const [seen, setSeen] = useState(0);
      const ref = useRef(null);
      const unseen = alerts.length - seen;

      useEffect(() => {
        const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h);
      }, []);

      const dismiss = id => { _alertList = _alertList.filter(a => a.id !== id); _alertListeners.forEach(l => l([..._alertList])); };
      const clearAll = () => { _alertList = []; _alertListeners.forEach(l => l([])); setOpen(false); };

      const iconColor = {
        "🔴": "var(--red)", "⚠️": "var(--orange)", "🚨": "var(--red)", "📋": "var(--blue)",
        "⚙️": "var(--teal)", "🧾": "var(--gold)", "💰": "var(--green)"
      };

      return <div ref={ref} style={{ position: "relative" }}>
        <button onClick={() => { setOpen(o => !o); setSeen(alerts.length); }}
          style={{ position: "relative", background: "var(--glass2)", border: "1px solid var(--border)", borderRadius: 8, padding: "6px 10px", cursor: "pointer", color: "var(--text2)", fontSize: 16, display: "flex", alignItems: "center", transition: "all .15s" }}
          onMouseEnter={e => e.currentTarget.style.borderColor = "var(--gold)"}
          onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}>
          🔔
          {unseen > 0 && <span style={{ position: "absolute", top: -4, right: -4, background: "var(--red)", color: "#fff", borderRadius: 10, fontSize: 9, fontWeight: 800, padding: "1px 5px", minWidth: 14, textAlign: "center", lineHeight: "14px" }}>{unseen > 9 ? "9+" : unseen}</span>}
        </button>
        {open && <div style={{ position: "absolute", right: 0, top: "calc(100% + 8px)", width: 340, maxHeight: 440, background: "var(--card2)", border: "1px solid var(--border2)", borderRadius: 14, zIndex: 600, boxShadow: "var(--shadow2)", display: "flex", flexDirection: "column", animation: "scaleIn .15s ease", overflow: "hidden" }}>
          <div style={{ padding: "12px 16px", borderBottom: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
            <div style={{ fontSize: 13.5, fontWeight: 700, color: "var(--text)", fontFamily: "var(--font-serif)" }}>🔔 Reminders</div>
            {alerts.length > 0 && <button onClick={clearAll} style={{ background: "none", border: "none", color: "var(--text3)", cursor: "pointer", fontSize: 11.5, fontWeight: 600 }}
              onMouseEnter={e => e.currentTarget.style.color = "var(--red)"} onMouseLeave={e => e.currentTarget.style.color = "var(--text3)"}>Clear All</button>}
          </div>
          <div style={{ overflowY: "auto", flex: 1 }}>
            {alerts.length === 0
              ? <div style={{ padding: "28px 16px", textAlign: "center", color: "var(--text3)", fontSize: 13 }}>
                <div style={{ fontSize: 32, marginBottom: 8 }}>✅</div>
                No pending reminders
              </div>
              : alerts.map(a => <div key={a.id} style={{ padding: "11px 14px", borderBottom: "1px solid var(--border)", display: "flex", gap: 10, alignItems: "flex-start", cursor: "pointer", transition: "background .1s" }}
                onMouseEnter={e => e.currentTarget.style.background = "var(--glass)"}
                onMouseLeave={e => e.currentTarget.style.background = ""}>
                <span style={{ fontSize: 18, flexShrink: 0, marginTop: 1 }}>{a.icon}</span>
                <div style={{ flex: 1, minWidth: 0 }} onClick={() => { setPage(a.pg); setOpen(false); }}>
                  <div style={{ fontSize: 12.5, fontWeight: 700, color: iconColor[a.icon] || "var(--text)", marginBottom: 2 }}>{a.title}</div>
                  <div style={{ fontSize: 11.5, color: "var(--text2)", lineHeight: 1.5, wordBreak: "break-word" }}>{a.body}</div>
                  <div style={{ fontSize: 10.5, color: "var(--text3)", marginTop: 3 }}>{a.at}</div>
                </div>
                <button onClick={() => dismiss(a.id)} style={{ background: "none", border: "none", color: "var(--text4)", cursor: "pointer", fontSize: 12, padding: 2, flexShrink: 0, lineHeight: 1 }}
                  onMouseEnter={e => e.currentTarget.style.color = "var(--red)"} onMouseLeave={e => e.currentTarget.style.color = "var(--text4)"}>✕</button>
              </div>)}
          </div>
        </div>}
      </div>;
    }

      const allMessages = useMemo(() => {

          if (!overdue.length && !today.length && !soon.length) return;

          let lines = [`🔔 *${firm} — Task Reminder*\n\nHello ${emp.name},`];
          if (overdue.length) {
            lines.push(`\n⚠️ *OVERDUE Tasks (${overdue.length}):*`);
            overdue.forEach(t => { const cl = S.clients.find(c => c.id === t.clientId); lines.push(`• ${t.title}${cl ? " (" + cl.name + ")" : ""} — Overdue by ${Math.abs(daysUntil(t.dueDate))} day(s)`); });

          if (today.length) {
            lines.push(`\n🔴 *Due TODAY (${today.length}):*`);
            today.forEach(t => { const cl = S.clients.find(c => c.id === t.clientId); lines.push(`• ${t.title}${cl ? " (" + cl.name + ")" : ""}`); });
          }
          if (soon.length) {
            lines.push(`\n⏰ *Due This Week (${soon.length}):*`);
            soon.slice(0, 5).forEach(t => { const cl = S.clients.find(c => c.id === t.clientId); const d = daysUntil(t.dueDate); lines.push(`• ${t.title}${cl ? " (" + cl.name + ")" : ""} — ${d === 1 ? "Tomorrow" : d + " days"}`) });
          }
          lines.push(`\nPlease complete on priority.\n— ${firm} 📞 ${firmPhone}`);

          msgs.push({ id: "emp_" + emp.id, type: "employee", icon: "👤", name: emp.name, phone: emp.phone, role: emp.role, category: "tasks", urgent: overdue.length > 0 || today.length > 0, message: lines.join("\n"), badge: overdue.length ? "⚠️ Overdue" : today.length ? "🔴 Today" : "⏰ This week" });

        // ── 2. CLIENT GST REMINDERS ──

          const d = daysUntil(r.dueDate);
          if (d > 7) return;// only urgent
