<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OM Associates CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--bg2:#161b26;--bg3:#1c2234;--bg4:#222c3e;
  --card:#192132;--glass:rgba(255,255,255,0.026);--glass2:rgba(255,255,255,0.052);
  --border:rgba(255,255,255,0.062);--border2:rgba(255,255,255,0.108);
  --gold:#c9a84c;--gold2:#e5c46a;--gold3:rgba(201,168,76,0.11);--gold4:rgba(201,168,76,0.055);
  --gold-gradient:linear-gradient(135deg,#c9a84c 0%,#e8c96a 50%,#9e7628 100%);
  --blue:#5691f8;--blue2:rgba(86,145,248,0.1);--blue3:rgba(86,145,248,0.18);
  --green:#3dcf8e;--green2:rgba(61,207,142,0.1);--green3:rgba(61,207,142,0.2);
  --red:#f87171;--red2:rgba(248,113,113,0.1);--red3:rgba(248,113,113,0.2);
  --orange:#fb923c;--orange2:rgba(251,146,60,0.1);
  --purple:#a78bfa;--teal:#2dd4bf;
  --text:#eceff4;--text2:#a0afc0;--text3:#526070;
  --font:'DM Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --font-serif:'Playfair Display',Georgia,serif;
  --sidebar:252px;--r:10px;--r2:14px;
  --shadow:0 4px 20px rgba(0,0,0,.35);--shadow2:0 14px 50px rgba(0,0,0,.5);
}
.light{
  --bg:#f4f6fb;--bg2:#fff;--bg3:#eef1f8;--bg4:#e6eaf5;
  --glass:rgba(255,255,255,0.8);--glass2:rgba(255,255,255,0.95);
  --border:rgba(0,0,0,0.068);--border2:rgba(0,0,0,0.11);
  --gold:#8b6914;--gold2:#a07820;--gold3:rgba(139,105,20,0.08);
  --blue:#2563eb;--blue2:rgba(37,99,235,0.07);
  --green:#059669;--green2:rgba(5,150,105,0.07);--green3:rgba(5,150,105,0.15);
  --red:#dc2626;--red2:rgba(220,38,38,0.07);--red3:rgba(220,38,38,0.15);
  --orange:#d97706;--orange2:rgba(217,119,6,0.07);
  --text:#111827;--text2:#374151;--text3:#9ca3af;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.anim-fade{animation:fadeIn .22s ease}
.spin{animation:spin 1s linear infinite}
.glass-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r2)}
/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto;position:sticky;top:0;transition:transform .3s}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:22px 24px}
/* Sidebar */
.sb-logo{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--border)}
.sb-icon{width:32px;height:32px;border-radius:9px;background:var(--gold-gradient);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sb-brand{font-size:13px;font-weight:800;color:var(--gold);line-height:1.1}
.sb-sub{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
nav{flex:1;padding:8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s;width:100%;background:none;border:none;text-align:left;position:relative}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.nav-item.active{background:var(--gold3);color:var(--gold);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--gold);border-radius:0 2px 2px 0}
.nav-icon{font-size:15px;width:20px;text-align:center}
.sb-footer{padding:12px;border-top:1px solid var(--border)}
.online-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;margin-bottom:8px}
.online-badge.on{background:var(--green2);color:var(--green);border:1px solid var(--green3)}
.online-badge.off{background:var(--red2);color:var(--red);border:1px solid var(--red3)}
.dot{width:6px;height:6px;border-radius:50%}
.dot-on{background:var(--green)}
.dot-off{background:var(--red)}
.user-row{display:flex;align-items:center;gap:8px;padding:4px}
.avatar{width:28px;height:28px;border-radius:7px;background:var(--gold-gradient);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#000;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:var(--text)}
.user-role{font-size:10px;color:var(--text3);text-transform:capitalize}
.btn-logout{width:100%;padding:6px 12px;border-radius:7px;font-size:11.5px;font-weight:600;text-align:left;color:var(--text3);background:none;border:none;cursor:pointer;transition:all .15s;margin-top:4px}
.btn-logout:hover{color:var(--red);background:var(--red2)}
/* Topbar */
.mob-btn{display:none;width:32px;height:32px;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:16px}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--gold-gradient);color:#000}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-blue{background:var(--blue3);color:var(--blue);border:1px solid rgba(86,145,248,.2)}
.btn-green{background:var(--green2);color:var(--green);border:1px solid var(--green3)}
.btn-red{background:var(--red2);color:var(--red);border:1px solid var(--red3)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:rgba(255,255,255,.09)}
.btn-sm{padding:4px 10px;font-size:11.5px;border-radius:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* Inputs */
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.form-input{background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);font-family:var(--font);outline:none;transition:border .15s;width:100%}
.form-input:focus{border-color:var(--gold);background:rgba(201,168,76,.04)}
.form-input::placeholder{color:var(--text3)}
select.form-input option{background:var(--bg2);color:var(--text)}
textarea.form-input{resize:vertical;min-height:72px}
/* Grid helpers */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
@media(max-width:900px){.grid-6{grid-template-columns:repeat(3,1fr)}.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid-2,.grid-3,.grid-4,.grid-6{grid-template-columns:1fr}}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow2);animation:fadeIn .2s ease}
.modal-sm{max-width:400px}.modal-md{max-width:540px}.modal-lg{max-width:720px}.modal-xl{max-width:900px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-title{font-size:15px;font-weight:700;color:var(--text);font-family:var(--font-serif)}
.modal-body{padding:20px}
.btn-close{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;border:none;background:rgba(255,255,255,.06);color:var(--text3);cursor:pointer;font-size:16px;line-height:1}
.btn-close:hover{background:var(--red2);color:var(--red)}
/* Table */
.table-wrap{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead tr{background:rgba(255,255,255,.03)}
th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:9px 14px;font-size:12.5px;color:var(--text2);border-bottom:1px solid rgba(255,255,255,.025)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02);color:var(--text)}
/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:700;text-transform:capitalize}
/* KPI card */
.kpi{background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.kpi-val{font-size:22px;font-weight:800;font-family:var(--font-mono);line-height:1.1}
.kpi-label{font-size:11px;color:var(--text3);font-weight:600;margin-top:2px}
/* Page header */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-title{font-size:20px;font-weight:700;color:var(--text);font-family:var(--font-serif)}
.page-sub{font-size:12px;color:var(--text3);margin-top:1px}
/* Filters row */
.filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:160px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.search-input{padding-left:30px!important}
/* Progress */
.progress-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .4s}
/* Toast */
#toast-container{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:9px;font-size:12.5px;font-weight:600;box-shadow:var(--shadow2);animation:fadeIn .25s ease;max-width:300px}
.toast-success{background:#0d2a1a;color:var(--green);border:1px solid var(--green3)}
.toast-error{background:#2a0d0d;color:var(--red);border:1px solid var(--red3)}
.toast-info{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
/* Login page */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--bg);overflow:auto}
.login-card{width:100%;max-width:380px;animation:fadeIn .3s ease}
.mode-toggle{display:flex;border-radius:9px;padding:4px;margin-bottom:18px;background:var(--bg3)}
.mode-btn{flex:1;padding:6px;border-radius:7px;border:none;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text3);background:none}
.mode-btn.active{background:var(--gold3);color:var(--gold)}
/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:0}
.tab-btn{padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--text3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
/* Confirm dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:600;display:flex;align-items:center;justify-content:center}
.confirm-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:24px;max-width:380px;width:90%;box-shadow:var(--shadow2)}
/* Responsive sidebar */
@media(max-width:768px){
  :root{--sidebar:0px}
  #sidebar{position:fixed!important;left:0;top:0;z-index:300;width:260px!important;transform:translateX(-100%);transition:transform .3s}
  #sidebar.open{transform:translateX(0)}
  .mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:299}
  .mob-btn{display:flex}
  #topbar{padding:0 14px}
}
/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:8px}
/* Messages */
.msg-thread{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .15s}
.msg-thread:hover{background:rgba(255,255,255,.04)}
.msg-thread.active{background:var(--gold4)}
.msg-bubble{max-width:75%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5}
.msg-bubble.mine{background:var(--gold3);color:var(--text);border-bottom-right-radius:3px;margin-left:auto}
.msg-bubble.theirs{background:rgba(255,255,255,.07);color:var(--text2);border-bottom-left-radius:3px}
.msg-time{font-size:10px;color:var(--text3);margin-top:2px}
</style>
</head>
<body>

<div id="toast-container"></div>
<div id="mob-overlay" class="mob-overlay" style="display:none" onclick="closeSidebar()"></div>

<!-- ══════════════════════════════════════════════ -->
<!-- LOGIN PAGE -->
<!-- ══════════════════════════════════════════════ -->
<div id="login-page" style="display:none">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="margin:0 auto 12px;width:64px;height:64px;border-radius:16px;background:var(--gold-gradient);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(201,168,76,0.35)">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 3L4 10v4c0 8.8 5.9 17 14 19.4C26.1 31 32 22.8 32 14v-4L18 3z" fill="rgba(0,0,0,0.3)" stroke="rgba(0,0,0,0.5)" stroke-width="0.5"/>
          <path d="M18 4.5L5 11v3.5c0 8.2 5.5 15.8 13 18.1C25.5 30.3 31 22.7 31 14.5V11L18 4.5z" fill="none" stroke="#000" stroke-width="0.3"/>
          <line x1="7" y1="20" x2="29" y2="20" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="18" cy="20" r="1.5" fill="#000"/>
          <line x1="18" y1="10" x2="18" y2="20" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="10" y1="15" x2="26" y2="15" stroke="#000" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
          <circle cx="10" cy="15" r="2.5" fill="#000" opacity="0.85"/>
          <circle cx="26" cy="15" r="2.5" fill="#000" opacity="0.85"/>
        </svg>
      </div>
      <h1 style="font-size:22px;font-weight:800;color:var(--gold);font-family:var(--font-serif);letter-spacing:-0.3px">OM Associates</h1>
      <p style="font-size:11.5px;color:var(--text3);margin-top:3px;letter-spacing:0.08em;text-transform:uppercase;font-weight:600">Professional CRM Portal</p>
    </div>
    <div class="glass-card" style="padding:28px">
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-pwd" onclick="setLoginMode('password')">🔑 Password</button>
        <button class="mode-btn" id="mode-otp" onclick="setLoginMode('otp')">📱 OTP</button>
        <button class="mode-btn" id="mode-forgot" onclick="setLoginMode('forgot')" style="font-size:11px">🔓 Reset</button>
      </div>
      <!-- Password form -->
      <div id="pwd-form">
        <div class="form-group" style="margin-bottom:14px">
          <label class="form-label">Username / Mobile</label>
          <input class="form-input" id="login-user" placeholder="admin" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="form-group" style="margin-bottom:16px">
          <label class="form-label">Password</label>
          <input class="form-input" id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div id="login-err" style="color:var(--red);font-size:12px;text-align:center;margin-bottom:10px;display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()" id="login-btn">Sign In →</button>
        <div style="text-align:center;margin-top:12px">
          <button onclick="setLoginMode('forgot')" style="background:none;border:none;color:var(--gold);font-size:12px;cursor:pointer;text-decoration:underline">Forgot Password?</button>
        </div>
      </div>
      <!-- OTP form -->
      <div id="otp-form" style="display:none">
        <div id="otp-step1">
          <div class="form-group" style="margin-bottom:14px">
            <label class="form-label">Mobile Number</label>
            <input class="form-input" id="otp-mobile" type="tel" placeholder="9999999999" onkeydown="if(event.key==='Enter')sendOtp()">
          </div>
          <div id="otp-err" style="color:var(--red);font-size:12px;text-align:center;margin-bottom:10px;display:none"></div>
          <button class="btn btn-primary" style="width:100%" onclick="sendOtp()" id="send-otp-btn">Send OTP</button>
        </div>
        <div id="otp-step2" style="display:none">
          <p style="font-size:12.5px;color:var(--text3);text-align:center;margin-bottom:14px">OTP sent to <span style="color:var(--gold)" id="otp-mobile-display"></span></p>
          <div class="form-group" style="margin-bottom:14px">
            <label class="form-label">Enter 6-digit OTP</label>
            <input class="form-input" id="otp-code" type="tel" placeholder="000000" maxlength="6" onkeydown="if(event.key==='Enter')verifyOtp()">
          </div>
          <div id="otp-err2" style="color:var(--red);font-size:12px;text-align:center;margin-bottom:10px;display:none"></div>
          <button class="btn btn-primary" style="width:100%;margin-bottom:10px" onclick="verifyOtp()" id="verify-otp-btn">Verify & Login</button>
          <div style="text-align:center;font-size:11.5px">
            <span id="otp-timer" style="color:var(--text3)"></span>
            <button id="resend-btn" onclick="sendOtp()" style="display:none;background:none;border:none;color:var(--gold);font-weight:600;cursor:pointer;font-size:11.5px">Resend OTP</button>
            <span style="color:var(--text3);margin:0 8px">·</span>
            <button onclick="$('otp-step2').style.display='none';$('otp-step1').style.display=''" style="background:none;border:none;color:var(--text3);font-size:11.5px;cursor:pointer">Change Number</button>
          </div>
        </div>
      </div>
      <!-- Forgot Password form -->
      <div id="forgot-form" style="display:none">
        <div id="fp-step1">
          <p style="font-size:12.5px;color:var(--text3);text-align:center;margin-bottom:14px">Enter your <strong style="color:var(--text)">username</strong> or <strong style="color:var(--text)">mobile number</strong> to receive OTP</p>
          <div class="form-group" style="margin-bottom:14px">
            <label class="form-label">Username / Mobile</label>
            <input class="form-input" id="fp-identifier" placeholder="admin  or  9999999999" onkeydown="if(event.key==='Enter')sendForgotOtp()">
          </div>
          <div id="fp-err1" style="color:var(--red);font-size:12px;text-align:center;margin-bottom:10px;display:none"></div>
          <button class="btn btn-primary" style="width:100%;margin-bottom:10px" onclick="sendForgotOtp()" id="fp-send-btn">Send OTP →</button>
          <div style="text-align:center"><button onclick="setLoginMode('password')" style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer">← Back to Login</button></div>
        </div>
        <div id="fp-step2" style="display:none">
          <p style="font-size:12.5px;color:var(--text3);text-align:center;margin-bottom:14px">OTP sent to <span style="color:var(--gold)" id="fp-mobile-display"></span></p>
          <div class="form-group" style="margin-bottom:12px">
            <label class="form-label">6-Digit OTP</label>
            <input class="form-input" id="fp-otp" type="tel" placeholder="000000" maxlength="6">

<script>
// ════════════════════════════════════════════════════════════════
// GLOBALS & CONFIG
// ════════════════════════════════════════════════════════════════
const API_BASE = ''; // same-origin (worker serves API at root)
let currentUser = null;
let currentToken = null;
let darkMode = true;
let chartInst = null;
let otpTimer = null;
let otpTimerVal = 0;

const TOKEN_KEY = 'om_crm_token';
const USER_KEY  = 'om_crm_user';

function $(id){ return document.getElementById(id); }

// ════════════════════════════════════════════════════════════════
// API CLIENT
// ════════════════════════════════════════════════════════════════
class ApiError extends Error {
  constructor(status, message){ super(message); this.status=status; }
}

async function req(path, opts={}) {
  const headers = { 'Content-Type':'application/json', ...(opts.headers||{}) };
  if (currentToken) headers['Authorization'] = `Bearer ${currentToken}`;
  let attempts = 0;
  while (attempts <= 2) {
    try {
      const res = await fetch(API_BASE + path, { ...opts, headers });
      if (res.status === 401) { if(path!=='/auth/login'){ doLogout(true); } throw new ApiError(401,'Session expired'); }
      const data = await res.json().catch(()=>({}));
      if (!res.ok) throw new ApiError(res.status, data?.error || `HTTP ${res.status}`);
      return data;
    } catch(e) {
      if (e instanceof ApiError && e.status < 500) throw e;
      if (attempts++ >= 2) throw e;
      await new Promise(r=>setTimeout(r,300*attempts));
    }
  }
}

const api = {
  get: (p) => req(p),
  post: (p,b) => req(p,{method:'POST',body:JSON.stringify(b)}),
  put:  (p,b) => req(p,{method:'PUT',body:JSON.stringify(b)}),
  del:  (p)   => req(p,{method:'DELETE'}),
};

const qs = (p={}) => { const s=new URLSearchParams(); Object.entries(p).forEach(([k,v])=>v!==undefined&&v!==''&&s.set(k,v)); const t=s.toString(); return t?`?${t}`:''; };

// ════════════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════════════
function saveAuth(user, token) {
  currentUser = user; currentToken = token;
  localStorage.setItem(TOKEN_KEY, token);
  localStorage.setItem(USER_KEY, JSON.stringify(user));
}

function loadAuth() {
  const t = localStorage.getItem(TOKEN_KEY);
  const u = localStorage.getItem(USER_KEY);
  if (t && u) { try { currentToken=t; currentUser=JSON.parse(u); return true; } catch {} }
  return false;
}

function doLogout(silent=false) {
  if (!silent) api.post('/auth/logout',{}).catch(()=>{});
  currentUser=null; currentToken=null;
  localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(USER_KEY);
  showLogin();
}

async function doLogin() {
  const u = $('login-user').value.trim(), p = $('login-pass').value;
  if (!u||!p) { showErr('login-err','Enter username and password'); return; }
  setLoading('login-btn',true);
  try {
    const res = await api.post('/auth/login',{username:u,password:p});
    saveAuth(res.data.user, res.data.token);
    toast(`Welcome back, ${res.data.user.name}!`,'success');
    showApp();
  } catch(e){ showErr('login-err',e.message); }
  setLoading('login-btn',false);
}

async function sendOtp() {
  const mobile = $('otp-mobile').value.trim();
  if (!/^\d{10}$/.test(mobile)) { showErr('otp-err','Enter valid 10-digit number'); return; }
  setLoading('send-otp-btn',true);
  try {
    const res = await api.post('/auth/otp/send',{mobile});
    toast('OTP sent!','success');
    $('otp-mobile-display').textContent = `+91-${mobile}`;
    $('otp-step1').style.display='none';
    $('otp-step2').style.display='';
    if (res.data?.otp) $('otp-code').value = res.data.otp;
    startOtpTimer();
  } catch(e){ showErr('otp-err',e.message); }
  setLoading('send-otp-btn',false);
}

async function verifyOtp() {
  const mobile=$('otp-mobile').value.trim(), otp=$('otp-code').value.trim();
  if (otp.length!==6) { showErr('otp-err2','Enter 6-digit OTP'); return; }
  setLoading('verify-otp-btn',true);
  try {
    const res = await api.post('/auth/otp/verify',{mobile,otp});
    saveAuth(res.data.user, res.data.token);
    toast(`Welcome, ${res.data.user.name}!`,'success');
    showApp();
  } catch(e){ showErr('otp-err2',e.message); }
  setLoading('verify-otp-btn',false);
}

function startOtpTimer() {
  otpTimerVal=60; clearInterval(otpTimer);
  const tick=()=>{
    if(otpTimerVal<=0){ $('otp-timer').textContent=''; $('resend-btn').style.display=''; clearInterval(otpTimer); return; }
    $('otp-timer').textContent=`Resend in ${otpTimerVal}s`;
    $('resend-btn').style.display='none'; otpTimerVal--;
  };
  tick(); otpTimer=setInterval(tick,1000);
}

function setLoginMode(mode) {
  $('pwd-form').style.display=mode==='password'?'':'none';
  $('otp-form').style.display=mode==='otp'?'':'none';
  $('forgot-form').style.display=mode==='forgot'?'':'none';
  $('mode-pwd').classList.toggle('active',mode==='password');
  $('mode-otp').classList.toggle('active',mode==='otp');
  $('mode-forgot').classList.toggle('active',mode==='forgot');
  if (mode==='forgot') {
    $('fp-step1').style.display='';
    $('fp-step2').style.display='none';
    hideErr('fp-err1'); hideErr('fp-err2');
  }
}

let fpTimer=null, fpTimerVal=0, fpMobile='';

async function sendForgotOtp() {
  const identifier=($('fp-identifier')||$('fp-mobile'))?.value.trim();
  if (!identifier) { showErr('fp-err1','Enter username or mobile number'); return; }
  setLoading('fp-send-btn',true); hideErr('fp-err1');
  try {
    const res = await api.post('/auth/forgot-password',{username:identifier, mobile:identifier});
    fpMobile = res.data?.mobile || identifier; // server returns actual mobile
    const masked = res.data?.masked_mobile || identifier;
    toast('OTP sent!','success');
    $('fp-mobile-display').textContent = masked;
    $('fp-step1').style.display='none';
    $('fp-step2').style.display='';
    if (res.data?.otp) $('fp-otp').value=res.data.otp;
    fpTimerVal=60; clearInterval(fpTimer);
    const tick=()=>{
      if(fpTimerVal<=0){ $('fp-timer').textContent=''; $('fp-resend-btn').style.display=''; clearInterval(fpTimer); return; }
      $('fp-timer').textContent=`Resend in ${fpTimerVal}s`; $('fp-resend-btn').style.display='none'; fpTimerVal--;
    };
    tick(); fpTimer=setInterval(tick,1000);
  } catch(e){ showErr('fp-err1',e.message||'User not found'); }
  setLoading('fp-send-btn',false);
}

async function doResetPassword() {
  const otp=$('fp-otp').value.trim();
  const np=$('fp-newpass').value;
  const cp=$('fp-confirmpass').value;
  if (otp.length!==6) { showErr('fp-err2','Enter 6-digit OTP'); return; }
  if (np.length<6) { showErr('fp-err2','Password must be at least 6 characters'); return; }
  if (np!==cp) { showErr('fp-err2','Passwords do not match'); return; }
  setLoading('fp-reset-btn',true); hideErr('fp-err2');
  try {
    await api.post('/auth/reset-password',{mobile:fpMobile, otp, new_password:np});
    toast('✅ Password reset! Please login with new password.','success');
    clearInterval(fpTimer);
    setLoginMode('password');
  } catch(e){ showErr('fp-err2',e.message||'Reset failed. Try again.'); }
  setLoading('fp-reset-btn',false);
}

// ════════════════════════════════════════════════════════════════
// NAV
// ════════════════════════════════════════════════════════════════
const NAV = [
  {id:'dashboard', label:'Dashboard',   icon:'⚡', roles:['admin','staff','client']},
  {id:'clients',   label:'Clients',     icon:'👥', roles:['admin','staff']},
  {id:'services',  label:'Services',    icon:'⚙️', roles:['admin','staff','client']},
  {id:'tasks',     label:'Work Orders', icon:'✅', roles:['admin','staff','client']},
  {id:'invoices',  label:'Invoices',    icon:'🧾', roles:['admin','staff','client']},
  {id:'payments',  label:'Payments',    icon:'💳', roles:['admin','staff','client']},
  {id:'messages',  label:'Messages',    icon:'💬', roles:['admin','staff','client']},
  {id:'users',     label:'Team',        icon:'👤', roles:['admin']},
  {id:'settings',  label:'Settings',    icon:'⚙',  roles:['admin']},
];

let currentPage = 'dashboard';

function navigate(page) {
  currentPage = page;
  // Update nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page===page));
  const item = NAV.find(n=>n.id===page);
  $('page-title-label').textContent = item?.label||page;
  closeSidebar();
  renderPage(page);
}

function buildNav() {
  const role = currentUser?.role;
  $('nav-menu').innerHTML = NAV.filter(n=>n.roles.includes(role)).map(n=>`
    <button class="nav-item" data-page="${n.id}" onclick="navigate('${n.id}')">

    </button>`).join('');

  $('user-name-label').textContent = currentUser?.name||'';

function openSidebar(){ $('sidebar').classList.add('open'); $('mob-overlay').style.display=''; }
function closeSidebar(){ $('sidebar').classList.remove('open'); $('mob-overlay').style.display='none'; }

// ════════════════════════════════════════════════════════════════
// SHOW / HIDE
// ════════════════════════════════════════════════════════════════
function showLogin() {
  $('login-page').style.display='flex'; $('app').style.display='none';
  $('login-user').value=''; $('login-pass').value=''; $('otp-mobile').value=''; $('otp-code').value='';

function showApp() {
  $('login-page').style.display='none'; $('app').style.display='flex';

}

// ════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════
function toast(msg, type='info') {
  const el=document.createElement('div');
  el.className=`toast toast-${type}`; el.textContent=msg;
  $('toast-container').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}
function showErr(id,msg){ const el=$(id); el.textContent=msg; el.style.display=''; }
function hideErr(id){ const el=$(id); if(el){el.style.display='none';} }
function setLoading(id,on){ const el=$(id); if(!el) return; el.disabled=on; el.style.opacity=on?.65:1; }
function fmtMoney(n){ return '₹'+(Number(n)||0).toLocaleString('en-IN',{maximumFractionDigits:0}); }
function fmtDate(d){ if(!d) return '—'; try{return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}catch{return d} }
function fmtDateTime(d){ if(!d) return '—'; try{return new Date(d).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}catch{return d} }

function badge(status) {
  const s=(status||'').toLowerCase();
  const map={paid:'green2/green',unpaid:'red2/red',partial:'orange2/orange',overdue:'red2/red',pending:'orange2/orange',
    in_progress:'blue2/blue',review:'gold3/gold',completed:'green2/green',cancelled:'red2/red',
    active:'green2/green',inactive:'bg3/text3',high:'red2/red',medium:'orange2/orange',low:'green2/green',success:'green2/green',failed:'red2/red'};
  const [bg,fg]=(map[s]||'bg3/text3').split('/');
  return `<span class="badge" style="background:var(--${bg});color:var(--${fg})">${status||'—'}</span>`;
}

function modal(content, size='md') {
  closeModal();
  const div=document.createElement('div');
  div.className='modal-overlay'; div.id='active-modal';
  div.innerHTML=`<div class="modal-box modal-${size}" onclick="event.stopPropagation()">${content}</div>`;
  div.onclick=(e)=>{ if(e.target===div) closeModal(); };
  document.body.appendChild(div);
}
function closeModal(){ const m=$('active-modal'); if(m) m.remove(); }

function confirm2(title, msg, onConfirm, danger=false) {
  const div=document.createElement('div');
  div.className='confirm-overlay'; div.id='confirm-modal';
  div.innerHTML=`
    <div class="confirm-box">
      <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px">${title}</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:20px">${msg}</p>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="$('confirm-modal').remove()">Cancel</button>
        <button class="btn ${danger?'btn-red':'btn-primary'}" onclick="$('confirm-modal').remove();(${onConfirm.toString()})()">Confirm</button>
      </div>
    </div>`;
  document.body.appendChild(div);
}

function spinner(){ return `<div style="display:flex;align-items:center;justify-content:center;padding:48px"><div class="spin" style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%"></div></div>`; }
function empty(icon='📋',text='No data found'){ return `<div class="empty"><div class="empty-icon">${icon}</div><p>${text}</p></div>`; }

function progressBar(val){ return `<div class="progress-bar"><div class="progress-fill" style="width:${val||0}%;background:var(--gold)"></div></div>`; }

function toggleTheme(){
  darkMode=!darkMode;
  document.documentElement.className=darkMode?'':'light';
  updateThemeBtn();
  localStorage.setItem('om_crm_theme',darkMode?'dark':'light');
}
function updateThemeBtn(){ const b=$('theme-btn'); if(b) b.textContent=darkMode?'☀️':'🌙'; }

// Online detection
function updateOnline(){
  const on=navigator.onLine;
  const badge=$('online-badge'), dot=$('online-dot'), label=$('online-label'), offBadge=$('offline-badge');
  if(badge){ badge.className=`online-badge ${on?'on':'off'}`; dot.className=`dot ${on?'dot-on':'dot-off'}`; label.textContent=on?'Online':'Offline'; }
  if(offBadge) offBadge.style.display=on?'none':'';
}
window.addEventListener('online',updateOnline);
window.addEventListener('offline',updateOnline);

// ════════════════════════════════════════════════════════════════
// PAGES
// ════════════════════════════════════════════════════════════════
function renderPage(page) {
  const el=$('content');
  el.innerHTML=spinner();
  switch(page){
    case 'dashboard': renderDashboard(); break;
    case 'clients':   renderClients();   break;
    case 'services':  renderServices();  break;
    case 'invoices':  renderInvoices();  break;
    case 'tasks':     renderTasks();     break;
    case 'payments':  renderPayments();  break;
    case 'messages':  renderMessages();  break;
    case 'users':     renderUsers();     break;
    case 'settings':  renderSettings();  break;
    default: el.innerHTML=`<p>Page not found</p>`;
  }
}

            ${idea.youtube_url?`<div style="border-radius:8px;overflow:hidden;padding-bottom:56.25%;position:relative">${(()=>{const id=idea.youtube_url.match(/(?:v=|youtu\.be\/)([^&?/]+)/)?.[1];return id?`<iframe src="https://www.youtube-nocookie.com/embed/${id}?rel=0" style="position:absolute;inset:0;width:100%;height:100%" frameborder="0" allowfullscreen loading="lazy"></iframe>`:''})()}</div>`:''}
            <div style="font-size:10.5px;color:var(--text3);margin-top:8px">${fmtDateTime(idea.created_at)}</div>
          </div>`).join('')}
        </div>
      </div>`:''}
    </div>`;

    // Draw revenue chart
    const canvas = document.getElementById('rev-chart');
    if (canvas && (s.monthly_revenue||[]).length > 0) {
      if (chartInst) { chartInst.destroy(); chartInst=null; }
      chartInst = new Chart(canvas.getContext('2d'), {
        type:'bar',
        data:{
          labels: s.monthly_revenue.map(m=>m.month),
          datasets:[{label:'Revenue',data:s.monthly_revenue.map(m=>m.amount),backgroundColor:'rgba(201,168,76,0.4)',borderColor:'#c9a84c',borderWidth:1.5,borderRadius:5}]

          scales:{
            x:{grid:{display:false},ticks:{color:'#526070',font:{size:11}}},
            y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#526070',font:{size:11},callback:v=>`₹${Number(v)/1000}k`}},
          }
        }
      });
    }
    // Responsive chart row
    if (window.innerWidth < 700) { $('chart-row').style.gridTemplateColumns='1fr'; }

      <div class="page-hdr">

              </tr>`).join('')}

async function saveClient(id='') {
  const name=$('cf-name').value.trim();
  if (!name) { toast('Name required','error'); return; }
  setLoading('save-client-btn',true);
  try {
    const body={name,type:$('cf-type').value,mobile:$('cf-mobile').value,email:$('cf-email').value,gstin:$('cf-gstin').value,pan:$('cf-pan').value,city:$('cf-city').value,state:$('cf-state').value,address:$('cf-address').value,assigned_to:$('cf-assigned')?.value||'',status:$('cf-status').value,notes:$('cf-notes').value};
    if (id) await api.put(`/clients/${id}`,body); else await api.post('/clients',body);
    toast(id?'Client updated!':'Client created!','success'); closeModal(); renderClients();
  } catch(e){ toast(e.message,'error'); setLoading('save-client-btn',false); }
}

async function deleteClient(id, name) {
  confirm2('Delete Client',`Soft-delete "${name}"? Data is preserved.`,async function(){
    try { await api.del(`/clients/${id}`); toast('Client deleted'); renderClients(); } catch(e){ toast(e.message,'error'); }
  },true);
}

async function open360(id) {
  modal(spinner(),'xl');
  try {
    const [detRes,invRes,taskRes]=await Promise.all([api.get(`/clients/${id}`),api.get(`/clients/${id}/invoices`),api.get(`/clients/${id}/tasks`)]);
    const c=detRes.data||{}, invs=invRes.data||[], tasks=taskRes.data||[];
    let tab='overview';
    const renderTab=()=>{
      const content360 = $('tab-content-360');
      if (!content360) return;
      if (tab==='overview') content360.innerHTML=`
        <div class="grid-4" style="margin-bottom:14px">
          <div class="kpi"><div class="kpi-val" style="color:var(--gold);font-size:18px">${fmtMoney(c.total_billed)}</div><div class="kpi-label">Total Billed</div></div>
          <div class="kpi"><div class="kpi-val" style="color:var(--green);font-size:18px">${fmtMoney(c.total_paid)}</div><div class="kpi-label">Collected</div></div>
          <div class="kpi"><div class="kpi-val" style="color:var(--red);font-size:18px">${fmtMoney((c.total_billed||0)-(c.total_paid||0))}</div><div class="kpi-label">Outstanding</div></div>
          <div class="kpi"><div class="kpi-val" style="color:var(--blue);font-size:18px">${c.task_count||0}</div><div class="kpi-label">Tasks</div></div>
        </div>
        <div class="grid-2 anim-fade" style="font-size:13px">
          ${[['Client ID',c.client_no],['Type',c.type],['Mobile',c.mobile],['Email',c.email],['GSTIN',c.gstin],['PAN',c.pan],['City',c.city],['State',c.state],['Joined',fmtDate(c.created_at)],['Assigned To',c.assigned_name]].filter(([,v])=>v).map(([l,v])=>`<div style="display:flex;gap:8px"><span style="color:var(--text3);min-width:90px">${l}</span><span style="font-weight:500;color:var(--text)">${v}</span></div>`).join('')}
        </div>
        ${c.notes?`<div class="glass-card" style="padding:10px;margin-top:12px;font-size:12.5px;color:var(--text2)">${c.notes}</div>`:''}`;
      else if (tab==='invoices') content360.innerHTML=invs.length===0?empty('🧾','No invoices yet'):invs.map(inv=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px;border-radius:8px;background:var(--glass);border:1px solid var(--border);margin-bottom:6px">
          <div><span style="font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--gold)">${inv.invoice_no}</span><div style="font-size:11px;color:var(--text3);margin-top:2px">${fmtDate(inv.created_at)}</div></div>
          <div style="display:flex;align-items:center;gap:10px"><span style="font-weight:700;font-family:var(--font-mono);color:var(--text)">${fmtMoney(inv.total)}</span>${badge(inv.status)}</div>
        </div>`).join('');
      else if (tab==='tasks') content360.innerHTML=tasks.length===0?empty('✅','No tasks yet'):tasks.map(t=>`
        <div style="padding:10px;border-radius:8px;background:var(--glass);border:1px solid var(--border);margin-bottom:6px">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:13px;font-weight:600;color:var(--text)">${t.title}</span>
            <div style="display:flex;gap:6px">${badge(t.status)}${badge(t.priority)}</div>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px">${t.assigned_name||'—'} · ${fmtDate(t.due_date)}</div>
          ${progressBar(t.progress)}
        </div>`).join('');
    };
    modal(`
      <div class="modal-hdr"><span class="modal-title">${c.name}</span><button class="btn-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div class="tabs" style="margin-bottom:14px">
          <button class="tab-btn active" id="tab360-overview" onclick="switchTab360('overview')">📋 Overview</button>
          <button class="tab-btn" id="tab360-invoices" onclick="switchTab360('invoices')">🧾 Invoices (${invs.length})</button>
          <button class="tab-btn" id="tab360-tasks" onclick="switchTab360('tasks')">✅ Tasks (${tasks.length})</button>
        </div>
        <div id="tab-content-360"></div>
      </div>`, 'xl');
    window.switchTab360=function(t){ tab=t; ['overview','invoices','tasks'].forEach(x=>{$(`tab360-${x}`)?.classList.toggle('active',x===t)}); renderTab(); };
    renderTab();
  } catch(e){ closeModal(); toast('Failed to load: '+e.message,'error'); }
}

async function saveService(id='') {
  const name=$('sf-name').value.trim(), price=Number($('sf-price').value);
  if (!name) { toast('Name required','error'); return; }
  if (isNaN(price)) { toast('Valid price required','error'); return; }
  setLoading('save-svc-btn',true);
  try {
    const body={name,category:$('sf-cat').value,price,description:$('sf-desc').value,duration:$('sf-dur').value};
    if (id) await api.put(`/services/${id}`,body); else await api.post('/services',body);
    toast(id?'Service updated!':'Service created!','success'); closeModal(); renderServices();

              <td><div style="font-weight:600;color:var(--text)">${inv.client_name||'—'}</div><div style="font-size:11px;color:var(--text3)">${inv.service_name||inv.description||'—'}</div></td>

                <button class="btn btn-ghost btn-sm" onclick="printInvoice('${inv.id}')">🖨</button>

          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" id="save-inv-btn" onclick="saveInvoice()">Create Invoice</button>
        </div>
      </div>
    </div>`, 'lg');
}

function calcInvoiceTotal() {
  const base=parseFloat($('if-amount')?.value)||0, disc=parseFloat($('if-disc')?.value)||0, tax=parseFloat($('if-tax')?.value)||0;
  if (base<=0) { $('inv-calc').style.display='none'; return; }
  const discAmt=base*disc/100, after=base-discAmt, taxAmt=after*tax/100, total=after+taxAmt;
  $('inv-calc').style.display='';
  $('inv-calc').innerHTML=`
    ${discAmt>0?`<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--text3)">Discount (${disc}%)</span><span style="color:var(--red)">-${fmtMoney(discAmt)}</span></div>`:''}
    ${taxAmt>0?`<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--text3)">Tax/GST (${tax}%)</span><span>${fmtMoney(taxAmt)}</span></div>`:''}
    <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:800;color:var(--gold);border-top:1px solid var(--border);padding-top:6px"><span>Total</span><span>${fmtMoney(total)}</span></div>`;
}

async function saveInvoice() {
  const clientId=$('if-client').value;
  if (!clientId) { toast('Select a client','error'); return; }
  const amount=Number($('if-amount').value);
  if (!amount||isNaN(amount)) { toast('Enter valid amount','error'); return; }
  setLoading('save-inv-btn',true);
  try {
    await api.post('/invoices',{client_id:clientId,service_id:$('if-service').value||undefined,description:$('if-desc').value,base_amount:amount,discount_pct:Number($('if-disc').value)||0,tax_pct:Number($('if-tax').value)||18,payment_method:$('if-method').value,due_date:$('if-due').value,notes:$('if-notes').value});
    toast('Invoice created!','success'); closeModal(); renderInvoices();
  } catch(e){ toast(e.message,'error'); setLoading('save-inv-btn',false); }
}

async function openThread(threadId, threadName) {
  msgState.threadId=threadId; msgState.threadName=threadName;
  // Update thread list active
  document.querySelectorAll('.msg-thread').forEach(el=>el.classList.remove('active'));
  const panel=$('msg-panel');
  if (!panel) return;
  panel.innerHTML=`
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
      <div style="width:32px;height:32px;border-radius:50%;background:var(--gold-gradient);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000">${(threadName||'?')[0]}</div>
      <span style="font-size:13px;font-weight:700;color:var(--text)">${threadName}</span>
    </div>
    <div id="msg-body" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px">${spinner()}</div>
    <div style="padding:12px;border-top:1px solid var(--border);display:flex;gap:8px">
      <input class="form-input" id="msg-input" placeholder="Type a message…" style="flex:1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg('${threadId}');}">
      <button class="btn btn-primary" onclick="sendMsg('${threadId}')">Send</button>
    </div>`;
  try {
    const res = await api.get(`/messages/${threadId}?limit=50`);
    const msgs=res.data||[];
    $('msg-body').innerHTML=msgs.length===0?`<p style="text-align:center;color:var(--text3);font-size:12px">No messages yet. Say hello!</p>`:msgs.map(m=>{
      const mine=m.from_id===currentUser?.id;
      return `<div style="display:flex;flex-direction:column;align-items:${mine?'flex-end':'flex-start'}">
        <div class="msg-bubble ${mine?'mine':'theirs'}">${m.content}</div>
        <div class="msg-time">${m.sender_name||''}  ${fmtDateTime(m.created_at)}</div>
      </div>`;
    }).join('');
    const body=$('msg-body');
    if(body) body.scrollTop=body.scrollHeight;
  } catch(e){ $('msg-body').innerHTML=`<p style="color:var(--red)">Error: ${e.message}</p>`; }
}

async function sendMsg(threadId) {
  const input=$('msg-input'), content=input?.value.trim();
  if (!content) return;
  input.value='';
  try {
    await api.post(`/messages/${threadId}`,{content});
    await openThread(threadId, msgState.threadName);
  } catch(e){ toast(e.message,'error'); }
}

// ─── CSV EXPORT ───────────────────────────────────────────────────
function exportCSV(type) {
  const colMap = {
    users:    ['id','name','username','mobile','email','role','designation','department','status','last_login','created_at'],
    clients:  ['id','client_no','name','type','mobile','email','gstin','pan','city','state','status','assigned_name','created_at'],
    invoices: ['id','invoice_no','client_name','description','total','paid','balance','status','payment_method','due_date','created_at'],
    tasks:    ['id','title','client_name','assigned_name','priority','status','progress','due_date','created_at'],
    payments: ['id','invoice_id','client_id','amount','method','status','transaction_ref','created_at'],
  };
  const cols = colMap[type];
  if (!cols) { toast('Unknown export type','error'); return; }

  const endpointMap = {
    users:    '/users',
    clients:  '/clients?limit=9999&page=1',
    invoices: '/invoices?limit=9999&page=1',
    tasks:    '/tasks?limit=9999&page=1',
    payments: '/payments?limit=9999&page=1',
  };

  toast(`Preparing ${type} export…`, 'info');
  api.get(endpointMap[type]).then(res => {
    const rows = Array.isArray(res.data) ? res.data : (res.data?.data || res.results || []);
    if (!rows.length) { toast('No data to export','error'); return; }
    const header = cols.join(',');
    const body = rows.map(r => cols.map(c => {
      const v = r[c] ?? '';
      const sv = String(v).replace(/"/g, '""');
      return (sv.includes(',') || sv.includes('"') || sv.includes('\n')) ? `"${sv}"` : sv;
    }).join(',')).join('\n');
    const bom = '\uFEFF'; // UTF-8 BOM for Excel
    const blob = new Blob([bom + header + '\n' + body], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `om-crm-${type}-${new Date().toISOString().split('T')[0]}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    toast(`✅ ${rows.length} ${type} exported`, 'success');
  }).catch(e => toast('Export failed: ' + e.message, 'error'));
}

    const body={
      firm_name:$('s-fname').value, firm_address:$('s-faddr').value, firm_phone:$('s-fphone').value,
      firm_email:$('s-femail').value, firm_web:$('s-fweb').value, firm_gst:$('s-fgst').value, firm_pan:$('s-fpan').value,
      tax_pct:Number($('s-tax').value), invoice_prefix:$('s-prefix').value, currency:$('s-currency').value,
      razorpay_key_id:$('s-rzpid').value, razorpay_key_secret:$('s-rzpsec').value,
    };
    await api.put('/settings',body);
    toast('Settings saved!','success');
  } catch(e){ toast(e.message,'error'); }
  setLoading('save-settings-btn',false);
}

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════
function init() {
  // Load theme
  const savedTheme = localStorage.getItem('om_crm_theme');
  darkMode = savedTheme !== 'light';
  document.documentElement.className = darkMode ? '' : 'light';
  updateOnline();
  if (loadAuth()) {
    showApp();
  } else {
    showLogin();
  }
}

init();
</script>
</body>
