        action={<button onClick={sendAll} disabled={sending || filtered.length === 0}
          style={{ display: "flex", alignItems: "center", gap: 8, background: sending ? "var(--border2)" : "#25D366", color: "#fff", border: "none", borderRadius: 9, padding: "9px 18px", cursor: sending || !filtered.length ? "not-allowed" : "pointer", fontSize: 13.5, fontWeight: 700, transition: "all .15s", opacity: filtered.length === 0 ? .5 : 1 }}
          onMouseEnter={e => { if (!sending && filtered.length) e.currentTarget.style.background = "#1da851"; }}
          onMouseLeave={e => { if (!sending) e.currentTarget.style.background = "#25D366"; }}>
          <span style={{ fontSize: 18 }}>💬</span>
          {sending ? "Sending…" : `Send All to ${filtered.length} People`}
        </button>}>

        {/* How it works banner */}
        <div style={{ background: "rgba(37,211,102,.08)", border: "1px solid rgba(37,211,102,.2)", borderRadius: 12, padding: "12px 16px", marginBottom: 16, display: "flex", gap: 12, alignItems: "flex-start" }}>
          <span style={{ fontSize: 22, flexShrink: 0 }}>💡</span>
          <div style={{ fontSize: 12.5, color: "var(--text2)", lineHeight: 1.8 }}>
            <strong style={{ color: "var(--text)" }}>ఎలా పని చేస్తుంది:</strong> "Send All" click చేయండి → మీ WhatsApp (<strong style={{ color: "#25D366" }}>{firmPhone}</strong>) automatically open అవుతుంది → ప్రతి person కి pre-filled message తో WhatsApp chat తెరుచుకుంటుంది → Send click మాత్రమే చేయండి.<br />
            <strong style={{ color: "var(--text)" }}>Single send:</strong> ప్రతి card మీద 💬 button click చేయండి → individual message send అవుతుంది.
          </div>
        </div>

        {/* Stats row */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(130px,1fr))", gap: 10, marginBottom: 16 }}>
          {[
            { l: "Total", v: allMessages.length, c: "var(--blue)" },
            { l: "Urgent", v: urgentCount, c: "var(--red)" },
            { l: "Employees", v: allMessages.filter(m => m.type === "employee").length, c: "var(--teal)" },
            { l: "Clients", v: allMessages.filter(m => m.type === "client").length, c: "var(--gold)" },
            { l: "Sent", v: sentIds.size, c: "var(--green)" },
          ].map(({ l, v, c }) => <div key={l} style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 10, padding: "10px 14px" }}>
            <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".08em", fontWeight: 600, marginBottom: 3 }}>{l}</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: c, fontFamily: "var(--font-serif)" }}>{v}</div>
          </div>)}
        </div>

        {/* Filter tabs */}
        <div style={{ display: "flex", gap: 4, marginBottom: 16, overflowX: "auto", paddingBottom: 4 }}>
          {tabs.map(t => <button key={t.v} onClick={() => setFilter(t.v)}
            style={{ padding: "7px 14px", borderRadius: 20, border: "1px solid " + (filter === t.v ? "var(--gold)" : "var(--border)"), background: filter === t.v ? "var(--gold3)" : "var(--glass)", color: filter === t.v ? "var(--gold)" : "var(--text2)", cursor: "pointer", fontSize: 12.5, fontWeight: filter === t.v ? 700 : 400, whiteSpace: "nowrap", transition: "all .15s", flexShrink: 0 }}>
            {t.l}
          </button>)}
        </div>

        {filtered.length === 0 ? <Empty icon="✅" text="No urgent reminders — all up to date!" /> :
          <div style={{ display: "grid", gap: 10 }}>
            {filtered.map(m => {
              const sent = sentIds.has(m.id);
              const phone = m.phone.replace(/\D/g, "");
              const num = phone.length === 10 ? "91" + phone : phone.length === 12 ? phone : "91" + phone.slice(-10);
              return <div key={m.id} style={{ background: "var(--card)", border: "1px solid " + (m.urgent ? "rgba(248,113,113,.3)" : sent ? "rgba(52,211,153,.25)" : "var(--border)"), borderRadius: 13, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap", transition: "border .15s", opacity: sent ? .75 : 1 }}>
                {/* Avatar + info */}
                <div style={{ display: "flex", alignItems: "center", gap: 11, flex: 1, minWidth: 200 }}>
                  <div style={{ width: 44, height: 44, borderRadius: 11, background: m.type === "employee" ? "var(--blue2)" : "var(--gold3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>{m.icon}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 14, fontWeight: 700, color: "var(--text)" }}>{m.name}</span>
                      <span style={{ fontSize: 10.5, padding: "2px 8px", borderRadius: 5, background: m.urgent ? "rgba(248,113,113,.12)" : "rgba(251,146,60,.1)", color: m.urgent ? "var(--red)" : "var(--orange)", fontWeight: 700 }}>{m.badge}</span>
                      {sent && <span style={{ fontSize: 10.5, padding: "2px 8px", borderRadius: 5, background: "rgba(52,211,153,.12)", color: "var(--green)", fontWeight: 700 }}>✅ Sent</span>}
                    </div>
                    <div style={{ fontSize: 12, color: "var(--text3)", marginTop: 2, display: "flex", gap: 10, flexWrap: "wrap" }}>
                      <span style={{ color: "#25D366", fontWeight: 600 }}>📱 {m.phone}</span>
                      <span><RoleBadge role={m.type === "employee" ? m.role : "client"} /></span>
                      <span style={{ color: "var(--text3)" }}>{m.category.toUpperCase()}</span>
                    </div>
                  </div>
                </div>
                {/* Actions */}
                <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                  <button onClick={() => setPreview(preview?.id === m.id ? null : m)}
                    style={{ background: "var(--glass)", border: "1px solid var(--border)", borderRadius: 8, padding: "7px 12px", cursor: "pointer", fontSize: 12, color: "var(--text2)", fontWeight: 600, transition: "all .15s" }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = "var(--gold)"}
                    onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}>
                    {preview?.id === m.id ? "▲ Hide" : "👁 Preview"}
                  </button>
                  <button onClick={() => openWA(m)}
                    style={{ display: "flex", alignItems: "center", gap: 6, background: "#25D366", border: "none", borderRadius: 8, padding: "7px 16px", cursor: "pointer", fontSize: 13, color: "#fff", fontWeight: 700, transition: "all .15s" }}
                    onMouseEnter={e => e.currentTarget.style.background = "#1da851"}
                    onMouseLeave={e => e.currentTarget.style.background = "#25D366"}>
                    💬 Send
                  </button>
                </div>
                {/* Message preview */}
                {preview?.id === m.id && <div style={{ width: "100%", marginTop: 4 }}>
                  <div style={{ background: "var(--bg3)", borderRadius: 10, padding: "12px 16px", fontSize: 12, color: "var(--text2)", whiteSpace: "pre-wrap", lineHeight: 1.7, maxHeight: 220, overflowY: "auto", border: "1px solid var(--border)" }}>
                    {m.message}
                  </div>
                  <div style={{ display: "flex", gap: 8, marginTop: 8, justifyContent: "flex-end" }}>
                    <button onClick={() => { navigator.clipboard?.writeText(m.message); toast("Message copied!", "success"); }}
                      style={{ background: "var(--glass)", border: "1px solid var(--border)", borderRadius: 7, padding: "6px 12px", cursor: "pointer", fontSize: 12, color: "var(--text2)", fontWeight: 600 }}>
                      📋 Copy
                    </button>
                    <a href={`https://wa.me/${num}?text=${encodeURIComponent(m.message)}`} target="_blank"
                      style={{ display: "inline-flex", alignItems: "center", gap: 5, background: "#25D366", color: "#fff", textDecoration: "none", borderRadius: 7, padding: "6px 14px", fontSize: 12, fontWeight: 700 }}
                      onClick={() => setSentIds(prev => new Set([...prev, m.id]))}>
                      💬 Open in WhatsApp
                    </a>
                  </div>
                </div>}
              </div>;
            })}
          </div>}
      </Page>;
    }

    /* ══════════════════════════════════════════════════════════════
       v28 MODULE 1 — AI CODE STUDIO
       Admin types a prompt → Anthropic API generates code
       Preview in iframe sandbox → Test Run → Deploy to CRM
    ══════════════════════════════════════════════════════════════ */
    function AICodeStudioPage({ S, setS, user }) {
      const toast = useToast();
      const [prompt, setPrompt] = useState("");
      const [model, setModel] = useState("claude-opus-4-5");
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [previewSrc, setPreviewSrc] = useState("");
      const [showPreview, setShowPreview] = useState(false);
      const [tab, setTab] = useState("code");
      const [deployName, setDeployName] = useState("");
      const [history, setHistory] = useState(() => S.aiHistory || []);
      const [selectedHistory, setSelectedHistory] = useState(null);
      const [apiKey, setApiKey] = useState(() => { try { return localStorage.getItem("_oma_aik") || ""; } catch (e) { return ""; } });
      const [showKeyModal, setShowKeyModal] = useState(false);
      const textareaRef = useRef(null);

      const TEMPLATES = [
        { label: "📊 Dashboard Card", prompt: "Create a React component for a KPI dashboard card that shows: title, value, percentage change with up/down arrow, and a sparkline mini chart. Use gradient backgrounds and smooth animations. Return as a self-contained HTML with inline styles." },
        { label: "📋 Data Table", prompt: "Create an interactive HTML data table with: search filter, column sorting, pagination (10 rows/page), export to CSV button, and striped rows. Sample data should be employee records. Fully self-contained HTML." },
        { label: "📅 Calendar Widget", prompt: "Build a monthly calendar widget in pure HTML/CSS/JS. Show current month, navigate prev/next, highlight today, allow clicking dates to add notes. Self-contained HTML file." },
        { label: "💬 Chat Interface", prompt: "Design a modern chat message interface (like WhatsApp web). Show message bubbles (sent/received), timestamps, read receipts, and a message input bar with send button. Self-contained HTML." },
        { label: "📈 Revenue Chart", prompt: "Create an animated bar chart showing monthly revenue for 12 months using Chart.js CDN. Include total, average line, and a clean legend. Self-contained HTML." },
        { label: "🗂️ Kanban Board", prompt: "Build a drag-and-drop Kanban board with 3 columns: Todo, In Progress, Done. Cards should be draggable between columns. Add new card button per column. Self-contained HTML." },
      ];

      const saveKey = () => {
        try { localStorage.setItem("_oma_aik", apiKey); } catch (e) { }
        setShowKeyModal(false);
        toast("API key saved 🔐", "success");
      };

      const generate = async () => {
        const key = apiKey || localStorage.getItem("_oma_aik");
        if (!key) { setShowKeyModal(true); return; }
        if (!prompt.trim()) { toast("Enter a prompt", "error"); return; }
        setLoading(true); setResult(null); setShowPreview(false); setPreviewSrc("");
        try {
          const systemPrompt = `You are an expert frontend engineer. Generate complete, self-contained HTML/CSS/JavaScript code based on the user's request. 
Rules:
1. Return ONLY the HTML code — no explanation, no markdown, no backticks.
2. Code must be fully self-contained (all CSS inline or in <style>, all JS in <script>).
3. Use CDN libraries if needed (React, Chart.js from cdnjs.cloudflare.com).
4. Design must be professional and modern with dark theme (#0d1117 background, gold #d4a843 accents).
5. Include error handling and loading states.
6. Code must work without a server (file:// compatible).`;

          const resp = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
            body: JSON.stringify({ model, max_tokens: 4096, system: systemPrompt, messages: [{ role: "user", content: prompt }] })
          });
          if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || "API error " + resp.status); }
          const data = await resp.json();
          const code = data.content?.[0]?.text || "";
          const clean = code.replace(/^```html?\n?/i, "").replace(/```$/, "").trim();
          setResult(clean);
          // Auto-generate deploy name
          const words = prompt.split(" ").slice(0, 3).join("-").toLowerCase().replace(/[^a-z0-9-]/g, "");
          setDeployName(words || "generated-component");
          setTab("code");
          // Save to history
          const hItem = { id: uid("AIH"), prompt, code: clean, model, createdAt: now(), name: words };
          const newHistory = [hItem, ...(S.aiHistory || [])].slice(0, 50);
          setHistory(newHistory);
          setS(p => ({ ...p, aiHistory: newHistory }));
          toast("✅ Code generated!", "success");
        } catch (e) {
          toast("Error: " + e.message, "error");
        } finally { setLoading(false); }
      };

      const runPreview = () => {
        if (!result) return;
        const blob = new Blob([result], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        setPreviewSrc(url);
        setShowPreview(true);
        setTab("preview");
        toast("Preview loaded", "success");
      };

      const deployToContent = () => {
        if (!result) { toast("Generate code first", "error"); return; }
        const item = {
          id: uid("CTN"), type: "code", title: deployName || "AI Component", content: result, category: "AI Generated",
          createdAt: now(), createdBy: user.name, tags: ["ai", "generated"]
        };
        setS(p => ({ ...p, contentLibrary: [item, ...(p.contentLibrary || [])] }));
        toast("✅ Deployed to Content Library!", "success");
      };

      const downloadCode = () => {
        if (!result) return;
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([result], { type: "text/html" }));
        a.download = (deployName || "component") + ".html";
        a.click();
        toast("Downloaded!", "success");
      };

      const loadHistory = (h) => {
        setSelectedHistory(h);
        setResult(h.code);
        setPrompt(h.prompt);
        setDeployName(h.name);
        setTab("code");
        toast("Loaded from history", "success");
      };

      return <Page title="🤖 AI Code Studio" subtitle="Enter a prompt → Generate → Preview → Deploy">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 20, height: "calc(100vh - 120px)" }}>
          {/* LEFT PANEL */}
          <div style={{ display: "flex", flexDirection: "column", gap: 14, overflow: "hidden" }}>
            {/* Prompt Area */}
            <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, padding: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text)" }}>✏️ Prompt</div>
                <div style={{ display: "flex", gap: 6 }}>
                  <select value={model} onChange={e => setModel(e.target.value)}
                    style={{ padding: "4px 8px", borderRadius: 6, border: "1px solid var(--border)", background: "var(--bg2)", color: "var(--text2)", fontSize: 11, cursor: "pointer" }}>
                    <option value="claude-opus-4-5">Claude Opus 4</option>
                    <option value="claude-sonnet-4-5">Claude Sonnet 4</option>
                  </select>
                  <button onClick={() => setShowKeyModal(true)}
                    style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid var(--border)", background: "var(--glass)", color: "var(--text3)", fontSize: 11, cursor: "pointer" }}>
                    🔑 API Key
                  </button>
                </div>
              </div>
              {/* Template chips */}
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
                {TEMPLATES.map(t => <button key={t.label} onClick={() => setPrompt(t.prompt)}
                  style={{ padding: "4px 10px", borderRadius: 20, border: "1px solid var(--border2)", background: "var(--glass)", color: "var(--text2)", fontSize: 11, cursor: "pointer", transition: "all .15s", whiteSpace: "nowrap" }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--gold)"; e.currentTarget.style.color = "var(--gold)"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border2)"; e.currentTarget.style.color = "var(--text2)"; }}>
                  {t.label}
                </button>)}
              </div>
              <textarea ref={textareaRef} value={prompt} onChange={e => setPrompt(e.target.value)}
                placeholder="Describe what you want to build… e.g. 'Create a monthly revenue chart with filters for year and service type'"
                rows={5}
                style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid var(--border2)", background: "rgba(255,255,255,0.03)", color: "var(--text)", fontSize: 13, resize: "vertical", fontFamily: "var(--font)", outline: "none", lineHeight: 1.6 }}
                onKeyDown={e => { if (e.ctrlKey && e.key === "Enter") generate(); }}
              />
              <div style={{ display: "flex", gap: 8, marginTop: 10, alignItems: "center" }}>
                <button onClick={generate} disabled={loading || !prompt.trim()}
                  style={{ flex: 1, padding: "10px 20px", borderRadius: 8, border: "none", background: loading ? "rgba(255,255,255,0.05)" : "linear-gradient(135deg,var(--gold),#8b6010)", color: loading ? "var(--text3)" : "#000", fontWeight: 700, fontSize: 13.5, cursor: loading ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, transition: "all .2s" }}>
                  {loading ? <><span style={{ animation: "spin 1s linear infinite", display: "inline-block" }}>⟳</span> Generating…</> : <>🤖 Generate Code (Ctrl+Enter)</>}
                </button>
                {result && <>
                  <button onClick={runPreview} style={{ padding: "10px 14px", borderRadius: 8, border: "1px solid rgba(86,145,248,0.3)", background: "rgba(86,145,248,0.1)", color: "var(--blue)", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                    👁 Preview
                  </button>
                  <button onClick={downloadCode} style={{ padding: "10px 14px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--glass)", color: "var(--text2)", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                    ⬇ Download
                  </button>
                </>}
              </div>
            </div>

            {/* Output Tabs */}
            {result && <div style={{ flex: 1, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, overflow: "hidden", display: "flex", flexDirection: "column" }}>
              <div style={{ display: "flex", borderBottom: "1px solid var(--border)", padding: "0 14px" }}>
                {["code", "preview"].map(t => <button key={t} onClick={() => { setTab(t); if (t === "preview" && !previewSrc) runPreview(); }}
                  style={{ padding: "10px 16px", border: "none", background: "transparent", color: tab === t ? "var(--gold)" : "var(--text3)", fontWeight: tab === t ? 700 : 500, fontSize: 13, cursor: "pointer", borderBottom: tab === t ? "2px solid var(--gold)" : "2px solid transparent", transition: "all .15s" }}>
                  {t === "code" ? "💻 Code" : "👁 Live Preview"}
                </button>)}
                <div style={{ flex: 1 }} />
                <div style={{ display: "flex", gap: 6, alignItems: "center", padding: "6px 0" }}>
                  <input value={deployName} onChange={e => setDeployName(e.target.value)} placeholder="Component name"
                    style={{ padding: "5px 9px", borderRadius: 6, border: "1px solid var(--border)", background: "var(--bg2)", color: "var(--text)", fontSize: 12, outline: "none", width: 160 }} />
                  <button onClick={deployToContent}
                    style={{ padding: "6px 14px", borderRadius: 7, border: "none", background: "linear-gradient(135deg,var(--green),#047857)", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
                    🚀 Deploy
                  </button>
                </div>
              </div>
              {tab === "code" && <div style={{ flex: 1, overflow: "auto", position: "relative" }}>
                <button onClick={() => { navigator.clipboard?.writeText(result); toast("Copied!", "success"); }}
                  style={{ position: "sticky", top: 8, left: "calc(100% - 80px)", marginRight: 8, float: "right", padding: "4px 10px", borderRadius: 6, border: "1px solid var(--border)", background: "var(--glass)", color: "var(--text2)", fontSize: 11, cursor: "pointer", zIndex: 2 }}>
                  📋 Copy
                </button>
                <pre style={{ margin: 0, padding: "14px 16px", fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--teal)", lineHeight: 1.7, overflowX: "auto", whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{result}</pre>
              </div>}
              {tab === "preview" && <div style={{ flex: 1, position: "relative" }}>
                {previewSrc
                  ? <iframe src={previewSrc} style={{ width: "100%", height: "100%", border: "none", borderRadius: "0 0 14px 14px" }} sandbox="allow-scripts allow-same-origin" title="preview" />
                  : <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", color: "var(--text3)" }}>
                    <button onClick={runPreview} style={{ padding: "14px 28px", borderRadius: 10, border: "none", background: "linear-gradient(135deg,var(--gold),#8b6010)", color: "#000", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
                      ▶ Run Preview
                    </button>
                  </div>}
              </div>}
            </div>}

            {!result && !loading && <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "var(--text3)", background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14 }}>
              <div style={{ fontSize: 56, marginBottom: 12, opacity: .3 }}>🤖</div>
              <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 6 }}>AI Code Generation</div>
              <div style={{ fontSize: 12, textAlign: "center", maxWidth: 340, lineHeight: 1.7 }}>Type a prompt above or choose a template. The AI will generate complete, deployable HTML/JS/CSS code.</div>
              <div style={{ fontSize: 11, color: "var(--text4)", marginTop: 16, background: "var(--glass)", padding: "6px 14px", borderRadius: 6 }}>Ctrl+Enter to generate</div>
            </div>}
          </div>

          {/* RIGHT PANEL — History */}
          <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, overflow: "hidden", display: "flex", flexDirection: "column" }}>
            <div style={{ padding: "13px 16px", borderBottom: "1px solid var(--border)", fontSize: 13, fontWeight: 700, color: "var(--text)", display: "flex", alignItems: "center", gap: 8 }}>
              🕐 History <span style={{ fontSize: 10, background: "var(--glass2)", padding: "2px 8px", borderRadius: 4, color: "var(--text3)" }}>{history.length}</span>
              {history.length > 0 && <button onClick={() => { if (confirm("Clear all AI history?")) { { const e = []; setHistory(e); setS(p => ({ ...p, aiHistory: e })); } } }}
                style={{ marginLeft: "auto", background: "none", border: "none", color: "var(--text4)", cursor: "pointer", fontSize: 11 }}>Clear</button>}
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "8px" }}>
              {history.length === 0 && <div style={{ textAlign: "center", padding: "32px 0", color: "var(--text4)", fontSize: 12 }}>No history yet.<br />Generated code will appear here.</div>}
              {history.map(h => <div key={h.id} onClick={() => loadHistory(h)}
                style={{ padding: "10px 12px", borderRadius: 9, border: "1px solid " + (selectedHistory?.id === h.id ? "var(--gold)" : "var(--border)"), cursor: "pointer", marginBottom: 6, transition: "all .15s", background: selectedHistory?.id === h.id ? "var(--gold4)" : "transparent" }}
                onMouseEnter={e => e.currentTarget.style.borderColor = "var(--border2)"}
                onMouseLeave={e => { if (selectedHistory?.id !== h.id) e.currentTarget.style.borderColor = "var(--border)"; }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text)", marginBottom: 3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{h.name || "Component"}</div>
                <div style={{ fontSize: 11, color: "var(--text3)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 4 }}>{h.prompt?.slice(0, 60)}…</div>
                <div style={{ fontSize: 10, color: "var(--text4)" }}>{fmtTime(h.createdAt)}</div>
              </div>)}
            </div>
          </div>
        </div>

        {/* API Key Modal */}
        {showKeyModal && <Modal title="🔑 Anthropic API Key" onClose={() => setShowKeyModal(false)} width={420}>
          <div style={{ fontSize: 13, color: "var(--text2)", marginBottom: 16, lineHeight: 1.7 }}>
            Enter your Anthropic API key to enable AI code generation. The key is stored locally only — never sent to our servers.
          </div>
          <Field label="API Key" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-ant-api03-…" type="password" />
          <div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 16 }}>
            Get your API key at <a href="https://console.anthropic.com" target="_blank" style={{ color: "var(--gold)" }}>console.anthropic.com</a>
          </div>
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
            <Btn v="ghost" onClick={() => setShowKeyModal(false)}>Cancel</Btn>
            <Btn onClick={saveKey}>Save Key</Btn>
          </div>
        </Modal>}
      </Page>;
    }

    /* ══════════════════════════════════════════════════════════════
       v28 MODULE 2 — CONTENT LIBRARY
       Upload text, files, YouTube, posters, links.
       All open INSIDE CRM — no redirect.
    ══════════════════════════════════════════════════════════════ */
    function ContentLibraryPage({ S, setS, user }) {
      const toast = useToast();
      const [search, setSearch] = useState("");
      const [catFilter, setCatFilter] = useState("all");
      const [typeFilter, setTypeFilter] = useState("all");
      const [addModal, setAddModal] = useState(false);
      const [preview, setPreview] = useState(null);
      const [form, setForm] = useState({ type: "youtube", title: "", url: "", text: "", category: "General", tags: "" });
      const items = S.contentLibrary || [];

      const TYPES = [
        { v: "youtube", l: "▶ YouTube", icon: "🎬" },
        { v: "link", l: "🔗 Link", icon: "🔗" },
        { v: "text", l: "📝 Text/Note", icon: "📝" },
        { v: "image", l: "🖼 Image", icon: "🖼" },
        { v: "file", l: "📎 File", icon: "📎" },
        { v: "code", l: "💻 Code", icon: "💻" },
        { v: "poster", l: "🎨 Poster URL", icon: "🎨" },
      ];
      const CATS = ["General", "Training", "Marketing", "Legal", "Finance", "HR", "Technical", "Announcements"];

      const filtered = items.filter(item => {
        if (catFilter !== "all" && item.category !== catFilter) return false;
        if (typeFilter !== "all" && item.type !== typeFilter) return false;
        if (search && !JSON.stringify(item).toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });

      const ytId = url => {
        if (!url) return null;
        const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/))([^&?/\s]{11})/);
        return m ? m[1] : null;
      };

      const addItem = () => {
        if (!form.title.trim()) { toast("Enter a title", "error"); return; }
        if ((form.type === "youtube" || form.type === "link" || form.type === "poster") && !form.url.trim()) { toast("Enter a URL", "error"); return; }
        if (form.type === "text" && !form.text.trim()) { toast("Enter content", "error"); return; }
        const item = {
          id: uid("CTN"), ...form, tags: (form.tags || "").split(",").map(t => t.trim()).filter(Boolean),
          createdAt: now(), createdBy: user.name
        };
        setS(p => ({ ...p, contentLibrary: [item, ...(p.contentLibrary || [])] }));
        toast("Added to library! 📚", "success");
        setAddModal(false);
        setForm({ type: "youtube", title: "", url: "", text: "", category: "General", tags: "" });
      };

      const del = id => {
        if (!confirm("Delete this content?")) return;
        setS(p => ({ ...p, contentLibrary: (p.contentLibrary || []).filter(x => x.id !== id) }));
        if (preview?.id === id) setPreview(null);
        toast("Deleted", "warn");
      };

      const handleFileUpload = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          setForm(p => ({
            ...p, fileData: ev.target.result, title: p.title || file.name,
            mimeType: file.type, fileName: file.name, fileSize: file.size
          }));
        };
        reader.readAsDataURL(file);
      };

      const renderPreview = item => {
        if (!item) return null;
        if (item.type === "youtube") {
          const id = ytId(item.url);
          if (!id) return <div style={{ padding: 20, color: "var(--text3)" }}>Invalid YouTube URL</div>;
          return <div style={{ position: "relative", paddingTop: "56.25%", background: "#000", borderRadius: 8, overflow: "hidden" }}>
            <iframe src={`https://www.youtube.com/embed/${id}?autoplay=1&rel=0`}
              style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", border: "none" }}
              allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowFullScreen title={item.title} />
          </div>;
        }
        if (item.type === "image" || (item.type === "poster"))
          return <img src={item.fileData || item.url} alt={item.title} style={{ width: "100%", borderRadius: 8, maxHeight: 480, objectFit: "contain", background: "#000" }} />;
        if (item.type === "text")
          return <div style={{ background: "var(--bg2)", borderRadius: 8, padding: 16, fontSize: 13, lineHeight: 1.8, color: "var(--text)", whiteSpace: "pre-wrap", maxHeight: 400, overflowY: "auto" }}>{item.text}</div>;
        if (item.type === "code")
          return <pre style={{ background: "var(--bg2)", borderRadius: 8, padding: 16, fontSize: 12, color: "var(--teal)", fontFamily: "var(--font-mono)", maxHeight: 400, overflowY: "auto", whiteSpace: "pre-wrap" }}>{item.content || item.text}</pre>;
        if (item.type === "file" && item.fileData) {
          if (item.mimeType?.startsWith("image/"))
            return <img src={item.fileData} alt={item.title} style={{ width: "100%", borderRadius: 8, maxHeight: 400, objectFit: "contain" }} />;
          if (item.mimeType === "application/pdf")
            return <iframe src={item.fileData} style={{ width: "100%", height: 480, border: "none", borderRadius: 8 }} title={item.title} />;
          return <div style={{ textAlign: "center", padding: 32 }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>📎</div>
            <div style={{ color: "var(--text2)", marginBottom: 16 }}>{item.fileName}</div>
            <a href={item.fileData} download={item.fileName}
              style={{ padding: "10px 24px", borderRadius: 8, background: "linear-gradient(135deg,var(--gold),#8b6010)", color: "#000", textDecoration: "none", fontWeight: 700, fontSize: 13 }}>
              ⬇ Download
            </a>
          </div>;
        }
        if (item.type === "link")
          return <div style={{ padding: 20 }}>
            <a href={item.url} target="_blank" rel="noopener noreferrer"
              style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "12px 24px", borderRadius: 8, background: "var(--blue2)", border: "1px solid rgba(86,145,248,0.2)", color: "var(--blue)", fontWeight: 700, fontSize: 14, textDecoration: "none" }}>
              🔗 Open Link in New Tab
            </a>
            <div style={{ marginTop: 12, color: "var(--text3)", fontSize: 12, wordBreak: "break-all" }}>{item.url}</div>
          </div>;
        return <div style={{ padding: 20, color: "var(--text3)" }}>No preview available</div>;
      };

      const typeIcon = type => TYPES.find(t => t.v === type)?.icon || "📄";

      return <Page title="🎬 Content Library" subtitle="All media, links, and content in one place"
        action={<Btn onClick={() => setAddModal(true)}>＋ Add Content</Btn>}>
        {/* Filters */}
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
          <SearchBar value={search} onChange={e => setSearch(e.target.value)} style={{ flex: 1, minWidth: 200 }} />
          <select value={catFilter} onChange={e => setCatFilter(e.target.value)}
            style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--bg2)", color: "var(--text)", fontSize: 13, cursor: "pointer" }}>
            <option value="all">All Categories</option>
            {CATS.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)}
            style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--bg2)", color: "var(--text)", fontSize: 13, cursor: "pointer" }}>
            <option value="all">All Types</option>
            {TYPES.map(t => <option key={t.v} value={t.v}>{t.l}</option>)}
          </select>
        </div>

        {/* Stats row */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(100px,1fr))", gap: 10, marginBottom: 18 }}>
          {TYPES.map(t => {
            const cnt = items.filter(x => x.type === t.v).length; return cnt > 0 ? <div key={t.v}
              onClick={() => setTypeFilter(typeFilter === t.v ? "all" : t.v)}
              style={{ background: "var(--glass)", border: "1px solid " + (typeFilter === t.v ? "var(--gold)" : "var(--border)"), borderRadius: 10, padding: "10px 14px", cursor: "pointer", textAlign: "center", transition: "all .15s" }}>
              <div style={{ fontSize: 20 }}>{t.icon}</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: "var(--text)", margin: "2px 0" }}>{cnt}</div>
              <div style={{ fontSize: 10, color: "var(--text3)" }}>{t.l.replace(/[^ ]+\s/, "")}</div>
            </div> : null;
          })}
        </div>

        {/* Content Grid */}
        {filtered.length === 0 ? <Empty icon="🎬" text="No content yet. Add YouTube, files, links and more." />
          : <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(260px,1fr))", gap: 14 }}>
            {filtered.map(item => <div key={item.id}
              style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, overflow: "hidden", transition: "all .2s", cursor: "pointer" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--border2)"; e.currentTarget.style.transform = "translateY(-2px)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.transform = ""; }}>
              {/* Thumbnail */}
              <div style={{ height: 140, background: "var(--bg2)", position: "relative", overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center" }}
                onClick={() => setPreview(item)}>
                {item.type === "youtube" && ytId(item.url)
                  ? <img src={`https://img.youtube.com/vi/${ytId(item.url)}/hqdefault.jpg`} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                  : item.type === "image" && (item.fileData || item.url)
                    ? <img src={item.fileData || item.url} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                    : <div style={{ fontSize: 48, opacity: .3 }}>{typeIcon(item.type)}</div>}
                {item.type === "youtube" && <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <div style={{ width: 50, height: 50, background: "rgba(255,0,0,0.85)", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>▶</div>
                </div>}
                <div style={{ position: "absolute", top: 8, left: 8 }}>
                  <span style={{ background: "rgba(0,0,0,0.7)", borderRadius: 5, padding: "2px 8px", fontSize: 10, color: "#fff" }}>{typeIcon(item.type)} {item.type}</span>
                </div>
              </div>
              {/* Info */}
              <div style={{ padding: "12px 14px" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text)", marginBottom: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.title}</div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
                  <span style={{ fontSize: 10, color: "var(--text3)" }}>{item.category} · {fmtDate(item.createdAt)}</span>
                  <div style={{ display: "flex", gap: 4 }}>
                    <button onClick={() => setPreview(item)}
                      style={{ padding: "4px 9px", borderRadius: 6, border: "1px solid var(--border)", background: "var(--glass)", color: "var(--text2)", fontSize: 11, cursor: "pointer" }}>
                      👁 View
                    </button>
                    <button onClick={() => del(item.id)}
                      style={{ padding: "4px 9px", borderRadius: 6, border: "1px solid var(--red2)", background: "var(--red2)", color: "var(--red)", fontSize: 11, cursor: "pointer" }}>✕</button>
                  </div>
                </div>
              </div>
            </div>)}
          </div>}

        {/* Preview Modal */}
        {preview && <Modal title={preview.title} onClose={() => setPreview(null)} width={800} subtitle={preview.category + " · " + typeIcon(preview.type) + " " + preview.type}>
          {renderPreview(preview)}
          {preview.text && preview.type !== "text" && <div style={{ marginTop: 12, fontSize: 12, color: "var(--text3)", lineHeight: 1.7 }}>{preview.text}</div>}
          {(preview.tags || []).length > 0 && <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 12 }}>
            {preview.tags.map(t => <span key={t} style={{ background: "var(--glass2)", border: "1px solid var(--border)", padding: "2px 9px", borderRadius: 20, fontSize: 11, color: "var(--text2)" }}>{t}</span>)}
          </div>}
        </Modal>}

        {/* Add Modal */}
        {addModal && <Modal title="➕ Add Content" onClose={() => setAddModal(false)} width={560}>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
            {TYPES.map(t => <button key={t.v} onClick={() => setForm(p => ({ ...p, type: t.v }))}
              style={{ padding: "6px 13px", borderRadius: 20, border: "1px solid " + (form.type === t.v ? "var(--gold)" : "var(--border)"), background: form.type === t.v ? "var(--gold3)" : "transparent", color: form.type === t.v ? "var(--gold)" : "var(--text2)", fontSize: 12, cursor: "pointer", transition: "all .15s" }}>
              {t.l}
            </button>)}
          </div>
          <Field label="Title" value={form.title} onChange={e => setForm(p => ({ ...p, title: e.target.value }))} placeholder="Content title" required />
          {(form.type === "youtube" || form.type === "link" || form.type === "poster") &&
            <Field label={form.type === "youtube" ? "YouTube URL" : "Link URL"} value={form.url} onChange={e => setForm(p => ({ ...p, url: e.target.value }))} placeholder="https://…" />}
          {form.type === "text" &&
            <Field label="Content" value={form.text} onChange={e => setForm(p => ({ ...p, text: e.target.value }))} placeholder="Write your content…" rows={5} />}
          {form.type === "code" &&
            <Field label="Code" value={form.text} onChange={e => setForm(p => ({ ...p, text: e.target.value }))} placeholder="<code here>" rows={5} />}
          {(form.type === "image" || form.type === "file") && <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 5 }}>Upload File</label>
            <input type="file" onChange={handleFileUpload} accept={form.type === "image" ? "image/*" : "*/*"}
              style={{ color: "var(--text)", fontSize: 13 }} />
            {form.fileName && <div style={{ fontSize: 11, color: "var(--green)", marginTop: 4 }}>✅ {form.fileName}</div>}
          </div>}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <div>
              <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 5 }}>Category</label>
              <select value={form.category} onChange={e => setForm(p => ({ ...p, category: e.target.value }))}
                style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid var(--border2)", background: "rgba(255,255,255,0.03)", color: "var(--text)", fontSize: 13, outline: "none" }}>
                {CATS.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <Field label="Tags (comma-separated)" value={form.tags} onChange={e => setForm(p => ({ ...p, tags: e.target.value }))} placeholder="training, onboarding" />
          </div>
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 6 }}>
            <Btn v="ghost" onClick={() => setAddModal(false)}>Cancel</Btn>
            <Btn onClick={addItem}>➕ Add to Library</Btn>
          </div>
        </Modal>}
      </Page>;
    }

    /* ══════════════════════════════════════════════════════════════
       v28 MODULE 3 — BACKUP & RESTORE
       Daily auto-backup, date-wise files, restore, export all
    ══════════════════════════════════════════════════════════════ */
    function BackupRestorePage({ S, setS, user }) {
      const toast = useToast();
      const [snapshots, setSnapshots] = useState([]);
      const [loading, setLoading] = useState(false);
      const [restoring, setRestoring] = useState(null);
      const [autoBackupEnabled, setAutoBackupEnabled] = useState(() => { try { return localStorage.getItem("_oma_autobackup") !== "false"; } catch (e) { return true; } });
      const [lastBackup, setLastBackup] = useState(() => { try { return localStorage.getItem("_oma_lastbackup") || null; } catch (e) { return null; } });
      const [backupLog, setBackupLog] = useState(() => S.backupLog || []);

      useEffect(() => { loadSnapshots(); }, []);

      // Auto-backup every 24h
      useEffect(() => {
        if (!autoBackupEnabled) return;
        const checkBackup = () => {
          const last = localStorage.getItem("_oma_lastbackup");
          if (!last || Date.now() - new Date(last).getTime() > 24 * 60 * 60 * 1000) {
            doAutoBackup();
          }
        };
        checkBackup();
        const t = setInterval(checkBackup, 60 * 60 * 1000);// check every hour
        return () => clearInterval(t);
      }, [autoBackupEnabled, S]);

      const loadSnapshots = async () => {
        setLoading(true);
        try { const snaps = await getSnapshots(); setSnapshots(snaps); }
        catch (e) { }
        setLoading(false);
      };

      const doAutoBackup = async () => {
        const ts = now();
        await saveSnapshot(S, "auto-daily-" + today());
        try { localStorage.setItem("_oma_lastbackup", ts); } catch (e) { }
        setLastBackup(ts);
        const entry = {
          id: uid("BAK"), type: "auto", label: "Auto Daily Backup", ts, records: {
            clients: (S.clients || []).filter(x => !x._deleted).length,
            tasks: (S.tasks || []).filter(x => !x._deleted).length,
            invoices: (S.bills || []).filter(x => !x._deleted).length,
          }
        };
        const newLog = [entry, ...(S.backupLog || [])].slice(0, 30);
        setBackupLog(newLog);
        setS(p => ({ ...p, backupLog: newLog }));
        await loadSnapshots();
      };

      const doManualBackup = async () => {
        setLoading(true);
        const ts = now();
        await saveSnapshot(S, "manual-" + today());
        try { localStorage.setItem("_oma_lastbackup", ts); } catch (e) { }
        setLastBackup(ts);
        const entry = {
          id: uid("BAK"), type: "manual", label: "Manual Backup", ts, records: {
            clients: (S.clients || []).filter(x => !x._deleted).length,
            tasks: (S.tasks || []).filter(x => !x._deleted).length,
          }
        };
        const newLog = [entry, ...(S.backupLog || [])].slice(0, 30);
        setBackupLog(newLog);
        setS(p => ({ ...p, backupLog: newLog }));
        await loadSnapshots();
        toast("✅ Backup created!", "success");
        setLoading(false);
      };

      const exportFullBackup = () => {
        const payload = { exportedAt: now(), version: "v28", data: S };
        const json = JSON.stringify(payload, null, 2);
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([json], { type: "application/json" }));
        a.download = "OM_Associates_Backup_" + today() + ".json";
        a.click();
        toast("✅ Full backup downloaded!", "success");
      };

      const exportByDate = (snap) => {
        try {
          const data = JSON.parse(snap.data || "{}");
          const json = JSON.stringify({ exportedAt: snap.ts, label: snap.label, data }, null, 2);
          const a = document.createElement("a");
          a.href = URL.createObjectURL(new Blob([json], { type: "application/json" }));
          a.download = "OM_Backup_" + new Date(snap.ts).toISOString().split("T")[0] + ".json";
          a.click();
          toast("Downloaded!", "success");
        } catch (e) { toast("Export failed", "error"); }
      };

      const importBackup = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const payload = JSON.parse(ev.target.result);
            const data = payload.data || payload;
            if (!data.clients && !data.users) { toast("Invalid backup file", "error"); return; }
            if (!confirm("⚠️ This will restore from backup.\nAll current data will be replaced.\n\nAre you sure?")) return;
            setRestoring("importing");
            Object.keys(data).forEach(k => ss(k, data[k]));
            setS(p => ({ ...p, ...data }));
            toast("✅ Backup restored successfully!", "success");
            setRestoring(null);
          } catch (e) { toast("Parse error: " + e.message, "error"); setRestoring(null); }
        };
        reader.readAsText(file);
      };

      const restoreSnap = async (snap) => {
        if (!confirm("Restore to snapshot: " + snap.label + "?\nCurrent data will be replaced.")) return;
        setRestoring(snap.ts);
        try {
          const data = await restoreSnapshot(snap.ts);
          if (!data) { toast("Snapshot data not found", "error"); setRestoring(null); return; }
          const parsed = typeof data === "string" ? JSON.parse(data) : data;
          Object.keys(parsed).forEach(k => ss(k, parsed[k]));
          setS(p => ({ ...p, ...parsed }));
          toast("✅ Restored to: " + snap.label, "success");
        } catch (e) { toast("Restore error: " + e.message, "error"); }
        setRestoring(null);
      };

      const totalItems = (S.clients?.length || 0) + (S.tasks?.length || 0) + (S.bills?.length || 0) + (S.documents?.length || 0);

      return <Page title="💾 Backup & Restore" subtitle="Daily auto-backup, date-wise snapshots, full data safety">
        {/* Status Cards */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 12, marginBottom: 20 }}>
          <KPI label="Total Records" value={totalItems} icon="🗄" color="var(--blue)" />
          <KPI label="Snapshots" value={snapshots.length} icon="📸" color="var(--green)" />
          <KPI label="Last Backup" value={lastBackup ? fmtDate(lastBackup) : "Never"} icon="🕐" color="var(--gold)" />
          <KPI label="Auto Backup" value={autoBackupEnabled ? "ON" : "OFF"} icon="🔄" color={autoBackupEnabled ? "var(--green)" : "var(--red)"}

    /* ══════════════════════════════════════════════════════════════
       MAIN APP COMPONENT
    ══════════════════════════════════════════════════════════════ */
    function App() {
      // v29: Client portal state
      const [clientPortalMode, setClientPortalMode] = useState(() => {
        try { const s = ls("session", null); return !!(s?.isClient); } catch(e){ return false; }
      });
      const [clientPortalUser, setClientPortalUser] = useState(null);
      const [clientPortalData, setClientPortalData] = useState(null);
      const [showClientLogin, setShowClientLogin] = useState(false);

      const [user, setUser] = useState(() => {
        const s = ls("session", null);
        if (!s?.userId || s?.isClient) return null;
        const users = ls("users", SEED_USERS);
        return users.find(u => u.id === s.userId && u.status === "active") || null;
      });
      const [S, setS_] = useState(() => initState());
      const [page, setPage_] = useState(() => { try { return sessionStorage.getItem("_crm_page") || "dashboard"; } catch (e) { return "dashboard"; } });
      const [clientId, setClientId_] = useState(() => { try { return sessionStorage.getItem("_crm_cid") || null; } catch (e) { return null; } });
      const setPage = useCallback(p => { setPage_(p); try { sessionStorage.setItem("_crm_page", p); } catch (e) { } }, []);
      const setClientId = useCallback(id => { setClientId_(id); try { if (id) sessionStorage.setItem("_crm_cid", id); else sessionStorage.removeItem("_crm_cid"); } catch (e) { } }, []);
      const [collapsed, setCollapsed] = useState(false);
      const [mobileOpen, setMobileOpen] = useState(false);
      const [syncStatus, setSyncStatus] = useState("off");
      const [cloudReady, setCloudReady] = useState(true);// show app immediately, sync in background
      const toast = useToast();
      const syncRef = useRef(null);

      // v29: Client portal - listen for button click from login page
      useEffect(() => {
        const handler = () => setShowClientLogin(true);
        window.addEventListener("_openClientPortal", handler);
        // Restore client session on reload
        const s = ls("session", null);
        if (s?.isClient && s?.clientId) {
          const cid = s.clientId;
          const clients = ensureArray(ls("clients", []));
          const found = clients.find(c => c.id === cid);
          if (found) {
            const cu = { id:found.id, name:found.name, role:"client", phone:found.phone, email:found.email||"", clientId:found.id, status:"active", isClient:true };
            setClientPortalUser(cu); setClientPortalData(found); setClientPortalMode(true);
          }
        }
        return () => window.removeEventListener("_openClientPortal", handler);
      }, []);

      // Wrapped setS with batched persistence (10x faster)
      const _saveQueue = useRef({});
      const _saveTimer = useRef(null);
      const flushSave = useCallback(() => {
        const q = _saveQueue.current;
        _saveQueue.current = {};
        Object.keys(q).forEach(k => ss(k, q[k]));
      }, []);

      const setS = useCallback(updater => {
        setS_(prev => {
          const next = typeof updater === "function" ? updater(prev) : updater;
          // Queue changed keys for batch save
          Object.keys(next).forEach(k => { if (next[k] !== prev[k]) _saveQueue.current[k] = next[k]; });
          // Debounce saves — flush after 200ms of inactivity
          clearTimeout(_saveTimer.current);
          _saveTimer.current = setTimeout(flushSave, 200);
          return next;
        });
      }, [flushSave]);

      // ── pushNow: immediate Firebase push (bypasses 150ms debounce) ──
      const pushNow = useCallback(async (newState) => {
        if (!_inited || !_pullDone) return;
        clearTimeout(syncRef.current); // cancel debounced push
        _lastPushTs = Date.now() + 5000;   // optimistic: block echo for 5s
        const ok = await pushCloud(newState || {}).catch(() => false);
        if (ok) {
          setSyncStatus("synced");
          saveSnapshot(newState, "push-now").catch(() => { });
        } else {
          _lastPushTs = 0; // reset on fail
          setSyncStatus("error");
        }
      }, []);
      window._crmPushNow = pushNow;

      // ════════════════════════════════════════════════════════
      //  5-LAYER BULLETPROOF BOOT — Data NEVER lost
      //  Layer 1: RAM cache  Layer 2: localStorage+LZ
      //  Layer 3: IndexedDB  Layer 4: Snapshots  Layer 5: Firebase
      //  _pullDone flag blocks auto-push until pull safe
      // ════════════════════════════════════════════════════════
      useEffect(() => {
        let cancelled = false;
        let localPullDone = false;

        const setDone = (status) => {
          if (!cancelled) { localPullDone = true; _pullDone = true; setSyncStatus(status); setCloudReady(true); }
        };

        const lsOk = ls("users", null)?.length > 0;
        console.log("[CRM] localStorage:", lsOk ? "✅ data" : "empty");

        const doRestore = async () => {
          if (lsOk) return false;
          const ok = await restoreFromIDB();
          if (ok && !cancelled) { setS(() => initState()); console.log("[CRM] ✅ IDB restored"); }
          if (!ok) {
            const snaps = await getSnapshots();
            if (snaps.length > 0) {
              try {
                const d = JSON.parse(snaps[0].data || "{}");
                if ((d.clients || []).length > 0 || (d.users || []).length > 0) {
                  DATA_KEYS.forEach(k => { if (d[k] != null) ss(k, d[k]); });
                  if (!cancelled) setS(prev => ({ ...prev, ...d }));
                  console.log("[CRM] ✅ Snapshot restored — clients:", (d.clients || []).length);
                  return true;
                }
              } catch (e2) { }
            }
          }
          return ok;
        };

        const fbOk = fbInit();
        if (!fbOk) {
          doRestore().then(() => { if (!cancelled) { _pullDone = true; setSyncStatus("off"); setCloudReady(true); } });
          return () => { cancelled = true; };
        }
        setSyncStatus("syncing");

        const safety = setTimeout(() => {
          if (!cancelled && !localPullDone) { console.warn("[CRM] Firebase timeout"); setDone("off"); }
        }, 12000);

        (async () => {
          await doRestore();
          let retryDelay = 3000;
          for (let attempt = 0; attempt <= 3; attempt++) {
            if (cancelled) return;
            try {
              const data = await pullCloud();
              clearTimeout(safety); if (cancelled) return;
              if (data && data._ts) {
                const localClients = ls("clients", []) || [];
                const fbClients = fromFB(data.clients) || [];
                if (fbClients.length < localClients.length) {
                  const ids = new Set(fbClients.map(x => x.id));
                  const extra = localClients.filter(x => x.id && !ids.has(x.id));
                  if (extra.length) { data.clients = toFB([...fbClients, ...extra]); setTimeout(() => pushCloud(initState()), 2000); }
                }
                // ── Convert ALL Firebase objects to arrays before setting state ──
                // Firebase stores arrays as {id1:{}, id2:{}} — must convert ALL keys
                const ARRAY_KEYS = ["clients", "services", "tasks", "documents", "bills", "payments", "messages", "groups", "activity", "notes", "gstReminders", "excelSheets", "wordDocs", "attendance", "users", "expenses", "adminIdeas"];
                const safeData = { ...data };
                ARRAY_KEYS.forEach(k => { if (safeData[k] != null) safeData[k] = Array.isArray(safeData[k]) ? safeData[k] : fromFB(safeData[k]); });
                // Re-apply permanent deletes so Firebase can't restore them
                ["tasks", "bills", "services", "documents", "clients"].forEach(k => {
                  if (safeData[k] && Array.isArray(safeData[k])) {
                    safeData[k] = safeData[k].map(item => (item && _permDel.has(item.id)) ? { ...item, _deleted: true } : item);
                  }
                });
                _fromCloud = true;
                DATA_KEYS.forEach(k => { if (safeData[k] != null) ss(k, safeData[k]); });
                if (safeData.settings?.firmLogo) window._FIRM_LOGO = safeData.settings.firmLogo;
                setS(prev => ({ ...prev, ...safeData }));
                clearTimeout(_fromCloudTimer); _fromCloudTimer = setTimeout(() => { _fromCloud = false; }, 800);
                await saveSnapshot(safeData, "firebase-boot");
                console.log("[CRM] ✅ Firebase OK — clients:", fbClients.length);
              } else {
                const localState = initState();
                const total = (localState.clients || []).length + (localState.tasks || []).length + (localState.bills || []).length;
                if (total > 0) { await pushCloud(localState); await saveSnapshot(localState, "initial-push"); }
              }
              setDone("synced"); break;
            } catch (e) {
              console.warn("[CRM] Attempt", attempt, "failed:", e.message);
              if (attempt < 3) await new Promise(r => setTimeout(r, retryDelay)); retryDelay *= 2;
              if (attempt === 3) { clearTimeout(safety); if (!cancelled) setDone("error"); }
            }
          }
        })();

        const unsub = subscribeCloud(incoming => {
          if (!incoming || cancelled) return;
          // Convert all Firebase objects to arrays
          const AKEYS = ["clients", "services", "tasks", "documents", "bills", "payments", "messages", "groups", "activity", "notes", "gstReminders", "excelSheets", "wordDocs", "attendance", "users", "expenses", "adminIdeas"];
          const safe = { ...incoming };
          AKEYS.forEach(k => { if (safe[k] != null) safe[k] = Array.isArray(safe[k]) ? safe[k] : fromFB(safe[k]); });
          // Re-apply permanent deletes to incoming data (prevents Firebase restoring deleted items)
          const ARRAY_COLL = ["tasks", "bills", "services", "documents", "clients"];
          ARRAY_COLL.forEach(k => {
            if (safe[k] && Array.isArray(safe[k])) {
              safe[k] = safe[k].map(item =>
                (item && _permDel.has(item.id)) ? { ...item, _deleted: true } : item
              );
            }
          });
          const merged = { ...safe, documents: mergeDocs(safe.documents, ls("documents", [])) };
          _fromCloud = true;
          DATA_KEYS.forEach(k => { if (merged[k] !== undefined) ss(k, merged[k]); });
          setS(prev => ({ ...prev, ...merged }));
          setSyncStatus("synced");
          clearTimeout(_fromCloudTimer); _fromCloudTimer = setTimeout(() => { _fromCloud = false; }, 800);// 800ms > auto-push 200ms
        });

        return () => { cancelled = true; clearTimeout(safety); clearTimeout(syncRef.current); clearTimeout(_syncTimer); unsub(); };
      }, []);// eslint-disable-line

      // ── Auto-push: _pullDone guard prevents data loss ══
      // CRITICAL: never push until Firebase pull is complete
      useEffect(() => {
        if (!_inited || !cloudReady || _fromCloud || !_pullDone) return;
        // Safety: never push empty state
        const hasData = (S.clients?.length || 0) + (S.tasks?.length || 0) + (S.users?.length || 1) > 1;
        if (!hasData) return;
        setSyncStatus("syncing");
        clearTimeout(syncRef.current);
        syncRef.current = setTimeout(async () => {
          _lastPushTs = Date.now() + 5000; // pre-block echo for 5s
          const ok = await pushCloud(S).catch(() => false);
          if (ok) { setSyncStatus("synced"); saveSnapshot(S, "auto-push"); }
          else { setSyncStatus("error"); _lastPushTs = 0; }
        }, 150);
      }, [S, cloudReady]);// eslint-disable-line

      // ── Auto-snapshot every 3 minutes ──
      useEffect(() => {
        if (!cloudReady) return;
        const t = setInterval(async () => {
          if ((S.clients?.length || 0) + (S.tasks?.length || 0) + (S.bills?.length || 0) > 0) {
            await saveSnapshot(S, "auto-3min");
          }
        }, 3 * 60 * 1000);
        return () => clearInterval(t);
      }, [cloudReady, S]);// eslint-disable-line

      // ── v28: Daily auto-backup (every 24h) ──
      useEffect(() => {
        if (!cloudReady) return;
        const checkDailyBackup = async () => {
          try {
            const last = localStorage.getItem("_oma_lastbackup");
            const shouldBackup = !last || (Date.now() - new Date(last).getTime() > 24 * 60 * 60 * 1000);
            if (shouldBackup && ((S.clients?.length || 0) + (S.tasks?.length || 0) > 0)) {
              await saveSnapshot(S, "auto-daily-" + today());
              localStorage.setItem("_oma_lastbackup", new Date().toISOString());
              console.log("[CRM v28] ✅ Daily backup created");
            }
          } catch (e) { console.warn("[CRM v28] Backup error:", e); }
        };
        checkDailyBackup();
        const t = setInterval(checkDailyBackup, 60 * 60 * 1000);
        return () => clearInterval(t);
      }, [cloudReady]);// eslint-disable-line

      // Sync user role changes
      useEffect(() => {
        if (!user) return;
        const fresh = S.users.find(u => u.id === user.id);
        if (fresh && (fresh.name !== user.name || fresh.role !== user.role)) setUser(fresh);
      }, [S.users]);

      const unread = user ? S.messages.filter(m => (m.toId === user.id || (m.groupId && m.fromId !== user.id)) && !m.read && !m._deleted).length : 0;
      const deletedCount = user && ["admin", "manager"].includes(user.role) ? ["clients", "services", "tasks", "bills", "expenses", "documents"].reduce((s, k) => s + ((S[k] || []).filter(x => x._deleted).length), 0) : 0;

      // ── Auto-record logout when tab closes ──
      useEffect(() => {
        if (!user) return;
        const saveLogout = () => {
          try {
            const sess = ls("session", null);
            if (!sess?.userId) return;
            const att = [...(ls("attendance", []) || [])];
            const ridx = [...att].reverse().findIndex(a => a.userId === sess.userId && !a.logoutAt);
            if (ridx !== -1) {
              const real = att.length - 1 - ridx;
              att[real] = { ...att[real], logoutAt: new Date().toISOString() };
              ss("attendance", att);
              if (_inited && _db) _db.ref("omcrm/" + SYNC_KEY + "/data/attendance").update(toFB(att)).catch(() => { });
            }
          } catch (e) { }
        };
        window.addEventListener("beforeunload", saveLogout);
        return () => window.removeEventListener("beforeunload", saveLogout);
      }, [user]);// eslint-disable-line
      const goPage = p => { setPage(p); if (p !== "client360") setClientId(null) };
      const handleLogout = () => {
        try {
          const sess = ls("session", null);
          if (sess?.userId) {
            const att = [...(S.attendance || [])];
            const ridx = [...att].reverse().findIndex(a => a.userId === sess.userId && !a.logoutAt);
            if (ridx !== -1) {
              const realIdx = att.length - 1 - ridx;
              att[realIdx] = { ...att[realIdx], logoutAt: now() };
              ss("attendance", att);
              if (_inited && _db) _db.ref("omcrm/" + SYNC_KEY + "/data/attendance").update(toFB(att)).catch(() => { });
            }
          }
        } catch (e) { }
        try { localStorage.removeItem(PFX + "session"); } catch (e) { }
        setTimeout(() => window.location.reload(), 300);
      };
      const handleSyncSave = () => { fbInit(); setSyncStatus("syncing"); pullCloud().then(d => { if (d) { setS(p => ({ ...p, ...d })) } setSyncStatus("synced") }).catch(() => setSyncStatus("error")) };

      // v29: Client portal routing
      if (clientPortalMode && clientPortalUser) {
        return <ThemeProvider><ToastProvider>
          <ClientPortalDashboard
            clientUser={clientPortalUser} clientData={clientPortalData} S={S}
            onLogout={() => {
              setClientPortalMode(false); setClientPortalUser(null); setClientPortalData(null);
              try { localStorage.removeItem(PFX + "session"); } catch(e){}
              setTimeout(() => window.location.reload(), 200);
            }}
          />
        </ToastProvider></ThemeProvider>;
      }
      if (showClientLogin) {
        return <ThemeProvider><ToastProvider>
          <ClientPortalLogin S={S}
            onClientLogin={(cu, cd) => { setClientPortalUser(cu); setClientPortalData(cd); setClientPortalMode(true); setShowClientLogin(false); }}
            onBack={() => setShowClientLogin(false)}
          />
        </ToastProvider></ThemeProvider>;
      }

      if (!user) return <LoginPage onLogin={u => {
        setUser(u);
        const loginTime = now();
        ss("session", { userId: u.id, loginAt: loginTime });
        // Track login in attendance
        const att = { id: uid("ATT"), userId: u.id, userName: u.name, role: u.role, loginAt: loginTime, logoutAt: null, date: today() };
        const existing = ls("attendance", []);
        ss("attendance", [...existing, att]);
        setS(p => ({ ...p, attendance: [...(p.attendance || []), att] }));
      }} />;
      if (!cloudReady) return <LoadingScreen />;

      return <>
        <OfflineBanner />
        <ReminderEngine S={S} setPage={goPage} user={user} />
        <div style={{ display: "flex", height: "100vh", overflow: "hidden", position: "relative" }}>
          <Sidebar page={page === "client360" ? "clients" : page} setPage={goPage} user={user} S={S} unread={unread} deletedCount={deletedCount} collapsed={collapsed} setCollapsed={setCollapsed} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} onLogout={handleLogout} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minWidth: 0 }}>
            <Topbar page={page} user={user} S={S} setPage={goPage} unread={unread} onLogout={handleLogout} syncStatus={syncStatus} onHamburger={() => setMobileOpen(o => !o)} setClientId={setClientId} />
            <div style={{ flex: 1, overflow: "hidden", position: "relative", zIndex: 1 }}>
              {page === "dashboard" && <Dashboard S={S} setS={setS} user={user} setPage={goPage} setClientId={setClientId} />}
              {page === "clients" && <ClientsPage S={S} setS={setS} user={user} setPage={goPage} setClientId={setClientId} />}
              {page === "client360" && clientId && <Client360 clientId={clientId} S={S} setS={setS} user={user} setPage={goPage} />}
              {page === "services" && <ServicesPage S={S} setS={setS} user={user} setPage={goPage} setClientId={setClientId} />}
              {page === "tasks" && <TasksPageNew S={S} setS={setS} user={user} setPage={goPage} setClientId={setClientId} />}
              {page === "documents" && <DocumentsPage S={S} setS={setS} user={user} setPage={goPage} setClientId={setClientId} />}
              {page === "billing" && <BillingPage S={S} setS={setS} user={user} setPage={goPage} setClientId={setClientId} />}
              {page === "reports" && ["admin", "manager", "ca"].includes(user.role) && <ReportsPage S={S} user={user} />}
              {page === "finance" && ["admin", "manager", "ca"].includes(user.role) && <FinancialReportsPage S={S} user={user} />}
              {page === "invoicegen" && ["admin", "manager", "ca"].includes(user.role) && <InvoiceGeneratorPage S={S} />}
              {page === "messages" && <MessagesPage S={S} setS={setS} user={user} />}
              {page === "activity" && ["admin", "manager"].includes(user.role) && <ActivityPage S={S} setS={setS} user={user} />}
              {page === "attendance" && ["admin", "manager"].includes(user.role) && <AttendancePage S={S} setS={setS} user={user} />}
              {page === "users" && user.role === "admin" && <UsersPage S={S} setS={setS} user={user} />}
              {page === "settings" && <SettingsPage S={S} setS={setS} user={user} setUser={setUser} onSyncSave={handleSyncSave} />}
              {page === "excel" && <ExcelSheetsPage S={S} setS={setS} user={user} />}
              {page === "word" && <WordDocsPage S={S} setS={setS} user={user} />}
              {page === "expenses" && <ExpensesPage S={S} setS={setS} user={user} />}
              {page === "recyclebin" && ["admin", "manager"].includes(user.role) && <RecycleBinPage S={S} setS={setS} user={user} />}
              {page === "gst" && ["admin", "manager", "ca"].includes(user.role) && <GSTRemindersPage S={S} setS={setS} user={user} />}
              {page === "whatsapp" && ["admin", "manager"].includes(user.role) && <WhatsAppBroadcastPage S={S} user={user} />}
              {/* ── v28 NEW MODULES ── */}
              {page === "aistudio" && ["admin", "manager"].includes(user.role) && <AICodeStudioPage S={S} setS={setS} user={user} />}
              {page === "content" && <ContentLibraryPage S={S} setS={setS} user={user} />}
              {page === "backup" && ["admin", "manager"].includes(user.role) && <BackupRestorePage S={S} setS={setS} user={user} />}
              {page === "analytics" && ["admin", "manager", "ca"].includes(user.role) && <AnalyticsDashboardPage S={S} user={user} />}
              {page === "clientportal" && ["admin", "manager"].includes(user.role) && <ClientPortalAdminPage S={S} setS={setS} user={user} />}
            </div>
          </div>
        </div>
        <FloatingNotepad user={user} />
      </>;
    }

    // Global error boundary — never crashes
    class ErrorBoundary extends React.Component {
      constructor(p) { super(p); this.state = { err: null }; }
      static getDerivedStateFromError(e) { return { err: e }; }
      componentDidCatch(e, i) { console.error("[CRM] Error:", e, i); }
      render() {
        if (this.state.err) return <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#05080f", color: "#fff", gap: 20, padding: 40 }}>
          <div style={{ fontSize: 48 }}>⚠️</div>
          <div style={{ fontSize: 20, fontWeight: 700, color: "#d4a843", fontFamily: "serif" }}>OM Associates CRM</div>
          <div style={{ fontSize: 14, color: "#9ca3af", textAlign: "center", maxWidth: 400 }}>An error occurred. Your data is safe.</div>
          <div style={{ fontSize: 11, color: "#4b5563", background: "#0b1221", borderRadius: 8, padding: "10px 16px", maxWidth: 500, wordBreak: "break-all" }}>{String(this.state.err)}</div>
          <button onClick={() => { this.setState({ err: null }); window.location.reload(); }} style={{ background: "#d4a843", color: "#000", border: "none", borderRadius: 8, padding: "10px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>🔄 Reload App</button>
        </div>;
        return this.props.children;
      }
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ErrorBoundary><ThemeProvider><ToastProvider><App /></ToastProvider></ThemeProvider></ErrorBoundary>);
  </script>
</body>

</html>
