name = "om-associates1"
main = "_worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Cloudflare Pages (if deploying to Pages instead of Workers) ──
# pages_build_output_dir = "public"

# ── D1 Database ──────────────────────────────────────────────────
[[d1_databases]]
binding      = "DB"
database_name = "om-crm-db"
database_id  = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# ── KV Namespace ─────────────────────────────────────────────────
[[kv_namespaces]]
binding      = "KV"
id           = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ── R2 Bucket ────────────────────────────────────────────────────
[[r2_buckets]]
binding      = "R2"
bucket_name  = "om-crm-backups"

# ── Environment Variables ─────────────────────────────────────────
[vars]
ENVIRONMENT = "production"

# JWT_SECRET → Set in Cloudflare Dashboard → Workers → Settings → Variables
# Do NOT put secrets in this file!

# ── Scheduled Cron (daily backup at 2 AM IST = 8:30 PM UTC) ──────
[triggers]
crons = ["30 20 * * *"]
